<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>andreev.net</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<!-- netlify-identity loaded dynamically on demand -->
<style>
@keyframes pblink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes v1pulse{0%,100%{opacity:1}50%{opacity:0.45}}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0A0B0D;}
#root{height:100%;display:flex;flex-direction:column;}
.v1{
  --v1-bg:#0A0B0D;--v1-bg-elev:#0F1115;--v1-bg-elev-2:#15181D;--v1-bg-hover:#1B1F25;
  --v1-fg:#ECEEF2;--v1-fg-2:#B5BDC8;--v1-fg-3:#8A95A4;--v1-fg-muted:#5C6776;
  --v1-rule:#1F2329;--v1-rule-strong:#2C323A;
  --v1-accent:#4F7BFF;--v1-up:#6BD89A;--v1-down:#E5484D;
  --v1-mono:'JetBrains Mono',ui-monospace,monospace;
  --v1-sans:'Inter Tight',system-ui,sans-serif;
  background-image:linear-gradient(to right,rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:8px 8px;
}
.v1-pulse{animation:v1pulse 1.4s ease-in-out infinite;}
.v1 *{box-sizing:border-box;}
.v1 ::-webkit-scrollbar{width:5px;height:5px;}
.v1 ::-webkit-scrollbar-track{background:transparent;}
.v1 ::-webkit-scrollbar-thumb{background:var(--v1-rule-strong);}
.v1 button:focus-visible{outline:1px solid var(--v1-accent);outline-offset:1px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useMemo,useCallback}=React;

/* ══════════════════════════════════════════════════════════════
   AUTH — Netlify Identity (handles Google OAuth, email/password)
   Local fallback (localStorage) used when Identity not configured
   ══════════════════════════════════════════════════════════════ */

/* ── local fallback (email/password only) ── */
const localAuth={
  _key:'andreev_users', _sessionKey:'andreev_session',
  _users(){try{return JSON.parse(localStorage.getItem(this._key)||'[]');}catch{return[];}},
  _save(u){localStorage.setItem(this._key,JSON.stringify(u));},
  getSession(){try{return JSON.parse(localStorage.getItem(this._sessionKey)||'null');}catch{return null;}},
  saveSession(u){localStorage.setItem(this._sessionKey,JSON.stringify(u));},
  clearSession(){localStorage.removeItem(this._sessionKey);},
  signUp(name,email,password){
    const users=this._users();
    if(users.find(u=>u.email.toLowerCase()===email.toLowerCase())) return{error:'account already exists with this email'};
    if(password.length<6) return{error:'password must be at least 6 characters'};
    const u={id:Date.now().toString(),name:name.trim(),email:email.trim().toLowerCase(),password,createdAt:new Date().toISOString()};
    this._save([...users,u]);
    const s={id:u.id,name:u.name,email:u.email};
    this.saveSession(s);return{user:s};
  },
  signIn(email,password){
    const u=this._users().find(u=>u.email.toLowerCase()===email.trim().toLowerCase());
    if(!u) return{error:'no account found with that email'};
    if(u.password!==password) return{error:'incorrect password'};
    const s={id:u.id,name:u.name,email:u.email};
    this.saveSession(s);return{user:s};
  },
};

/* ── DATA ── */
const _now=new Date();
const D={
  leaderboard:[
    {name:'you',isYou:true,online:true,color:'#4F7BFF',weekTime:'0h 00m',streak:0,subjects:0,trend:[]},
  ],
  weekBars:(()=>{const days=['mon','tue','wed','thu','fri','sat','sun'];const dow=(_now.getDay()+6)%7;return days.map((day,i)=>({day,hours:0,isToday:i===dow}));})(),
  subjects:[],
  sessions:[],
  today:{
    day:_now.getDate(),
    month:_now.toLocaleDateString('en-GB',{month:'short'}).toLowerCase(),
    monthName:`${_now.toLocaleDateString('en-GB',{month:'long'})} ${_now.getFullYear()}`,
    firstDow:(new Date(_now.getFullYear(),_now.getMonth(),1).getDay()+6)%7,
    daysInMonth:new Date(_now.getFullYear(),_now.getMonth()+1,0).getDate(),
  },
  events:[],
  todos:[],
  heatmap:(()=>{const out=[];for(let d=0;d<7;d++){out.push(Array(24).fill(0));}return out;})(),
};

/* ── SCOPE SYSTEM ── */
const SCOPES=[
  {id:'1d', label:'1D', n:24,x:i=>String(i).padStart(2,'0'),      unit:'hour'},
  {id:'7d', label:'7D', n:7, x:i=>['mon','tue','wed','thu','fri','sat','sun'][i],unit:'day'},
  {id:'30d',label:'30D',n:30,x:i=>`${i+1}`,                       unit:'day'},
  {id:'90d',label:'90D',n:13,x:i=>`w${i+1}`,                      unit:'week'},
  {id:'all',label:'ALL',n:12,x:i=>['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][i],unit:'month'},
];
const SCOPE_BASE={'1d':0.18,'7d':3.0,'30d':2.6,'90d':18,'all':76};
const SUBJ_COLORS=['#4F7BFF','#5B9DAB','#C89B5C','#8B7DB8','#C77B7B','#6FA88A'];
function seed(s,i){return(Math.sin(s*12.9898+i*78.233)*43758.5453)%1;}
function genSeries(scope,s,scale=1){const c=SCOPES.find(x=>x.id===scope),base=SCOPE_BASE[scope]*scale;return Array.from({length:c.n},(_,i)=>{const w=Math.sin(i*0.7+s)*0.35+Math.cos(i*0.4+s*1.7)*0.22+Math.sin(i*0.21+s*0.5)*0.18,n=Math.abs(seed(s,i))*0.25,v=base*(1+w+n);return Math.max(0,v);});}
function fmtHM(h){const H=Math.floor(h),M=Math.round((h-H)*60);return`${H}h ${String(M).padStart(2,'0')}m`;}
function scopeLabel(s){return({'1d':'today','7d':'this week','30d':'last 30 days','90d':'last 90 days','all':'all time'})[s];}
function userSeries(i,scope){return genSeries(scope,3+i*1.7,1-i*0.06);}
function subjSeries(i,scope){return genSeries(scope,11+i*2.3,0.5-i*0.07);}
function sumH(v){return v.reduce((a,x)=>a+x,0);}

/* ── ATOMS ── */
function useTick(ms=1000){const[t,setT]=useState(0);useEffect(()=>{const id=setInterval(()=>setT(x=>x+1),ms);return()=>clearInterval(id);},[ms]);return t;}
function fmtClock(s){const h=Math.floor(s/3600).toString().padStart(2,'0'),m=Math.floor((s%3600)/60).toString().padStart(2,'0'),sec=(s%60).toString().padStart(2,'0');return`${h}:${m}:${sec}`;}
function LiveClock({start=4462,size=14}){const t=useTick(1000);return<span style={{fontFamily:'var(--v1-mono)',fontSize:size,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.01em'}}>{fmtClock(start+t)}</span>;}
function Cursor({size='0.85em',color}){return<span style={{display:'inline-block',width:size,height:size,background:color||'currentColor',verticalAlign:'-0.08em',animation:'pblink 1.06s steps(2,jump-none) infinite',marginLeft:'0.15em'}}/>;}
function Spark({data,w=120,h=28,color='currentColor',fill=false,sw=1.25}){
  if(!data||data.length<2)return null;
  const mx=Math.max(...data,1),mn=Math.min(...data,0),rng=mx-mn||1,step=w/(data.length-1);
  const pts=data.map((v,i)=>[i*step,h-((v-mn)/rng)*h]);
  const lp=pts.map(([x,y])=>`${x},${y}`).join(' ');
  const ap=`M0,${h} L${pts.map(([x,y])=>`${x},${y}`).join(' L')} L${w},${h} Z`;
  return<svg width={w} height={h} style={{display:'block',overflow:'visible'}}>{fill&&<path d={ap} fill={color} opacity="0.12"/>}<polyline points={lp} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"/><circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r={1.6} fill={color}/></svg>;
}

function SparkWide({data,h=48,color='currentColor',fill=false,sw=1.25}){
  const ref=useRef(null);
  const[w,setW]=useState(600);
  useEffect(()=>{
    if(!ref.current)return;
    const ro=new ResizeObserver(e=>{const v=e[0].contentRect.width;if(v>0)setW(Math.floor(v));});
    ro.observe(ref.current);
    return()=>ro.disconnect();
  },[]);
  return<div ref={ref} style={{width:'100%'}}><Spark data={data} w={w} h={h} color={color} fill={fill} sw={sw}/></div>;
}

/* ── V1 PRIMITIVES ── */
const Btn={
  sm:{fontFamily:'var(--v1-mono)',fontSize:11,padding:'6px 12px',background:'transparent',color:'var(--v1-fg-2)',border:'1px solid var(--v1-rule-strong)',cursor:'pointer',letterSpacing:'0.04em'},
  md:{fontFamily:'var(--v1-mono)',fontSize:13,padding:'10px 18px',background:'transparent',color:'var(--v1-fg-2)',border:'1px solid var(--v1-rule-strong)',cursor:'pointer',letterSpacing:'0.04em'},
};

function Block({label,meta,action,children,pad='18px 18px 22px',noBorder}){
  return(
    <section style={{borderBottom:noBorder?'none':'1px solid var(--v1-rule)'}}>
      <header style={{display:'flex',alignItems:'center',gap:12,padding:'10px 18px',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>
        <span style={{color:'var(--v1-accent)'}}>◆</span>
        <span style={{color:'var(--v1-fg-2)'}}>{label}</span>
        {meta&&<span>· {meta}</span>}
        <span style={{flex:1}}/>
        {action}
      </header>
      <div style={{padding:pad}}>{children}</div>
    </section>
  );
}

function Lnk({children,onClick}){return<button onClick={onClick} style={{background:'transparent',border:'none',cursor:'pointer',fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.16em',color:'var(--v1-accent)'}}>{children}</button>;}

function Tbl({cols,widths,children}){
  const gt=widths.join(' ');
  return(
    <div style={{border:'1px solid var(--v1-rule)'}}>
      <div style={{display:'grid',gridTemplateColumns:gt,padding:'0 12px',height:26,alignItems:'center',background:'var(--v1-bg-elev)',borderBottom:'1px solid var(--v1-rule)',fontSize:9,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>
        {cols.map((c,i)=><span key={i} style={{padding:'0 6px',textAlign:/^(dur|prod|wk|all|share|trend|hrs|min|pct|sess|rate|days|streak|subj|d_vs)/i.test(c)?'right':'left'}}>{c}</span>)}
      </div>
      <div>{React.Children.map(children,(child,i)=>child&&React.cloneElement(child,{__gt:gt,__i:i}))}</div>
    </div>
  );
}

function Row({children,hi,__gt,__i,onClick}){
  const base=hi?'rgba(79,123,255,0.07)':(__i%2===0?'transparent':'rgba(255,255,255,0.012)');
  return(
    <div onClick={onClick} style={{display:'grid',gridTemplateColumns:__gt,padding:'0 12px',height:32,alignItems:'center',borderBottom:'1px solid var(--v1-rule)',background:base,cursor:onClick?'pointer':'default',transition:'background 80ms',fontFamily:'var(--v1-mono)'}}
      onMouseEnter={e=>!hi&&(e.currentTarget.style.background='rgba(79,123,255,0.05)')}
      onMouseLeave={e=>!hi&&(e.currentTarget.style.background=base)}
    >{children}</div>
  );
}

function Cell({children,mono,dim,sm,right,tone}){
  const tc={up:'var(--v1-up)',down:'var(--v1-down)',flat:'var(--v1-fg-2)'};
  return<span style={{padding:'0 6px',minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:mono?'var(--v1-mono)':'var(--v1-sans)',fontSize:sm?10:11,color:tone?tc[tone]:(dim?'var(--v1-fg-3)':'var(--v1-fg)'),textAlign:right?'right':'left',fontVariantNumeric:'tabular-nums',letterSpacing:mono?'0.01em':'0'}}>{children}</span>;
}

function WeekBars({bars}){
  const mx=Math.max(...bars.map(b=>b.hours),5);
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1}}>
      {bars.map((b,i)=>(
        <div key={i} style={{display:'flex',flexDirection:'column',gap:6}}>
          <div style={{height:100,display:'flex',alignItems:'flex-end',position:'relative',borderBottom:'1px solid var(--v1-rule)'}}>
            <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
              {[0.25,0.5,0.75].map(p=><div key={p} style={{position:'absolute',left:0,right:0,top:`${p*100}%`,height:1,background:'var(--v1-rule)',opacity:0.5}}/>)}
            </div>
            <div style={{width:'100%',height:`${(b.hours/mx)*100}%`,background:b.isToday?'var(--v1-accent)':'var(--v1-fg-3)',minHeight:1}}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
            <span style={{fontSize:11,color:b.isToday?'var(--v1-accent)':'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontVariantNumeric:'tabular-nums'}}>{b.hours.toFixed(1)}</span>
            <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',letterSpacing:'0.04em'}}>{b.day}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function ScopePicker({scope,onScope,scopes=SCOPES}){
  return(
    <div style={{display:'inline-flex',border:'1px solid var(--v1-rule)',background:'var(--v1-bg)'}}>
      {scopes.map(s=>{const a=scope===s.id;return<button key={s.id} onClick={()=>onScope(s.id)} style={{fontFamily:'var(--v1-mono)',fontSize:10,background:a?'var(--v1-accent)':'transparent',color:a?'var(--v1-bg)':'var(--v1-fg-3)',border:'none',padding:'5px 10px',cursor:'pointer',letterSpacing:'0.12em',fontWeight:a?600:500}}>{s.label}</button>;})}
    </div>
  );
}

function BigChart({series,scope,height=240,yLabel='h',kind='line',fillFirst=false}){
  const wrap=useRef(null);
  const[hov,setHov]=useState(null);
  const[W,setW]=useState(800);
  useEffect(()=>{if(!wrap.current)return;const ro=new ResizeObserver(e=>{const w=e[0].contentRect.width;if(w>0)setW(Math.floor(w));});ro.observe(wrap.current);return()=>ro.disconnect();},[]);
  const conf=SCOPES.find(s=>s.id===scope),n=series[0]?.values.length||1;
  const pL=44,pR=16,pT=12,pB=28,H=height,iW=W-pL-pR,iH=H-pT-pB;
  const all=series.flatMap(s=>s.values),mx=Math.max(...all,0.1),yM=mx*1.12;
  const step=iW/Math.max(1,n-1),xA=i=>pL+i*step,yA=v=>pT+iH-(v/yM)*iH;
  const onMove=e=>{const r=e.currentTarget.getBoundingClientRect(),px=e.clientX-r.left,x=px-pL,i=Math.max(0,Math.min(n-1,Math.round(x/step)));setHov({i,px:xA(i)});};
  const yTks=[0,0.25,0.5,0.75,1].map(p=>({y:pT+iH-p*iH,v:yM*p}));
  const xStr=Math.max(1,Math.ceil(n/7)),xTks=Array.from({length:n},(_,i)=>i).filter(i=>i%xStr===0||i===n-1);
  return(
    <div ref={wrap} style={{position:'relative',width:'100%'}}>
      <svg width={W} height={H} onMouseMove={onMove} onMouseLeave={()=>setHov(null)} style={{display:'block',cursor:'crosshair'}}>
        {yTks.map((t,i)=><g key={i}><line x1={pL} x2={W-pR} y1={t.y} y2={t.y} stroke="var(--v1-rule)" strokeWidth="1"/><text x={pL-6} y={t.y+3} fontSize="9" textAnchor="end" fill="var(--v1-fg-muted)" fontFamily="var(--v1-mono)">{t.v<10?t.v.toFixed(1):Math.round(t.v)}{yLabel}</text></g>)}
        {xTks.map(i=><g key={i}><line x1={xA(i)} x2={xA(i)} y1={pT+iH} y2={pT+iH+4} stroke="var(--v1-rule-strong)" strokeWidth="1"/><text x={xA(i)} y={H-8} fontSize="9" textAnchor="middle" fill="var(--v1-fg-muted)" fontFamily="var(--v1-mono)">{conf.x(i)}</text></g>)}
        <line x1={pL} x2={W-pR} y1={pT+iH} y2={pT+iH} stroke="var(--v1-rule-strong)" strokeWidth="1"/>
        {series.map((s,idx)=>{const pts=s.values.map((v,i)=>`${xA(i)},${yA(v)}`).join(' '),ad=`M${xA(0)},${pT+iH} L${s.values.map((v,i)=>`${xA(i)},${yA(v)}`).join(' L')} L${xA(n-1)},${pT+iH} Z`,filled=kind==='area'||(fillFirst&&idx===0);return<g key={idx} opacity={s.dim?0.4:1}>{filled&&<path d={ad} fill={s.color} opacity="0.10"/>}<polyline points={pts} fill="none" stroke={s.color} strokeWidth={s.dim?1:1.5} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={s.dashed?'3 3':'none'}/></g>;})}
        {hov&&<g><line x1={hov.px} x2={hov.px} y1={pT} y2={pT+iH} stroke="var(--v1-fg-muted)" strokeWidth="1" strokeDasharray="2 3"/>{series.map((s,idx)=><circle key={idx} cx={hov.px} cy={yA(s.values[hov.i])} r="3" fill={s.color} stroke="var(--v1-bg)" strokeWidth="1"/>)}</g>}
      </svg>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'6px 16px 0',flexWrap:'wrap',fontSize:10,color:'var(--v1-fg-3)',letterSpacing:'0.06em',fontFamily:'var(--v1-mono)'}}>
        {series.map((s,i)=><span key={i} style={{display:'inline-flex',alignItems:'center',gap:5,opacity:s.dim?0.6:1}}><span style={{width:8,height:2,background:s.color}}/><span style={{color:'var(--v1-fg-2)'}}>{s.name}</span>{hov&&<span style={{color:'var(--v1-fg-muted)',fontVariantNumeric:'tabular-nums'}}>· <span style={{color:s.color}}>{s.values[hov.i].toFixed(1)}{yLabel}</span></span>}</span>)}
        <span style={{flex:1}}/>{hov&&<span style={{color:'var(--v1-fg-muted)'}}>{conf.unit} <span style={{color:'var(--v1-fg-2)'}}>{conf.x(hov.i)}</span></span>}
      </div>
    </div>
  );
}

function ModePicker({mode,onMode,modes}){
  return(
    <div style={{display:'inline-flex',border:'1px solid var(--v1-rule)'}}>
      {modes.map(m=>{const a=mode===m.id;return<button key={m.id} onClick={()=>onMode(m.id)} style={{fontFamily:'var(--v1-mono)',fontSize:10,background:a?'var(--v1-bg-hover)':'transparent',color:a?'var(--v1-fg)':'var(--v1-fg-3)',border:'none',borderRight:'1px solid var(--v1-rule)',padding:'5px 10px',cursor:'pointer',letterSpacing:'0.1em',display:'inline-flex',alignItems:'center',gap:5}}>{m.icon&&<span style={{color:a?'var(--v1-accent)':'var(--v1-fg-muted)'}}>{m.icon}</span>}{m.label}</button>;})}
    </div>
  );
}

function Modal({title,onClose,children,width=520}){
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(5,6,8,0.75)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:width,background:'var(--v1-bg-elev)',border:'1px solid var(--v1-rule-strong)',display:'flex',flexDirection:'column',boxShadow:'0 24px 60px rgba(0,0,0,0.6)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev-2)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>
          <span style={{color:'var(--v1-accent)'}}>◆</span><span style={{color:'var(--v1-fg-2)'}}>{title}</span><span style={{flex:1}}/>
          <button onClick={onClose} style={{background:'transparent',border:'none',color:'var(--v1-fg-3)',cursor:'pointer',fontFamily:'var(--v1-mono)',fontSize:12}}>✕ esc</button>
        </div>
        <div>{children}</div>
      </div>
    </div>
  );
}

function Input({value,onChange,placeholder,autoFocus,onKeyDown}){
  return<input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} autoFocus={autoFocus} onKeyDown={onKeyDown} style={{width:'100%',boxSizing:'border-box',fontFamily:'var(--v1-mono)',fontSize:12,padding:'8px 12px',background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',outline:'none',letterSpacing:'0.02em'}} onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>;
}

function KPI({k,v,sub,tone}){
  return(
    <div style={{padding:'14px 16px',borderRight:'1px solid var(--v1-rule)',display:'flex',flexDirection:'column',gap:4}}>
      <span style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>{k}</span>
      <span style={{fontSize:22,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.02em',color:tone==='up'?'var(--v1-up)':tone==='down'?'var(--v1-down)':'var(--v1-fg)',fontFamily:'var(--v1-mono)'}}>{v}</span>
      <span style={{fontSize:10,color:'var(--v1-fg-3)',fontVariantNumeric:'tabular-nums',fontFamily:'var(--v1-mono)'}}>{sub}</span>

function Dashboard({onNav,sessions,sessionState}){
  const me=D.leaderboard.find(u=>u.isYou);
  const secsThisWeek=sessions.reduce((acc,s)=>{
    if(s.secs!=null)return acc+s.secs;
    const m=s.duration?.match(/(\d+)h\s+(\d+)m/);
    return acc+(m?parseInt(m[1])*3600+parseInt(m[2])*60:0);
  },0);
  const wkH=Math.floor(secsThisWeek/3600);
  const wkM=Math.floor((secsThisWeek%3600)/60);

  return(
    <div style={{display:'grid',gridTemplateColumns:'minmax(0,1.8fr) minmax(0,1fr)',height:'100%',overflow:'hidden'}}>

        {sessionState&&sessionState.active
          ? <DashSessionHero sessionState={sessionState} onNav={onNav}/>
          : <Block label="this_week.hours" meta="δ vs prior week">
              {secsThisWeek===0?(
                <EmptyState icon="⏱" title="no study hours yet this week"
                  hint="start your first session to begin tracking"
                  action={<button onClick={()=>onNav('timer')} style={{fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.12em',background:'var(--v1-accent)',border:'none',color:'var(--v1-bg)',padding:'6px 16px',cursor:'pointer',fontWeight:600}}>begin session →</button>}
                />
              ):(
                <div>
                  <div style={{display:'flex',alignItems:'baseline',gap:3,marginBottom:12}}>
                    <div style={{fontSize:80,lineHeight:0.85,letterSpacing:'-0.05em',fontWeight:500,color:'var(--v1-fg)',fontVariantNumeric:'tabular-nums',fontFamily:'var(--v1-mono)',display:'flex',alignItems:'baseline',gap:3}}>
                      {wkH}<span style={{color:'var(--v1-fg-muted)'}}>h</span>{String(wkM).padStart(2,'0')}<span style={{color:'var(--v1-fg-muted)'}}>m</span><Cursor size="0.35em" color="var(--v1-accent)"/>
                    </div>
                  </div>
                  <SparkWide data={sessions.map(s=>s.secs!=null?s.secs/3600:((m=>{return m?parseInt(m[1])+parseInt(m[2])/60:0;})(s.duration?.match(/(\d+)h\s+(\d+)m/))))} h={72} color="var(--v1-accent)" fill sw={1.5}/>
                </div>
              )}
            </Block>
        }
        <Block label="last_7_days.histogram" meta="hours per day · target 3h">
          <WeekBars bars={D.weekBars}/>
        </Block>
        <Block label="leaderboard.week" meta="ranked by hours" action={<Lnk onClick={()=>onNav('leader')}>full →</Lnk>} noBorder>
          {D.leaderboard.length<=1?(
            <EmptyState icon="👥" title="you're the only one here"
              hint="invite friends to study together and compete on the leaderboard"
            />
          ):(()=>{
            const ranked=D.leaderboard;
            const myIdx=ranked.findIndex(u=>u.isYou);
            const total=ranked.length;
            let indices;
            if(myIdx===0) indices=[0,1,2];
            else if(myIdx===total-1) indices=[total-3,total-2,total-1];
            else indices=[myIdx-1,myIdx,myIdx+1];
            const rows=indices.map(i=>({...ranked[i],rank:i+1}));
            return(
              <Tbl cols={['#','who','streak','wk','trend']} widths={['28px','auto','52px','76px','120px']}>
                {rows.map((u)=>(
                  <Row key={u.name} hi={u.isYou}>
                    <Cell mono dim>#{u.rank}</Cell>
                    <Cell><span style={{display:'inline-flex',alignItems:'center',gap:7}}><span style={{width:6,height:6,background:u.color,borderRadius:1,flexShrink:0}}/>{u.isYou?<span style={{color:'var(--v1-accent)'}}>you</span>:u.name}</span></Cell>
                    <Cell mono dim>{u.streak}d</Cell>
                    <Cell mono right>{u.weekTime.replace(' ','')}</Cell>
                    <Cell><Spark data={u.trend} w={114} h={18} color={u.isYou?'var(--v1-accent)':'var(--v1-fg-3)'} sw={1}/></Cell>
                  </Row>
                ))}
              </Tbl>
            );
          })()}
        </Block>
      </section>

      {/* COL RIGHT — compact agenda */}
      <section style={{overflowY:'auto',display:'flex',flexDirection:'column'}}>
        <Block label="agenda.today" meta={_now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toLowerCase()} action={<Lnk onClick={()=>onNav('calendar')}>cal →</Lnk>} noBorder>
          <DashAgenda onNav={onNav}/>
        </Block>
      </section>
    </div>
  );
}

  const[pomPhaseStart,setPomPhaseStart]=useState(null);
  const[editingPom,setEditingPom]=useState(false);
  const[pomWorkDraft,setPomWorkDraft]=useState('25');
  const[pomBreakDraft,setPomBreakDraft]=useState('5');

  // auto phase-switch
  useEffect(()=>{
    if(!pomOn||!pomPhaseStart||sessionState.paused)return;
    const phaseLen=(pomPhase==='work'?pomWork:pomBreak)*60;
    const spent=Math.floor((Date.now()-pomPhaseStart)/1000);
    if(spent>=phaseLen){setPomPhase(p=>p==='work'?'break':'work');setPomPhaseStart(Date.now());}
  },[tick]);

  const togglePom=()=>{
    if(!pomOn){setPomPhase('work');setPomPhaseStart(Date.now());}
    setPomOn(p=>!p);
  };
  const applyPomSettings=()=>{
    const w=parseInt(pomWorkDraft);const b=parseInt(pomBreakDraft);
    if(w>0&&b>0){setPomWork(w);setPomBreak(b);setPomPhase('work');setPomPhaseStart(Date.now());}
    setEditingPom(false);
  };

  let pomRemaining=null,pomPhaseSecs=null;
  if(pomOn&&pomPhaseStart){
    pomPhaseSecs=(pomPhase==='work'?pomWork:pomBreak)*60;
    if(!sessionState.paused){
      pomRemaining=Math.max(0,pomPhaseSecs-Math.floor((Date.now()-pomPhaseStart)/1000));
    } else {
      pomRemaining=pomPhaseSecs;
    }
  }

  const handleCommitClick=()=>{
    if(!awaitRating){setAwaitRating(true);return;}
    onCommit(rating,elapsed,sessionState.breakSecs||0);
    setAwaitRating(false);setRating(null);setPomOn(false);setPomPhaseStart(null);
  };

  const handleLogSubmit=()=>{
    const h=parseInt(logHours)||0;const m=parseInt(logMins)||0;
    const secs=(h*3600)+(m*60);
    const subj=logSubject||logCustom.trim();
    if(!secs||!subj)return;
    onLogManual&&onLogManual({subject:subj,secs,rating:logRating,note:logNote});
    setLogSubject(null);setLogCustom('');setLogHours('');setLogMins('');setLogNote('');setLogRating(null);
    setMode('timer');
  };

  const startTime=sessionState.active?new Date(sessionState.startedAt):null;
  const startedStr=startTime?`${String(startTime.getHours()).padStart(2,'0')}:${String(startTime.getMinutes()).padStart(2,'0')}`:'—';
  const progressPct=Math.min(100,Math.round((elapsed/(2*3600))*100));
  const PRESETS=typeof PRESET_SUBJECTS!=='undefined'?PRESET_SUBJECTS:['math','cs','history','physics'];
  const inpStyle={background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'8px 10px',outline:'none',width:'100%',boxSizing:'border-box'};

  if(!sessionState.active){
    /* ── MODE TOGGLE ── */
    const ModeBtn=({id,label})=>(
      <button onClick={()=>setMode(id)} style={{flex:1,padding:'8px 0',background:mode===id?'var(--v1-bg-elev-2)':'transparent',border:'none',borderBottom:mode===id?'1px solid var(--v1-accent)':'1px solid var(--v1-rule)',color:mode===id?'var(--v1-fg)':'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',cursor:'pointer'}}>{label}</button>
    );
    return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:1,padding:'48px 40px',gap:24}}>
        <div style={{width:'100%',maxWidth:480}}>
          {/* mode tabs */}
          <div style={{display:'flex',marginBottom:24}}>
            <ModeBtn id="timer" label="⏱ start timer"/>
            <ModeBtn id="log" label="✎ log manually"/>
          </div>

          {mode==='timer'&&(
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {PRESETS.map(s=>{
                  const subj=D.subjects.find(x=>x.name===s);
                  const color=subj?subj.color:'var(--v1-accent)';
                  const picked=timerPicked===s;
                  return(
                    <button key={s} onClick={()=>setTimerPicked(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'14px 18px',background:picked?'rgba(79,123,255,0.10)':'var(--v1-bg-elev)',border:`1px solid ${picked?color:'var(--v1-rule-strong)'}`,color:picked?'var(--v1-fg)':'var(--v1-fg-2)',fontFamily:'var(--v1-mono)',fontSize:13,cursor:'pointer',letterSpacing:'0.04em',textAlign:'left',transition:'border-color 80ms'}}>
                      <span style={{width:8,height:8,background:color,flexShrink:0}}/>{s}
                    </button>
                  );
                })}
              </div>
              <div style={{borderTop:'1px solid var(--v1-rule)',paddingTop:12}}>
                <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:6,fontFamily:'var(--v1-mono)'}}>or type custom subject</div>
                <Input value={timerCustom} onChange={v=>{setTimerCustom(v);setTimerPicked(null);}} placeholder="e.g. chemistry, language..."
                  onKeyDown={e=>{if(e.key==='Enter'&&timerCustom.trim()&&onStart)onStart(timerCustom.trim());}}/>
              </div>
              <button
                disabled={!timerPicked&&!timerCustom.trim()}
                onClick={()=>onStart&&onStart(timerPicked||timerCustom.trim())}
                style={{...Btn.md,width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:(timerPicked||timerCustom.trim())?'var(--v1-accent)':'transparent',color:(timerPicked||timerCustom.trim())?'var(--v1-bg)':'var(--v1-fg-muted)',borderColor:(timerPicked||timerCustom.trim())?'var(--v1-accent)':'var(--v1-rule)',opacity:(timerPicked||timerCustom.trim())?1:0.5}}>
                ▸ begin session{(timerPicked||timerCustom.trim())?` · ${timerPicked||timerCustom.trim()}`:''}
              </button>
            </div>
          )}

          {mode==='log'&&(
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>subject</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {PRESETS.map(s=>{
                  const subj=D.subjects.find(x=>x.name===s);
                  const color=subj?subj.color:'var(--v1-accent)';
                  const picked=logSubject===s;
                  return(
                    <button key={s} onClick={()=>{setLogSubject(s);setLogCustom('');}} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:picked?'rgba(79,123,255,0.10)':'var(--v1-bg-elev)',border:`1px solid ${picked?color:'var(--v1-rule-strong)'}`,color:picked?'var(--v1-fg)':'var(--v1-fg-2)',fontFamily:'var(--v1-mono)',fontSize:13,cursor:'pointer',letterSpacing:'0.04em',textAlign:'left',transition:'border-color 80ms'}}>
                      <span style={{width:8,height:8,background:color,flexShrink:0}}/>{s}
                    </button>
                  );
                })}
              </div>
              <Input value={logCustom} onChange={v=>{setLogCustom(v);setLogSubject(null);}} placeholder="or type custom subject..."/>
              <div style={{borderTop:'1px solid var(--v1-rule)',paddingTop:12}}>
                <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:8,fontFamily:'var(--v1-mono)'}}>time studied</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input value={logHours} onChange={e=>setLogHours(e.target.value.replace(/\D/,''))} placeholder="0" style={{...inpStyle,width:60,textAlign:'center'}}/>
                  <span style={{color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:12}}>h</span>
                  <input value={logMins} onChange={e=>setLogMins(e.target.value.replace(/\D/,''))} placeholder="0" style={{...inpStyle,width:60,textAlign:'center'}}/>
                  <span style={{color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:12}}>m</span>
                  <span style={{marginLeft:8,display:'flex',gap:4}}>
                    {[[0,25],[0,45],[1,0],[1,30],[2,0]].map(([h,m])=>(
                      <button key={`${h}${m}`} onClick={()=>{setLogHours(String(h));setLogMins(String(m).padStart(2,'0'));}} style={{...Btn.sm,fontSize:9,padding:'2px 6px'}}>{h?`${h}h`:`${m}m`}{h&&m?`${m}`:''}
                      </button>
                    ))}
                  </span>
                </div>
              </div>
              <Input value={logNote} onChange={setLogNote} placeholder="note (optional)"/>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:9,letterSpacing:'0.14em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)',flexShrink:0}}>rating</span>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setLogRating(r=>r===n?null:n)} style={{width:32,height:32,background:logRating&&logRating>=n?'var(--v1-accent)':'var(--v1-bg)',border:`1px solid ${logRating&&logRating>=n?'var(--v1-accent)':'var(--v1-rule-strong)'}`,color:logRating&&logRating>=n?'var(--v1-bg)':'var(--v1-fg-2)',fontFamily:'var(--v1-mono)',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {logRating&&logRating>=n?'◆':'◇'}
                  </button>
                ))}
                <span style={{fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',marginLeft:4}}>{logRating?`${logRating}/5`:'optional'}</span>
              </div>
              <button
                disabled={!(logSubject||logCustom.trim())||!(parseInt(logHours)||parseInt(logMins))}
                onClick={handleLogSubmit}
                style={{...Btn.md,width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:(logSubject||logCustom.trim())&&(parseInt(logHours)||parseInt(logMins))?'var(--v1-accent)':'transparent',color:(logSubject||logCustom.trim())&&(parseInt(logHours)||parseInt(logMins))?'var(--v1-bg)':'var(--v1-fg-muted)',borderColor:(logSubject||logCustom.trim())&&(parseInt(logHours)||parseInt(logMins))?'var(--v1-accent)':'var(--v1-rule)',opacity:(logSubject||logCustom.trim())&&(parseInt(logHours)||parseInt(logMins))?1:0.5}}>
                ✓ log session
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return(
    <div style={{padding:'48px 40px',display:'flex',flexDirection:'column',alignItems:'center',gap:24}}>
      <div style={{display:'flex',alignItems:'center',gap:10,fontSize:11,letterSpacing:'0.2em',color:sessionState.paused?'var(--v1-fg-muted)':'var(--v1-accent)',fontFamily:'var(--v1-mono)'}}>
        <span style={{width:7,height:7,background:sessionState.paused?'var(--v1-fg-muted)':'var(--v1-accent)',borderRadius:'50%',boxShadow:sessionState.paused?'none':'0 0 14px var(--v1-accent)'}} className={sessionState.paused?'':'v1-pulse'}/>
        {sessionState.paused?'PAUSED':'SESSION ACTIVE'} — {sessionState.subject}
      </div>
      <div style={{fontSize:160,lineHeight:0.88,letterSpacing:'-0.06em',fontWeight:500,color:sessionState.paused?'var(--v1-fg-muted)':'var(--v1-fg)',fontVariantNumeric:'tabular-nums',fontFamily:'var(--v1-mono)',display:'flex',alignItems:'baseline'}}>
        <span style={{fontFamily:'var(--v1-mono)',fontSize:160,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.04em'}}>{fmtClock(elapsed)}</span>
        {!sessionState.paused&&<Cursor size="0.45em" color="var(--v1-accent)"/>}
      </div>
      {(()=>{
        const curBreakOngoing=sessionState.paused&&sessionState.pausedAt?Math.floor((Date.now()-sessionState.pausedAt)/1000):0;
        const totalBreak=(sessionState.breakSecs||0)+curBreakOngoing;
        const effPct=totalBreak>0?Math.round(elapsed/(elapsed+totalBreak)*100):null;
        const cells=[
          ['started',startedStr],
          ['subject',sessionState.subject],
          ['break',totalBreak>0?fmtClock(totalBreak):'—'],
          ['efficiency',effPct!=null?`${effPct}%`:'—'],
        ];
        return(
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0,width:640,border:'1px solid var(--v1-rule)'}}>
            {cells.map(([k,v],i)=>(
              <div key={k} style={{padding:'12px 16px',borderRight:i<3?'1px solid var(--v1-rule)':'none'}}>
                <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>{k}</div>
                <div style={{fontSize:18,color:k==='efficiency'&&effPct!=null?(effPct>=80?'var(--v1-up)':effPct>=60?'var(--v1-fg)':'var(--v1-down)'):'var(--v1-fg)',marginTop:4,fontVariantNumeric:'tabular-nums',fontFamily:'var(--v1-mono)'}}>{v}</div>
              </div>
            ))}
          </div>
        );
      })()}
      {awaitRating&&(
        <div style={{padding:'18px 24px',border:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev)',display:'flex',flexDirection:'column',alignItems:'center',gap:12,width:400}}>
          <div style={{fontSize:10,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>rate this session (optional)</div>
          <div style={{display:'flex',gap:10}}>
            {[1,2,3,4,5].map(n=>(
              <button key={n} onClick={()=>setRating(n)} style={{width:40,height:40,background:rating===n?'var(--v1-accent)':'var(--v1-bg)',border:`1px solid ${rating===n?'var(--v1-accent)':'var(--v1-rule-strong)'}`,color:rating===n?'var(--v1-bg)':'var(--v1-fg-2)',fontFamily:'var(--v1-mono)',fontSize:16,cursor:'pointer',letterSpacing:'0',display:'flex',alignItems:'center',justifyContent:'center'}}>
                {rating&&rating>=n?'◆':'◇'}
              </button>
            ))}
          </div>
          <div style={{fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>{rating?`${rating}/5 selected`:'skip = no rating'} · click commit again to finalize</div>
        </div>
      )}
      <div style={{display:'flex',gap:10}}>
        <button onClick={onPause} style={Btn.md}>{sessionState.paused?'resume':'pause'}</button>
        <button onClick={handleCommitClick} style={{...Btn.md,background:'var(--v1-accent)',color:'var(--v1-bg)',borderColor:'var(--v1-accent)'}}>{awaitRating?'commit (confirm) ✓':'commit ✓'}</button>
        <button onClick={()=>{setAwaitRating(false);setRating(null);onDiscard();}} style={Btn.md}>discard</button>
      </div>

      {/* ── POMODORO STRIP ── */}
      <div style={{width:640,border:'1px solid var(--v1-rule)'}}>
        <div style={{display:'flex',alignItems:'center',padding:'8px 14px',gap:10,borderBottom:pomOn?'1px solid var(--v1-rule)':'none',background:'var(--v1-bg-elev)'}}>
          <span style={{fontSize:9,letterSpacing:'0.2em',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',textTransform:'uppercase',flex:1}}>pomodoro</span>
          {pomOn&&!editingPom&&(
            <button onClick={()=>{setPomWorkDraft(String(pomWork));setPomBreakDraft(String(pomBreak));setEditingPom(true);}} style={{...Btn.sm,fontSize:9,padding:'2px 8px'}}>edit</button>
          )}
          {pomOn&&editingPom&&(
            <button onClick={applyPomSettings} style={{...Btn.sm,fontSize:9,padding:'2px 8px',background:'var(--v1-accent)',color:'var(--v1-bg)',borderColor:'var(--v1-accent)'}}>apply</button>
          )}
          <button onClick={togglePom} style={{...Btn.sm,fontSize:9,padding:'2px 10px',background:pomOn?'rgba(79,123,255,0.15)':'transparent',borderColor:pomOn?'var(--v1-accent)':'var(--v1-rule-strong)',color:pomOn?'var(--v1-accent)':'var(--v1-fg-2)'}}>{pomOn?'● on':'○ off'}</button>
        </div>
        {pomOn&&(
          <div style={{padding:'12px 14px'}}>
            {editingPom?(
              <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',letterSpacing:'0.12em',textTransform:'uppercase'}}>work</span>
                <input value={pomWorkDraft} onChange={e=>setPomWorkDraft(e.target.value.replace(/\D/,''))} style={{width:48,background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'4px 6px',textAlign:'center',outline:'none'}}/>
                <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>min</span>
                <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',letterSpacing:'0.12em',textTransform:'uppercase',marginLeft:8}}>break</span>
                <input value={pomBreakDraft} onChange={e=>setPomBreakDraft(e.target.value.replace(/\D/,''))} style={{width:48,background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'4px 6px',textAlign:'center',outline:'none'}}/>
                <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>min</span>
                <div style={{display:'flex',gap:4,marginLeft:8}}>
                  {[[25,5],[50,10],[90,15]].map(([w,b])=>(
                    <button key={w} onClick={()=>{setPomWorkDraft(String(w));setPomBreakDraft(String(b));}} style={{...Btn.sm,fontSize:9,padding:'2px 7px',background:pomWorkDraft===String(w)&&pomBreakDraft===String(b)?'rgba(79,123,255,0.15)':'transparent',borderColor:pomWorkDraft===String(w)&&pomBreakDraft===String(b)?'var(--v1-accent)':'var(--v1-rule-strong)',color:pomWorkDraft===String(w)&&pomBreakDraft===String(b)?'var(--v1-accent)':'var(--v1-fg-2)'}}>{w}/{b}</button>
                  ))}
                </div>
              </div>
            ):(
              <div style={{display:'flex',alignItems:'center',gap:14}}>
                <span style={{fontSize:9,fontFamily:'var(--v1-mono)',letterSpacing:'0.18em',textTransform:'uppercase',color:pomPhase==='work'?'var(--v1-accent)':'#22C55E',width:36}}>{pomPhase}</span>
                <span style={{fontSize:24,fontFamily:'var(--v1-mono)',fontVariantNumeric:'tabular-nums',color:'var(--v1-fg)',minWidth:64}}>{pomRemaining!=null?fmtClock(pomRemaining):'—'}</span>
                <div style={{flex:1,height:4,background:'var(--v1-bg-elev-2)',position:'relative',overflow:'hidden'}}>
                  {pomRemaining!=null&&pomPhaseSecs&&(
                    <div style={{position:'absolute',inset:0,width:`${((pomPhaseSecs-pomRemaining)/pomPhaseSecs)*100}%`,background:pomPhase==='work'?'var(--v1-accent)':'#22C55E',transition:'width 1s linear'}}/>
                  )}
                </div>
                <span style={{fontSize:9,fontFamily:'var(--v1-mono)',color:'var(--v1-fg-muted)',flexShrink:0}}>{pomWork}m · {pomBreak}m break</span>

            )}
          </div>
        )}
      </div>

    </div>
  );
}

/* ── LOG ── */
function Log({sessions,filterSubjects,filterMinProd}){
  const all=sessions||D.sessions;
  const list=all.filter(s=>{
    if(filterSubjects&&filterSubjects.length>0&&!filterSubjects.includes(s.subject))return false;
    if(filterMinProd&&filterMinProd>0&&(s.productivity==null||s.productivity<filterMinProd))return false;
    return true;
  });
  if(list.length===0&&sessions.length===0){
    return(
      <Block label="sessions.log" meta="0 entries">
        <EmptyState icon="◇" title="no sessions logged yet"
          hint="complete a timer session or log time manually in the session tab"
          action={null}
        />
      </Block>
    );
  }
  const hasEff=list.some(s=>s.efficiency!=null);
  return(
    <Block label="sessions.log" meta={`${list.length}${all.length!==list.length?` / ${all.length}`:''} entries`}>
      <Tbl cols={['','date','time','subject','dur','prod',...(hasEff?['eff','break']:[]),'note']} widths={['4px','64px','52px','100px','72px','40px',...(hasEff?['44px','68px']:[]),'1fr']}>
        {list.map((s,i)=>(
          <Row key={i}>
            <span style={{width:4,height:18,background:s.color,display:'block'}}/>
            <Cell mono>{s.day}</Cell>
            <Cell mono dim>{s.time||'—'}</Cell>
            <Cell>{s.subject}</Cell>
            <Cell mono right>{s.duration}</Cell>
            <Cell mono right tone={s.productivity!=null&&s.productivity>=4?'up':'flat'}>{s.productivity!=null?s.productivity.toFixed(1):'—'}</Cell>
            {hasEff&&<Cell mono right tone={s.efficiency!=null?(s.efficiency>=80?'up':s.efficiency>=60?'flat':'down'):'flat'}>{s.efficiency!=null?`${s.efficiency}%`:'—'}</Cell>}
            {hasEff&&<Cell mono dim>{s.breakSecs>0?fmtClock(s.breakSecs):'—'}</Cell>}
            <Cell dim sm>{s.note||'—'}</Cell>
          </Row>
        ))}
      </Tbl>
    </Block>
  );
}

/* ── CALENDAR ── */
function DayModal({sel,today,evtsByDay,todosByDay,ts,setTs,extras,setExtras,onClose,firstDow:firstDowProp,monthLabel}){
  const[newTitle,setNewTitle]=useState('');
  const[newPrio,setNewPrio]=useState('med');
  const[newSubj,setNewSubj]=useState(null);
  const allTodos=[...D.todos,...extras];
  const selEvts=(evtsByDay[sel]||[]).slice().sort((a,b)=>a.time.localeCompare(b.time));
  const todosByDayLocal=useMemo(()=>{const m={};allTodos.forEach(t=>{(m[t.day]=m[t.day]||[]).push(t);});return m;},[allTodos]);
  const selTodos=todosByDayLocal[sel]||[];
  const selDone=selTodos.filter(t=>ts[t.id]??t.done).length;
  const firstDow=firstDowProp!=null?firstDowProp:D.today.firstDow;
  const dow=(firstDow+sel-1)%7;
  const DOWL=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

  useEffect(()=>{
    const handler=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[onClose]);

  const addTodo=()=>{
    const title=newTitle.trim();if(!title)return;
    const id=`usr_${Date.now()}`;
    const subj=newSubj?D.subjects.find(s=>s.name===newSubj):null;
    setExtras(a=>[...a,{id,day:sel,title,subject:subj?.name||null,color:subj?.color||'#5C6776',priority:newPrio,done:false}]);
    setNewTitle('');
  };

  return(

          {/* Events */}
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--v1-rule)'}}>

                <div><div style={{fontFamily:'var(--v1-sans)',fontSize:12,color:'var(--v1-fg)'}}>{e.title}{e.flagged&&<span style={{color:'var(--v1-down)',marginLeft:8,fontSize:11}}>! exam</span>}</div><div style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)'}}>{e.subject||'no subject'}</div></div>
                <button style={{...Btn.sm,padding:'3px 8px',fontSize:10}}>edit</button>
              </div>)}

          {/* Todos */}
          <div style={{padding:'14px 18px'}}>
            <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:8,display:'flex',alignItems:'center',gap:8,fontFamily:'var(--v1-mono)'}}>
              <span style={{color:'var(--v1-accent)'}}>▸</span>todos<span style={{flex:1}}/>{selTodos.length>0&&<span style={{color:'var(--v1-fg-3)'}}>{selDone}/{selTodos.length}</span>}{selTodos.length===0&&<span>none yet</span>}

                  onClick={()=>setTs(s=>({...s,[t.id]:!(s[t.id]??t.done)}))}

                  <span style={{fontFamily:'var(--v1-sans)',fontSize:12,color:'var(--v1-fg)',textDecoration:isDone?'line-through':'none'}}>{t.title}</span>
                  <span style={{fontFamily:'var(--v1-mono)',fontSize:9,padding:'2px 6px',color:t.priority==='high'?'var(--v1-down)':t.priority==='med'?'#F2C14E':'var(--v1-fg-muted)',border:'1px solid currentColor',letterSpacing:'0.1em',textTransform:'uppercase'}}>{t.priority||'low'}</span>
                  <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)',minWidth:52,textAlign:'right'}}>{t.subject||'—'}</span>

                {['low','med','high'].map(p=>{const a=newPrio===p;return<button key={p} onClick={()=>setNewPrio(p)} style={{fontFamily:'var(--v1-mono)',fontSize:9,background:a?'var(--v1-bg-hover)':'transparent',color:a?'var(--v1-fg)':'var(--v1-fg-3)',border:'none',borderRight:'1px solid var(--v1-rule)',padding:'0 8px',cursor:'pointer',letterSpacing:'0.1em',textTransform:'uppercase'}}>{p}</button>;})}
              </div>
              <select value={newSubj||''} onChange={e=>setNewSubj(e.target.value||null)} style={{fontFamily:'var(--v1-mono)',fontSize:11,background:'var(--v1-bg)',color:'var(--v1-fg-2)',border:'1px solid var(--v1-rule-strong)',padding:'0 8px',cursor:'pointer',outline:'none'}}>
                <option value="">no subject</option>
                {D.subjects.map(s=><option key={s.name} value={s.name}>{s.name}</option>)}

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Calendar(){
  const TODAY_MONTH={year:_now.getFullYear(),month:_now.getMonth()};
  const today=_now.getDate();
  const[sel,setSel]=useState(null);
  const[ts,setTs]=useState(()=>{const m={};D.todos.forEach(t=>{m[t.id]=t.done;});return m;});
  const[extras,setExtras]=useState([]);
  const[calMonth,setCalMonth]=useState(TODAY_MONTH);

  const allTodos=[...D.todos,...extras];
  const evtsByDay=useMemo(()=>{const m={};D.events.forEach(e=>{(m[e.day]=m[e.day]||[]).push(e);});return m;},[]);
  const todosByDay=useMemo(()=>{const m={};allTodos.forEach(t=>{(m[t.day]=m[t.day]||[]).push(t);});return m;},[allTodos]);

  // Compute dynamic month info from calMonth state
  const daysInMonth=new Date(calMonth.year,calMonth.month+1,0).getDate();
  // JS Date: 0=Sun,1=Mon,...6=Sat; we want 0=Mon
  const rawDow=new Date(calMonth.year,calMonth.month,1).getDay();
  const firstDow=(rawDow+6)%7; // convert to Mon=0
  const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthName=`${MONTH_NAMES[calMonth.month]} ${calMonth.year}`;
  const isCurrentMonth=calMonth.year===TODAY_MONTH.year&&calMonth.month===TODAY_MONTH.month;

  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  const DOWS=['mon','tue','wed','thu','fri','sat','sun'];

  // Week summary — compute current Mon–Sun dynamically
  const todayDow=(_now.getDay()+6)%7; // 0=Mon
  const wkMonDate=_now.getDate()-todayDow;
  const wkDays=Array.from({length:7},(_,i)=>wkMonDate+i).filter(d=>d>=1&&d<=daysInMonth);
  const wkEvts=wkDays.flatMap(d=>evtsByDay[d]||[]);
  const wkTodos=wkDays.flatMap(d=>todosByDay[d]||[]);
  const wkDone=wkTodos.filter(t=>ts[t.id]??t.done).length;
  const wkHigh=wkTodos.filter(t=>t.priority==='high'&&!(ts[t.id]??t.done)).length;
  const wkMonStr=`mon ${Math.max(1,wkMonDate)}`;
  const wkSunStr=`sun ${Math.min(daysInMonth,wkMonDate+6)}`;
  const wkMeta=`this week · ${wkMonStr} — ${wkSunStr} ${_now.toLocaleDateString('en-GB',{month:'short'}).toLowerCase()}`;

  const prevMonth=()=>setCalMonth(cm=>{const m=cm.month-1;return m<0?{year:cm.year-1,month:11}:{year:cm.year,month:m};});
  const nextMonth=()=>setCalMonth(cm=>{const m=cm.month+1;return m>11?{year:cm.year+1,month:0}:{year:cm.year,month:m};});

  // events and todos only show for current month (May) — others show empty
  const activeEvtsByDay=isCurrentMonth?evtsByDay:{};
  const activeTodosByDay=isCurrentMonth?todosByDay:{};

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Week summary */}
      <div style={{flexShrink:0}}>
        <Block label="week.summary" meta={wkMeta}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
            <KPI k="events" v={wkEvts.length} sub="this week" tone="flat"/>
            <KPI k="todos_open" v={wkTodos.length-wkDone} sub={`${wkDone}/${wkTodos.length} done`}/>
            <KPI k="high_priority" v={wkHigh} sub="due this week" tone={wkHigh>0?'down':'up'}/>
            <KPI k="flagged" v={wkEvts.filter(e=>e.flagged).length} sub="exams / deadlines" tone={wkEvts.filter(e=>e.flagged).length>0?'down':'flat'}/>
          </div>
        </Block>
      </div>

      {/* Full-width month grid */}
      <div style={{flex:1,minHeight:0,overflowY:'auto'}}>
        <header style={{display:'flex',alignItems:'center',gap:12,padding:'10px 18px',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',position:'sticky',top:0,zIndex:10}}>
          <span style={{color:'var(--v1-accent)'}}>◆</span>
          <span style={{color:'var(--v1-fg-2)'}}>{monthName.toLowerCase()}</span>
          <span style={{flex:1}}/>
          <button onClick={prevMonth} style={Btn.sm}>‹</button>
          <button onClick={()=>{setCalMonth(TODAY_MONTH);setSel(today);}} style={{...Btn.sm,borderColor:'var(--v1-accent)',color:'var(--v1-accent)'}}>today</button>
          <button onClick={nextMonth} style={Btn.sm}>›</button>
        </header>
        {/* Single unified grid: DOW labels + day cells as direct children → perfect column alignment */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
          {DOWS.map((d,i)=>(
            <div key={`h${i}`} style={{padding:'6px 0',fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',borderRight:i<6?'1px solid var(--v1-rule)':'none',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev-2)',fontFamily:'var(--v1-mono)',textAlign:'center',position:'sticky',top:41,zIndex:9}}>
              {d}
            </div>
          ))}
          {cells.map((d,ci)=>{
            const col=ci%7;
            if(d===null)return(
              <div key={`e${ci}`} style={{height:90,borderRight:col<6?'1px solid var(--v1-rule)':'none',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev-2)',opacity:0.35}}/>
            );
            const evts=activeEvtsByDay[d]||[],todos=activeTodosByDay[d]||[];
            const open=todos.filter(t=>!(ts[t.id]??t.done)).length;
            const done=todos.filter(t=>(ts[t.id]??t.done)).length;
            const isTdy=d===today,isSel=sel===d,hasFlag=evts.some(e=>e.flagged);
            return(
              <button key={`d${ci}`} onClick={()=>setSel(d)} style={{height:90,background:isSel?'rgba(79,123,255,0.10)':isTdy?'rgba(79,123,255,0.04)':'transparent',border:'none',borderRight:col<6?'1px solid var(--v1-rule)':'none',borderBottom:'1px solid var(--v1-rule)',borderTop:isTdy?'2px solid var(--v1-accent)':'2px solid transparent',padding:'6px 8px',cursor:'pointer',fontFamily:'var(--v1-mono)',textAlign:'left',display:'flex',flexDirection:'column',gap:4,color:'var(--v1-fg)',position:'relative',transition:'background 80ms'}}
                onMouseEnter={e=>{if(!isSel&&!isTdy)e.currentTarget.style.background='rgba(79,123,255,0.05)';}}
                onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=isTdy?'rgba(79,123,255,0.04)':'transparent';}}>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span style={{fontSize:12,fontVariantNumeric:'tabular-nums',color:isTdy?'var(--v1-accent)':isSel?'var(--v1-fg)':'var(--v1-fg-2)',fontWeight:isTdy?700:400}}>{String(d).padStart(2,'0')}</span>
                  {isTdy&&<span style={{fontSize:7,letterSpacing:'0.14em',color:'var(--v1-accent)',fontWeight:600}}>TODAY</span>}
                  {hasFlag&&<span style={{marginLeft:'auto',color:'var(--v1-down)',fontSize:9}}>!</span>}
                </div>
                {evts.length>0&&(
                  <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                    {evts.slice(0,5).map((e,ii)=><span key={ii} style={{width:6,height:6,background:e.color,flexShrink:0,borderRadius:1}}/>)}
                    {evts.length>5&&<span style={{fontSize:8,color:'var(--v1-fg-muted)'}}>+{evts.length-5}</span>}
                  </div>
                )}
                {todos.length>0&&(
                  <div style={{marginTop:'auto',fontSize:8,color:open>0?'var(--v1-fg-muted)':'var(--v1-up)',fontVariantNumeric:'tabular-nums'}}>
                    {done}/{todos.length} {open===0?'✓':'todo'}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* Day detail popup */}
      {sel!==null&&<DayModal sel={sel} today={isCurrentMonth?today:-1} evtsByDay={activeEvtsByDay} todosByDay={activeTodosByDay} ts={ts} setTs={setTs} extras={extras} setExtras={setExtras} onClose={()=>setSel(null)} firstDow={firstDow} monthLabel={monthName.toLowerCase()}/>}
    </div>
  );
}

/* ── RANK ── */
function Leader(){
  const[scope,setScope]=useState('7d');
  if(D.leaderboard.length<=1){
    return(
      <Block label="rank.leaderboard" meta="ranked by hours">
        <EmptyState icon="🏆" title="leaderboard is empty"
          hint="invite study partners to compete — rankings appear once you have friends"
        />
      </Block>
    );
  }
  const users=D.leaderboard.map((u,i)=>({...u,i,series:userSeries(i,scope)}));
  const ranked=users.map(u=>({...u,total:sumH(u.series)})).sort((a,b)=>b.total-a.total);
  const me=ranked.find(u=>u.isYou),myRank=ranked.findIndex(u=>u.isYou)+1;
  const top=ranked[0],second=ranked[1];
  const lead=myRank===1?me.total-second.total:me.total-top.total;
  const chartSeries=ranked.slice(0,5).map(u=>({name:u.isYou?'you':u.name,color:u.isYou?'var(--v1-accent)':u.color,values:u.series,dim:!u.isYou&&u.i>0}));
  const sc=SCOPES.find(s=>s.id===scope);
  return(
    <div>
      <Block label={`rank.summary · ${scopeLabel(scope)}`} meta="ranked by hours studied" action={<ScopePicker scope={scope} onScope={setScope}/>}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
          <KPI k="your_rank" v={`#${myRank}`} sub={`of ${ranked.length}`} tone={myRank===1?'up':'flat'}/>
          <KPI k="hours" v={fmtHM(me.total)} sub={`${(me.total/sc.n).toFixed(2)}h / ${sc.unit}`}/>
          <KPI k={myRank===1?'lead_vs_#2':'gap_vs_#1'} v={`${lead>=0?'+':'−'}${fmtHM(Math.abs(lead))}`} sub={myRank===1?`vs ${second.name}`:`vs ${top.name}`} tone={lead>=0?'up':'down'}/>
          <KPI k="trend" v={(me.series[me.series.length-1]/Math.max(0.01,me.series[0])*100-100).toFixed(0)+'%'} sub="end vs start" tone={me.series[me.series.length-1]>=me.series[0]?'up':'down'}/>
        </div>
      </Block>
      <Block label="rank.chart" meta={`top 5 · ${sc.unit} basis`}>
        <BigChart series={chartSeries} scope={scope} height={260} fillFirst yLabel="h"/>
      </Block>
      <Block label="rank.full" meta={`${ranked.length} members`}>
        <Tbl cols={['#','who','streak','subj','trend',`${sc.label} hrs`,'share','d_vs_#1']} widths={['32px','auto','60px','40px','110px','80px','120px','80px']}>
          {ranked.map((u,i)=>{const share=u.total/top.total,delta=u.total-top.total;return(
            <Row key={u.name} hi={u.isYou}>
              <Cell mono dim>#{String(i+1).padStart(2,'0')}</Cell>
              <Cell><span style={{display:'inline-flex',alignItems:'center',gap:8}}><span style={{width:7,height:7,background:u.color,borderRadius:1}}/><span style={{color:u.isYou?'var(--v1-accent)':'var(--v1-fg)'}}>{u.isYou?'you':u.name}</span></span></Cell>
              <Cell mono dim>{u.streak}d</Cell>
              <Cell mono dim>{u.subjects}</Cell>
              <Cell><Spark data={u.series} w={104} h={20} color={u.isYou?'var(--v1-accent)':'var(--v1-fg-3)'} sw={1}/></Cell>
              <Cell mono right>{fmtHM(u.total)}</Cell>
              <Cell><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{flex:1,height:4,background:'var(--v1-bg-elev-2)',position:'relative'}}><div style={{position:'absolute',inset:0,width:`${share*100}%`,background:u.isYou?'var(--v1-accent)':u.color}}/></div><span style={{fontSize:10,color:'var(--v1-fg-muted)',width:30,textAlign:'right'}}>{Math.round(share*100)}%</span></div></Cell>
              <Cell mono right dim tone={i===0?'flat':delta>=0?'up':'down'}>{i===0?'—':`${delta>=0?'+':'−'}${fmtHM(Math.abs(delta))}`}</Cell>
            </Row>
          );})}
        </Tbl>
      </Block>
    </div>
  );
}

    <EmptyState icon="◰" title="no focus data yet"
      hint="study sessions will build your hourly heatmap over time"
    />
  );
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'40px repeat(24,1fr)',gap:1}}>

        {Array.from({length:24},(_,h)=><div key={h} style={{fontSize:9,color:'var(--v1-fg-muted)',textAlign:'center',fontFamily:'var(--v1-mono)',fontVariantNumeric:'tabular-nums'}}>{h%3===0?String(h).padStart(2,'0'):''}</div>)}
        {D.heatmap.map((row,d)=>(
          <React.Fragment key={d}>
            <div style={{fontSize:10,color:'var(--v1-fg-3)',display:'flex',alignItems:'center',fontFamily:'var(--v1-mono)'}}>{days[d]}</div>
            {row.map((v,h)=><div key={h} title={`${days[d]} ${String(h).padStart(2,'0')}:00`} style={{height:24,background:v>0.05?`rgba(79,123,255,${v.toFixed(2)})`:'var(--v1-bg-elev-2)',cursor:'default'}}/>)}
          </React.Fragment>
        ))}

      <div style={{marginTop:12,display:'flex',gap:5,alignItems:'center',fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>

      </div>
    </div>

}

function Heatmap({weeklyTarget,setWeeklyTarget}){
  const[mode,setMode]=useState('focus');
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(String(weeklyTarget));
  const wkHours=0;
  const pace=Math.round((wkHours/weeklyTarget)*100);
  const paceColor=pace>=100?'var(--v1-up)':pace>=75?'var(--v1-fg-2)':'var(--v1-down)';
  const commitTarget=()=>{const n=parseFloat(draft);if(!isNaN(n)&&n>0){setWeeklyTarget(Math.round(n));setEditing(false);}};
  return(
    <div>
      <Block label="hours.summary" meta="last 30d">
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
          <KPI k="best_hour"   v="—"   sub="no data yet"/>
          <KPI k="best_day"    v="—"   sub="no data yet"/>
          <KPI k="weakest"     v="—"   sub="no data yet"/>
          <KPI k="active_days" v="0 / 30" sub="streak 0d"/>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,border:'1px solid var(--v1-rule)'}}>

          <div style={{padding:'18px 20px',borderRight:'1px solid var(--v1-rule)',display:'flex',flexDirection:'column',gap:10}}>
