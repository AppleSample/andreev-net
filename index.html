              {editing?(
                <input value={draft} onChange={e=>setDraft(e.target.value)}
                  onBlur={commitTarget}
                  onKeyDown={e=>{if(e.key==='Enter')commitTarget();if(e.key==='Escape')setEditing(false);}}
                  autoFocus
                  style={{width:64,fontFamily:'var(--v1-mono)',fontSize:28,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.03em',background:'transparent',border:'none',borderBottom:'1px solid var(--v1-accent)',color:'var(--v1-fg)',outline:'none',textAlign:'center'}}/>
              ):(
                <span onClick={()=>{setDraft(String(weeklyTarget));setEditing(true);}} style={{fontSize:28,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.03em',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',cursor:'text',borderBottom:'1px solid var(--v1-rule-strong)',padding:'0 4px'}}>{weeklyTarget}<span style={{fontSize:14,color:'var(--v1-fg-muted)',marginLeft:3}}>h</span></span>
              )}
              <button onClick={()=>{const n=weeklyTarget+1;setWeeklyTarget(n);setDraft(String(n));}} style={{...Btn.sm,padding:'4px 10px',fontSize:14,lineHeight:1}}>+</button>
            </div>
            <span style={{fontSize:10,color:'var(--v1-fg-3)',fontFamily:'var(--v1-mono)'}}>click the number to type · ± buttons for ±1h</span>
          </div>
          {/* Right: pace display */}
          <div style={{padding:'18px 20px',display:'flex',flexDirection:'column',gap:8}}>
            <span style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>this week pace</span>
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span style={{fontSize:44,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.04em',color:paceColor,fontFamily:'var(--v1-mono)',fontWeight:500}}>{pace}%</span>
              <span style={{fontSize:12,color:'var(--v1-fg-3)',fontFamily:'var(--v1-mono)'}}>{wkHours.toFixed(1)}h / {weeklyTarget}h</span>
            </div>
            {/* Progress bar */}
            <div style={{height:6,background:'var(--v1-bg-elev-2)',position:'relative',marginTop:4}}>
              <div style={{position:'absolute',inset:0,width:`${Math.min(100,pace)}%`,background:paceColor,transition:'width 300ms'}}/>
              {weeklyTarget>0&&<div style={{position:'absolute',left:'100%',top:-3,width:1,height:12,background:'var(--v1-fg-muted)',transform:'translateX(-1px)'}}/>}
            </div>
            <span style={{fontSize:10,color:'var(--v1-fg-3)',fontFamily:'var(--v1-mono)'}}>{pace>=100?'target reached ✓':pace>=75?`${(weeklyTarget-wkHours).toFixed(1)}h to go · on track`:`${(weeklyTarget-wkHours).toFixed(1)}h remaining · pick up pace`}</span>
          </div>
        </div>
      </Block>
      <Block label={mode==='focus'?'hourly_focus.grid':'daily_totals.grid'} meta={mode==='focus'?'focus quality · last 7 days':'hours studied · last 18 weeks'}
        action={<ModePicker mode={mode} onMode={setMode} modes={[{id:'focus',label:'FOCUS QUALITY',icon:'◰'},{id:'daily',label:'HOURS / DAY',icon:'▦'}]}/>}>
        {mode==='focus'?<FocusGrid/>:<div style={{padding:'20px 0',color:'var(--v1-fg-3)',fontFamily:'var(--v1-mono)',fontSize:11}}>daily contribution grid · scroll right to see older weeks</div>}
      </Block>
      <Block label="best_windows" meta="top 3 hour-of-day · last 30d">
        <EmptyState icon="◷" title="no peak hours identified yet" hint="complete more sessions to discover your best study windows"/>
      </Block>
    </div>
  );
}

/* ── SUBJECTS ── */
function SubjectsDonut({scoped,total}){
  const SIZE=280,STROKE=38,R=(SIZE-STROKE)/2,C=2*Math.PI*R;
  let acc=0;
  const segs=scoped.map(s=>{const pct=s.total/total,seg={...s,pct,len:pct*C,offset:acc};acc+=pct;return seg;});
  const[hov,setHov]=useState(null);
  const focus=hov?segs.find(s=>s.name===hov):[...segs].sort((a,b)=>b.pct-a.pct)[0];
  return(
    <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:24,alignItems:'center'}}>
      <div style={{display:'flex',flexDirection:'column',gap:3}}>
        <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',padding:'4px 8px 6px',borderBottom:'1px solid var(--v1-rule)',marginBottom:4,fontFamily:'var(--v1-mono)'}}>▸ allocation</div>
        {[...segs].sort((a,b)=>b.pct-a.pct).map(s=>(
          <div key={s.name} onMouseEnter={()=>setHov(s.name)} onMouseLeave={()=>setHov(null)} style={{display:'grid',gridTemplateColumns:'10px 1fr 72px 38px',alignItems:'center',gap:10,padding:'5px 8px',cursor:'pointer',background:hov===s.name?'rgba(79,123,255,0.06)':'transparent',borderLeft:hov===s.name?'2px solid var(--v1-accent)':'2px solid transparent',transition:'background 60ms'}}>
            <span style={{width:9,height:9,background:s.color}}/>
            <span style={{fontSize:12,color:'var(--v1-fg-2)',fontFamily:'var(--v1-sans)'}}>{s.name}</span>
            <span style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg)',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{fmtHM(s.total)}</span>
            <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{Math.round(s.pct*100)}%</span>
          </div>
        ))}
      </div>
      <div style={{position:'relative',width:SIZE,height:SIZE}}>
        <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`} style={{transform:'rotate(-90deg)'}}>
          <circle cx={SIZE/2} cy={SIZE/2} r={R} fill="none" stroke="var(--v1-bg-elev-2)" strokeWidth={STROKE}/>
          {segs.map(s=><circle key={s.name} cx={SIZE/2} cy={SIZE/2} r={R} fill="none" stroke={s.color} strokeWidth={STROKE} strokeDasharray={`${s.len} ${C-s.len}`} strokeDashoffset={-s.offset*C} onMouseEnter={()=>setHov(s.name)} onMouseLeave={()=>setHov(null)} style={{cursor:'pointer',transition:'opacity 80ms',opacity:hov&&hov!==s.name?0.4:1}}/>)}
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
          <div style={{fontSize:9,color:'var(--v1-fg-muted)',letterSpacing:'0.16em',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>{hov||'total'}</div>
          <div style={{fontSize:28,color:'var(--v1-fg)',fontVariantNumeric:'tabular-nums',letterSpacing:'-0.03em',marginTop:4,fontFamily:'var(--v1-mono)'}}>{fmtHM(hov?(segs.find(s=>s.name===hov)?.total||0):total)}</div>
          <div style={{fontSize:10,color:'var(--v1-fg-muted)',marginTop:2,fontFamily:'var(--v1-mono)'}}>{hov?`${Math.round((segs.find(s=>s.name===hov)?.pct||0)*100)}%`:`${scoped.length} subjects`}</div>
        </div>
      </div>
      <div>
        <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',padding:'4px 0 6px',borderBottom:'1px solid var(--v1-rule)',marginBottom:10,fontFamily:'var(--v1-mono)'}}>▸ {hov?'hovered':'top subject'}</div>
        {focus&&<div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}><span style={{width:12,height:24,background:focus.color}}/><div><div style={{fontSize:16,color:'var(--v1-fg)',fontFamily:'var(--v1-sans)'}}>{focus.name}</div><div style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)'}}>{Math.round(focus.pct*100)}% of total</div></div></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
            {[['hours',fmtHM(focus.total)],['sessions',focus.sessions||0],['prod',focus.productivity?(focus.productivity.toFixed(1)+'/5'):'—'],['last',focus.lastStudied||'—']].map(([k,v])=>(
              <div key={k} style={{padding:'8px 10px',border:'1px solid var(--v1-rule)'}}>
                <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>{k}</div>
                <div style={{fontFamily:'var(--v1-mono)',fontSize:14,fontVariantNumeric:'tabular-nums',color:'var(--v1-fg)',marginTop:2}}>{v}</div>
              </div>
            ))}
          </div>
        </div>}
      </div>
    </div>
  );
}

const SUBJ_KEY='andreev_subjects';
function loadSubjects(userId){try{return JSON.parse(localStorage.getItem(SUBJ_KEY+'_'+userId)||'[]');}catch{return[];}}
function saveSubjects(userId,s){localStorage.setItem(SUBJ_KEY+'_'+userId,JSON.stringify(s));}

function Subjects({sessions=[],user}){
  const uid=user?.id||'guest';
  const[scope,setScope]=useState('7d');
  const[mode,setMode]=useState('donut');
  const[manageOpen,setManageOpen]=useState(false);
  const[subjs,setSubjsRaw]=useState(()=>loadSubjects(uid));
  const[name,setName]=useState('');
  const[col,setCol]=useState(SUBJ_COLORS[0]);

  const setSubjs=s=>{const next=typeof s==='function'?s(subjs):s;setSubjsRaw(next);saveSubjects(uid,next);};

  const sc=SCOPES.find(s=>s.id===scope);
  const cutoff=Date.now()-sc.days*86400000;

  // compute real stats from sessions for each subject
  const scoped=subjs.map(s=>{
    const all=sessions.filter(x=>(x.subject||'').toLowerCase()===s.name.toLowerCase());
    const inScope=all.filter(x=>{try{return new Date(x.date||x.day).getTime()>=cutoff;}catch{return true;}});
    const totalSecs=inScope.reduce((a,x)=>a+(x.secs||0),0);
    const totalH=totalSecs/3600;
    const avgProd=all.length?all.reduce((a,x)=>a+(x.productivity||0),0)/all.length:0;
    const last=all.length?all[all.length-1]?.day||'never':'never';
    // build a simple per-day sparkline for the scope window
    const n=Math.min(sc.n,28);
    const spark=Array.from({length:n},(_,i)=>{
      const dayStart=Date.now()-(n-1-i)*86400000;
      const dayEnd=dayStart+86400000;
      const h=sessions.filter(x=>{
        try{const t=new Date(x.date||x.day).getTime();return t>=dayStart&&t<dayEnd&&(x.subject||'').toLowerCase()===s.name.toLowerCase();}catch{return false;}
      }).reduce((a,x)=>a+(x.secs||0)/3600,0);
      return h;
    });
    return{...s,series:spark,total:totalH,sessions:all.length,productivity:avgProd,lastStudied:last};
  });
  const grand=scoped.reduce((a,s)=>a+s.total,0);

  const addSubj=()=>{
    const n=name.trim().toLowerCase();
    if(!n)return;
    if(subjs.find(s=>s.name===n))return;
    setSubjs(a=>[...a,{id:Date.now(),name:n,color:col}]);
    setName('');setCol(SUBJ_COLORS[subjs.length%SUBJ_COLORS.length]);
  };

  return(
    <div>
      {scoped.length===0?(
        <Block label="subjects.summary" meta="no subjects yet" action={<button onClick={()=>setManageOpen(true)} style={Btn.sm}>+ add subject</button>}>
          <EmptyState title="no subjects tracked yet"
            hint="add subjects you study — stats and charts fill in as you log sessions"
            action={<button onClick={()=>setManageOpen(true)} style={{fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.12em',background:'var(--v1-accent)',border:'none',color:'var(--v1-bg)',padding:'6px 16px',cursor:'pointer',fontWeight:600}}>+ add your first subject</button>}
          />
        </Block>
      ):(
        <div>
          <Block label="subjects.summary" meta={`${scoped.length} subject${scoped.length!==1?'s':''} · ${fmtHM(grand)} · ${scopeLabel(scope)}`}
            action={<span style={{display:'inline-flex',gap:8,alignItems:'center'}}><ScopePicker scope={scope} onScope={setScope}/><button onClick={()=>setManageOpen(true)} style={Btn.sm}>+ manage</button></span>}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
              <KPI k="total" v={fmtHM(grand)} sub={`${sc.label} window`}/>
              {grand>0
                ?<KPI k="top_subject" v={[...scoped].sort((a,b)=>b.total-a.total)[0].name} sub={fmtHM([...scoped].sort((a,b)=>b.total-a.total)[0].total)} tone="up"/>
                :<KPI k="top_subject" v="—" sub="no sessions yet"/>}
              <KPI k="subjects" v={scoped.length} sub="tracked"/>
              <KPI k="sessions" v={scoped.reduce((a,s)=>a+s.sessions,0)} sub={scopeLabel(scope)}/>
            </div>
          </Block>
          <Block label="subjects.viz" meta={`mode: ${mode}`}
            action={<ModePicker mode={mode} onMode={setMode} modes={[{id:'donut',label:'DONUT',icon:'◯'},{id:'bars',label:'BARS',icon:'▤'},{id:'area',label:'OVER TIME',icon:'▲'}]}/>}>
            {grand===0
              ?<EmptyState title="no hours yet" hint="log a session to see charts"/>
              :<>
                {mode==='donut'&&<SubjectsDonut scoped={scoped} total={grand}/>}
                {mode==='bars'&&<div style={{display:'flex',flexDirection:'column',gap:16}}>{[...scoped].sort((a,b)=>b.total-a.total).map(s=>{const pct=s.total/Math.max(...scoped.map(x=>x.total))*100;return<div key={s.name} style={{display:'grid',gridTemplateColumns:'110px 1fr 110px',alignItems:'center',gap:16}}><span style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:12,color:'var(--v1-fg)',fontFamily:'var(--v1-sans)'}}><span style={{width:9,height:9,background:s.color}}/>{s.name}</span><div style={{height:20,background:'var(--v1-bg-elev-2)',position:'relative'}}><div style={{position:'absolute',inset:0,width:`${pct}%`,background:s.color}}/></div><span style={{fontFamily:'var(--v1-mono)',fontSize:12,color:'var(--v1-fg)',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{fmtHM(s.total)} <span style={{color:'var(--v1-fg-muted)',fontSize:10}}>{Math.round(s.total/grand*100)}%</span></span></div>;})}
                </div>}
                {mode==='area'&&<BigChart series={scoped.map(s=>({name:s.name,color:s.color,values:s.series}))} scope={scope} height={240} yLabel="h" kind="area"/>}
              </>
            }
          </Block>
          <Block label="subjects.table" meta={`per-subject · ${scopeLabel(scope)}`}>
            <Tbl cols={['','subject','sessions','last session','productivity',`${sc.label} hrs`,'share']} widths={['4px','auto','60px','90px','80px','80px','1fr']}>
              {scoped.map(s=>{const pct=grand>0?s.total/grand:0;return(
                <Row key={s.id||s.name}>
                  <span style={{width:4,height:18,background:s.color,display:'block'}}/>
                  <Cell>{s.name}</Cell>
                  <Cell mono right dim>{s.sessions}</Cell>
                  <Cell mono dim sm>{s.lastStudied}</Cell>
                  <Cell mono right tone={s.productivity>=4?'up':'flat'}>{s.productivity?s.productivity.toFixed(1):'—'}</Cell>
                  <Cell mono right>{fmtHM(s.total)}</Cell>
                  <Cell><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{flex:1,height:4,background:'var(--v1-bg-elev-2)',position:'relative'}}><div style={{position:'absolute',inset:0,width:`${pct*100}%`,background:s.color}}/></div><span style={{fontSize:10,color:'var(--v1-fg-muted)',fontVariantNumeric:'tabular-nums',width:30,textAlign:'right'}}>{Math.round(pct*100)}%</span></div></Cell>
                </Row>
              );})}
            </Tbl>
          </Block>
        </div>
      )}

      {manageOpen&&<Modal title="manage_subjects" onClose={()=>setManageOpen(false)} width={480}>
        <div style={{padding:18,borderBottom:'1px solid var(--v1-rule)'}}>
          <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:8,fontFamily:'var(--v1-mono)'}}>add new subject</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:8,alignItems:'center'}}>
            <Input value={name} onChange={setName} placeholder="e.g. chemistry" autoFocus
              onKeyDown={e=>{if(e.key==='Enter')addSubj();}}/>
            <div style={{display:'flex',gap:3}}>{SUBJ_COLORS.map(c=><button key={c} onClick={()=>setCol(c)} style={{width:20,height:20,background:c,border:col===c?'2px solid var(--v1-fg)':'1px solid var(--v1-rule)',padding:0,cursor:'pointer'}}/>)}</div>
            <button disabled={!name.trim()} onClick={addSubj}
              style={{...Btn.sm,background:name.trim()?'var(--v1-accent)':'transparent',color:name.trim()?'var(--v1-bg)':'var(--v1-fg-muted)',borderColor:name.trim()?'var(--v1-accent)':'var(--v1-rule)'}}>add ↵</button>
          </div>
        </div>
        <div style={{maxHeight:320,overflow:'auto'}}>
          {subjs.length===0&&<div style={{padding:'16px 18px',fontSize:11,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>no subjects yet</div>}
          {subjs.map((s,i)=>(
            <div key={s.id||s.name} style={{display:'grid',gridTemplateColumns:'10px 1fr auto',gap:12,alignItems:'center',padding:'10px 18px',borderTop:'1px solid var(--v1-rule)'}}>
              <span style={{width:10,height:10,background:s.color,flexShrink:0}}/>
              <span style={{fontSize:13,color:'var(--v1-fg)',fontFamily:'var(--v1-sans)'}}>{s.name}</span>
              <button onClick={()=>setSubjs(a=>a.filter((_,j)=>j!==i))}
                style={{...Btn.sm,fontSize:10,padding:'3px 10px'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--v1-down)';e.currentTarget.style.color='var(--v1-down)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--v1-rule-strong)';e.currentTarget.style.color='var(--v1-fg-2)';}}>remove ✕</button>
            </div>
          ))}
        </div>
      </Modal>}
    </div>
  );
}

/* ── NETWORK ── */
const FRIEND_COLORS=['#5B9DAB','#C89B5C','#8B7DB8','#C77B7B','#6FA88A','#A8786F','#7B9BC8','#B8A85C'];
/* Friend requests stored per-user in localStorage:
   andreev_frienddata_<userId> = { friends:[{id,name,email,color}], requests:[{from,fromName,fromEmail,sentAt}] }
*/
function getFriendData(uid){try{return JSON.parse(localStorage.getItem('andreev_fd_'+uid)||'{"friends":[],"requests":[]}')}catch{return{friends:[],requests:[]};}}
function setFriendData(uid,d){localStorage.setItem('andreev_fd_'+uid,JSON.stringify(d));}

function Friend({user}){
  const uid=user?.id;
  const[data,setDataRaw]=useState(()=>getFriendData(uid));
  const[query,setQuery]=useState('');
  const[searchResult,setSearchResult]=useState(null); // null | {found: user} | {notFound: name}
  const[error,setError]=useState('');
  const[searching,setSearching]=useState(false);
  const inputRef=useRef(null);

  const setData=d=>{setDataRaw(d);setFriendData(uid,d);};

  // reload when user switches account
  useEffect(()=>{setDataRaw(getFriendData(uid));},[uid]);

  // incoming requests for this user (sent by others)
  const incoming=data.requests||[];
  const friends=data.friends||[];

  const searchUser=()=>{
    const q=query.trim().toLowerCase();
    if(!q){setError('enter a name or email');return;}
    const allUsers=localAuth._users();
    const found=allUsers.find(u=>
      u.name.toLowerCase()===q||
      u.email.toLowerCase()===q||
      u.name.toLowerCase().includes(q)
    );
    if(!found||found.id===uid){
      setSearchResult({notFound:query.trim()});
      setError('');
      return;
    }
    if(friends.find(f=>f.id===found.id)){setError('already friends');return;}
    // check if request already sent (stored in recipient's data)
    const recipData=getFriendData(found.id);
    if(recipData.requests?.find(r=>r.from===uid)){setError('request already sent');return;}
    setSearchResult({found});setError('');
  };

  const sendRequest=foundUser=>{
    // write request into recipient's friend data
    const recipData=getFriendData(foundUser.id);
    const req={from:uid,fromName:user.name,fromEmail:user.email,sentAt:Date.now()};
    recipData.requests=[...(recipData.requests||[]).filter(r=>r.from!==uid),req];
    setFriendData(foundUser.id,recipData);
    setSearchResult(null);setQuery('');
    setError('');
    // show confirmation
    setSearchResult({sent:foundUser.name});
  };

  const acceptRequest=req=>{
    const sender=localAuth._users().find(u=>u.id===req.from);
    const color=FRIEND_COLORS[friends.length%FRIEND_COLORS.length];
    // add to my friends
    const myNext={
      friends:[...friends,{id:req.from,name:req.fromName,email:req.fromEmail,color}],
      requests:incoming.filter(r=>r.from!==req.from),
    };
    setData(myNext);
    // add me to their friends
    if(sender){
      const theirData=getFriendData(sender.id);
      const myColor=FRIEND_COLORS[(theirData.friends||[]).length%FRIEND_COLORS.length];
      theirData.friends=[...(theirData.friends||[]).filter(f=>f.id!==uid),{id:uid,name:user.name,email:user.email,color:myColor}];
      setFriendData(sender.id,theirData);
    }
  };

  const declineRequest=req=>{
    setData({...data,requests:incoming.filter(r=>r.from!==req.from)});
  };

  const removeFriend=fid=>{
    setData({...data,friends:friends.filter(f=>f.id!==fid)});
  };

  const fieldStyle={flex:1,background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:12,padding:'8px 10px',outline:'none'};

  return(
    <div>
      {/* pending requests */}
      {incoming.length>0&&(
        <Block label="network.requests" meta={`${incoming.length} pending`}>
          {incoming.map(req=>(
            <div key={req.from} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--v1-rule)'}}>
              <span style={{flex:1,fontSize:12,color:'var(--v1-fg)',fontFamily:'var(--v1-mono)'}}>{req.fromName} <span style={{color:'var(--v1-fg-muted)',fontSize:10}}>({req.fromEmail})</span> wants to connect</span>
              <button onClick={()=>acceptRequest(req)}
                style={{...Btn.sm,background:'var(--v1-up)',color:'var(--v1-bg)',borderColor:'var(--v1-up)',padding:'4px 12px',fontWeight:600}}>accept</button>
              <button onClick={()=>declineRequest(req)}
                style={{...Btn.sm,padding:'4px 10px'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--v1-down)';e.currentTarget.style.color='var(--v1-down)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--v1-rule-strong)';e.currentTarget.style.color='var(--v1-fg-2)';}}>decline</button>
            </div>
          ))}
        </Block>
      )}

      {/* add friend */}
      <Block label="network.add" meta="find by name or email">
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12}}>
          <input ref={inputRef} value={query} onChange={e=>{setQuery(e.target.value);setSearchResult(null);setError('');}}
            placeholder="search by name or email address"
            style={fieldStyle}
            onFocus={e=>e.target.style.borderColor='var(--v1-accent)'}
            onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}
            onKeyDown={e=>{if(e.key==='Enter')searchUser();}}
          />
          <button onClick={searchUser}
            style={{...Btn.sm,background:'var(--v1-accent)',color:'var(--v1-bg)',borderColor:'var(--v1-accent)',padding:'8px 16px',flexShrink:0,fontWeight:600}}>
            search →
          </button>
        </div>

        {error&&<div style={{fontSize:11,color:'var(--v1-down)',fontFamily:'var(--v1-mono)',marginBottom:8}}>✕ {error}</div>}

        {searchResult?.sent&&(
          <div style={{padding:'10px 14px',background:'rgba(107,216,154,0.08)',border:'1px solid var(--v1-up)',fontSize:11,color:'var(--v1-up)',fontFamily:'var(--v1-mono)'}}>
            ✓ friend request sent to {searchResult.sent}
          </div>
        )}

        {searchResult?.notFound&&(
          <div style={{padding:'10px 14px',background:'rgba(229,72,77,0.07)',border:'1px solid var(--v1-down)',fontSize:11,color:'var(--v1-down)',fontFamily:'var(--v1-mono)'}}>
            ✕ no user found for "{searchResult.notFound}" — they need to create an account first
          </div>
        )}

        {searchResult?.found&&(
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'rgba(79,123,255,0.06)',border:'1px solid var(--v1-rule-strong)'}}>
            <span style={{flex:1,fontSize:12,color:'var(--v1-fg)',fontFamily:'var(--v1-mono)'}}>{searchResult.found.name} <span style={{color:'var(--v1-fg-muted)',fontSize:10}}>({searchResult.found.email})</span></span>
            <button onClick={()=>sendRequest(searchResult.found)}
              style={{...Btn.sm,background:'var(--v1-accent)',color:'var(--v1-bg)',borderColor:'var(--v1-accent)',fontWeight:600}}>
              send request →
            </button>
          </div>
        )}
      </Block>

      {/* friends list */}
      <Block label="network.members" meta={`${friends.length+1} member${friends.length!==0?'s':''}`}>
        {friends.length===0?(
          <EmptyState title="no friends yet" hint="search for someone by name or email above to send a request"/>
        ):(
          <Tbl cols={['who','email','']} widths={['auto','auto','32px']}>
            <Row hi>
              <Cell><span style={{display:'inline-flex',alignItems:'center',gap:8}}><span style={{width:6,height:6,background:'var(--v1-accent)'}}/><span style={{color:'var(--v1-accent)'}}>you</span></span></Cell>
              <Cell mono dim sm>{user?.email}</Cell>
              <Cell/>
            </Row>
            {friends.map(f=>(
              <Row key={f.id}>
                <Cell><span style={{display:'inline-flex',alignItems:'center',gap:8}}><span style={{width:6,height:6,background:f.color}}/>{f.name}</span></Cell>
                <Cell mono dim sm>{f.email}</Cell>
                <Cell>
                  <button onClick={()=>removeFriend(f.id)}
                    style={{background:'transparent',border:'none',color:'var(--v1-fg-muted)',cursor:'pointer',fontFamily:'var(--v1-mono)',fontSize:11,padding:'0 4px'}}
                    onMouseEnter={e=>e.currentTarget.style.color='var(--v1-down)'}
                    onMouseLeave={e=>e.currentTarget.style.color='var(--v1-fg-muted)'}>✕</button>
                </Cell>
              </Row>
            ))}
          </Tbl>
        )}
      </Block>
    </div>
  );
}

/* ── SEARCH PANEL ── */
function CommandPalette({sessions,onClose,onNav,onStartSession}){
  const[query,setQuery]=useState('');
  const[sel,setSel]=useState(0);
  const inputRef=useRef(null);
  const q=query.trim().toLowerCase();

  const COMMANDS=[
    {icon:'→',label:'start new session',      hint:'begin tracking study time',   tag:'session', action:()=>{onClose();onStartSession();}},
    {icon:'→',label:'add a subject',           hint:'create a subject to track',   tag:'subj',    action:()=>{onNav('subjects');onClose();}},
    {icon:'→',label:'add a friend',            hint:'invite someone to compete',   tag:'net',     action:()=>{onNav('friend');onClose();}},
    {icon:'→',label:'view leaderboard',        hint:'see your rank vs friends',    tag:'rank',    action:()=>{onNav('leader');onClose();}},
    {icon:'→',label:'view heatmap',            hint:'your hours over time',        tag:'hours',   action:()=>{onNav('heatmap');onClose();}},
    {icon:'→',label:'view calendar',           hint:'schedule events & todos',     tag:'cal',     action:()=>{onNav('calendar');onClose();}},
    {icon:'→',label:'view session log',        hint:'browse all past sessions',    tag:'log',     action:()=>{onNav('log');onClose();}},
    {icon:'→',label:'go to home',              hint:'dashboard overview',          tag:'home',    action:()=>{onNav('dashboard');onClose();}},
  ];

  // filter commands by query
  const matchCmds=q?COMMANDS.filter(c=>c.label.includes(q)||c.hint.includes(q)||c.tag.includes(q)):COMMANDS;

  // filter sessions by query
  const matchSessions=q?sessions.filter(s=>
    s.subject?.toLowerCase().includes(q)||
    s.note?.toLowerCase().includes(q)||
    s.duration?.toLowerCase().includes(q)
  ).slice(0,5):[];

  const totalItems=matchCmds.length+matchSessions.length;

  useEffect(()=>{setSel(0);},[query]);
  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),30);},[]);
  useEffect(()=>{
    const h=e=>{
      if(e.key==='Escape'){onClose();return;}
      if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,totalItems-1));}
      if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}
      if(e.key==='Enter'){
        e.preventDefault();
        if(sel<matchCmds.length){matchCmds[sel]?.action();}
        else{const s=matchSessions[sel-matchCmds.length];if(s){onNav('log');onClose();}}
      }
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[sel,totalItems,matchCmds,matchSessions,onClose,onNav]);

  const Row=({icon,label,hint,tag,idx,onClick})=>{
    const active=sel===idx;
    return(
      <div onClick={onClick} onMouseEnter={()=>setSel(idx)}
        style={{display:'grid',gridTemplateColumns:'28px 1fr auto',alignItems:'center',gap:6,padding:'8px 14px',cursor:'pointer',background:active?'rgba(79,123,255,0.09)':'transparent',borderLeft:`2px solid ${active?'var(--v1-accent)':'transparent'}`}}>
        <span style={{fontSize:13,color:active?'var(--v1-accent)':'var(--v1-fg-muted)',textAlign:'center'}}>{icon}</span>
        <div style={{display:'flex',flexDirection:'column',gap:1}}>
          <span style={{fontSize:12,color:active?'var(--v1-fg)':'var(--v1-fg-2)',letterSpacing:'0.02em'}}>{label}</span>
          {hint&&<span style={{fontSize:10,color:'var(--v1-fg-muted)',letterSpacing:'0.02em'}}>{hint}</span>}
        </div>
        <span style={{fontSize:9,color:'var(--v1-fg-muted)',letterSpacing:'0.1em',textTransform:'uppercase',border:'1px solid var(--v1-rule)',padding:'2px 6px'}}>{tag}</span>
      </div>
    );
  };

  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,zIndex:400,background:'rgba(5,6,8,0.72)',backdropFilter:'blur(5px)',display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:80}}>
      <div style={{width:540,background:'var(--v1-bg-elev)',border:'1px solid var(--v1-rule-strong)',fontFamily:'var(--v1-mono)',boxShadow:'0 24px 60px rgba(0,0,0,0.6)',maxHeight:'70vh',display:'flex',flexDirection:'column'}}>

        {/* input */}
        <div style={{display:'flex',alignItems:'center',padding:'0 14px',borderBottom:'1px solid var(--v1-rule)',gap:10,flexShrink:0}}>
          <span style={{fontSize:14,color:'var(--v1-fg-muted)'}}>⌕</span>
          <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)}
            placeholder="search features, navigate, find sessions…"
            style={{flex:1,background:'transparent',border:'none',outline:'none',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'14px 0',letterSpacing:'0.02em'}}/>
          {query&&<button onClick={()=>setQuery('')} style={{...Btn.sm,fontSize:9,padding:'2px 6px',flexShrink:0}}>clear</button>}
          <span style={{fontSize:9,color:'var(--v1-fg-muted)',letterSpacing:'0.1em',flexShrink:0}}>esc</span>
        </div>

        <div style={{overflowY:'auto'}}>
          {/* commands */}
          {matchCmds.length>0&&(
            <div>
              <div style={{padding:'7px 14px 4px',fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>actions</div>
              {matchCmds.map((c,i)=><Row key={c.label} icon={c.icon} label={c.label} hint={c.hint} tag={c.tag} idx={i} onClick={c.action}/>)}
            </div>
          )}

          {/* session results */}
          {matchSessions.length>0&&(
            <div style={{borderTop:'1px solid var(--v1-rule)'}}>
              <div style={{padding:'7px 14px 4px',fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>sessions</div>
              {matchSessions.map((s,i)=>{
                const subj=D.subjects.find(x=>x.name===s.subject);
                const idx=matchCmds.length+i;
                const active=sel===idx;
                return(
                  <div key={i} onMouseEnter={()=>setSel(idx)}
                    onClick={()=>{onNav('log');onClose();}}
                    style={{display:'grid',gridTemplateColumns:'4px 1fr auto auto',alignItems:'center',gap:10,padding:'8px 14px',cursor:'pointer',background:active?'rgba(79,123,255,0.09)':'transparent',borderLeft:`2px solid ${active?'var(--v1-accent)':'transparent'}`}}>
                    <span style={{width:4,height:16,background:subj?subj.color:'var(--v1-fg-muted)',display:'block'}}/>
                    <div>
                      <span style={{fontSize:12,color:'var(--v1-fg)'}}>{s.subject||'—'}</span>
                      {s.note&&<span style={{fontSize:10,color:'var(--v1-fg-muted)',marginLeft:8}}>{s.note}</span>}
                    </div>
                    <span style={{fontSize:10,color:'var(--v1-fg-muted)'}}>{s.day}</span>
                    <span style={{fontSize:10,color:'var(--v1-fg-2)',fontVariantNumeric:'tabular-nums'}}>{s.duration}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* no results */}
          {q&&matchCmds.length===0&&matchSessions.length===0&&(
            <div style={{padding:'20px 14px',fontSize:11,color:'var(--v1-fg-muted)',textAlign:'center'}}>no results for "{query}"</div>
          )}
        </div>

        {/* footer hint */}
        <div style={{borderTop:'1px solid var(--v1-rule)',padding:'6px 14px',display:'flex',gap:14,fontSize:9,color:'var(--v1-fg-muted)',letterSpacing:'0.08em',flexShrink:0}}>
          <span>↑↓ navigate</span>
          <span>↵ select</span>
          <span>esc close</span>
          <span style={{flex:1}}/>
          <span>⌘K to open</span>
        </div>
      </div>
    </div>
  );
}

/* ── AUTH SCREEN ── */
/* Google sign-in via Netlify Identity — zero Google Cloud Console setup needed.
   Enable once at: app.netlify.com → your site → Identity → Enable → External Providers → Google */

function AuthScreen({onAuth}){
  // default to sign-in if this browser already has a registered account
  const[mode,setMode]=useState(()=>localAuth._users().length>0?'signin':'signup');
  const[name,setName]=useState('');
  const[email,setEmail]=useState('');
  const[password,setPassword]=useState('');
  const[confirm,setConfirm]=useState('');
  const[error,setError]=useState('');
  const[loading,setLoading]=useState(false);
  const[gLoading,setGLoading]=useState(false);
  const emailRef=useRef(null);

  /* Load Netlify Identity widget script on demand, wire up handlers once loaded */
  const loadAndOpenIdentity=useCallback(()=>{
    const init=()=>{
      netlifyIdentity.init({APIUrl:'https://andreev-net.netlify.app/.netlify/identity'});
      netlifyIdentity.on('login',u=>{
        if(!u)return;
        netlifyIdentity.close();
        const user={id:u.id,name:u.user_metadata?.full_name||u.email.split('@')[0],email:u.email,avatar:u.user_metadata?.avatar_url||null,provider:'netlify'};
        localAuth.saveSession(user);
        setGLoading(false);
        onAuth(user);
      });
      netlifyIdentity.on('error',err=>{setGLoading(false);setError(err?.message||'sign-in failed');});
      netlifyIdentity.open();
    };
    if(window.netlifyIdentity){init();return;}
    const s=document.createElement('script');
    s.src='https://identity.netlify.com/v1/netlify-identity-widget.js';
    s.onload=init;
    s.onerror=()=>{setGLoading(false);setError('could not load identity widget — check connection');};
    document.head.appendChild(s);
  },[onAuth]);

  useEffect(()=>{setError('');setName('');setPassword('');setConfirm('');},[mode]);
  useEffect(()=>{setTimeout(()=>emailRef.current?.focus(),60);},[mode]);

  const handleGoogle=()=>{
    setGLoading(true);
    setError('');
    loadAndOpenIdentity();
  };

  const submit=async e=>{
    e.preventDefault();
    setError('');
    if(!email.trim()){setError('email is required');return;}
    if(!password){setError('password is required');return;}
    if(mode==='signup'){
      if(!name.trim()){setError('name is required');return;}
      if(password!==confirm){setError('passwords do not match');return;}
      setLoading(true);
      const res=localAuth.signUp(name,email,password);
      setLoading(false);
      if(res.error){setError(res.error);return;}
      onAuth(res.user);
    }else{
      setLoading(true);
      const res=localAuth.signIn(email,password);
      setLoading(false);
      if(res.error){setError(res.error);return;}
      onAuth(res.user);
    }
  };

  const GoogleIcon=()=>(
    <svg width="16" height="16" viewBox="0 0 48 48" style={{flexShrink:0}}>
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      <path fill="none" d="M0 0h48v48H0z"/>
    </svg>
  );

  const fieldStyle={width:'100%',background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'10px 12px',outline:'none',boxSizing:'border-box',letterSpacing:'0.02em'};

  return(
    <div className="v1" style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--v1-bg)',position:'relative'}}>

      {/* logo */}
      <div style={{position:'absolute',top:20,left:24,fontFamily:'var(--v1-mono)',fontSize:13,display:'flex',alignItems:'center',gap:0}}>
        <span style={{color:'var(--v1-accent)',fontWeight:600}}>[</span>
        <span style={{fontWeight:600}}>Andreev</span>
        <span style={{color:'var(--v1-fg-3)'}}>.net</span>
        <span style={{color:'var(--v1-accent)',fontWeight:600}}>]</span>
      </div>

      {/* card */}
      <div style={{width:'100%',maxWidth:400,border:'1px solid var(--v1-rule-strong)',background:'var(--v1-bg-elev)',fontFamily:'var(--v1-mono)'}}>
        {/* mode tabs */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:'1px solid var(--v1-rule)'}}>
          {[['signin','sign in'],['signup','create account']].map(([id,label])=>(
            <button key={id} onClick={()=>setMode(id)} style={{padding:'13px 0',background:'transparent',border:'none',borderBottom:`2px solid ${mode===id?'var(--v1-accent)':'transparent'}`,color:mode===id?'var(--v1-fg)':'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',transition:'all 100ms'}}>
              {label}
            </button>
          ))}
        </div>

        <div style={{padding:24,display:'flex',flexDirection:'column',gap:12}}>

          {/* Google button */}
          <button type="button" onClick={handleGoogle} disabled={gLoading}
            style={{width:'100%',padding:'11px 0',background:'var(--v1-bg-elev-2)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg-2)',fontFamily:'var(--v1-mono)',fontSize:12,letterSpacing:'0.06em',cursor:gLoading?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,transition:'all 80ms',opacity:gLoading?0.6:1}}
            onMouseEnter={e=>{if(!gLoading){e.currentTarget.style.borderColor='var(--v1-accent)';e.currentTarget.style.color='var(--v1-fg)';}}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--v1-rule-strong)';e.currentTarget.style.color='var(--v1-fg-2)';}}>
            {gLoading?<span style={{fontSize:11,letterSpacing:'0.1em'}}>opening google…</span>:<><GoogleIcon/><span>continue with google</span></>}
          </button>

          {/* divider */}
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{flex:1,height:1,background:'var(--v1-rule)'}}/>
            <span style={{fontSize:9,color:'var(--v1-fg-muted)',letterSpacing:'0.14em',textTransform:'uppercase'}}>or</span>
            <div style={{flex:1,height:1,background:'var(--v1-rule)'}}/>
          </div>

          <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:12}}>
            {mode==='signup'&&(
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                <label style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>display name</label>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. sasha" style={fieldStyle}
                  onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
              </div>
            )}
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <label style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>email</label>
              <input ref={emailRef} value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="you@example.com" style={fieldStyle}
                onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <label style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>password</label>
              <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder={mode==='signup'?'min 6 characters':'••••••••'} style={fieldStyle}
                onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
            </div>
            {mode==='signup'&&(
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                <label style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>confirm password</label>
                <input value={confirm} onChange={e=>setConfirm(e.target.value)} type="password" placeholder="••••••••" style={fieldStyle}
                  onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
              </div>
            )}
            {error&&(
              <div style={{padding:'8px 10px',background:'rgba(229,72,77,0.08)',border:'1px solid var(--v1-down)',color:'var(--v1-down)',fontSize:11,letterSpacing:'0.04em'}}>
                ✕ {error}
              </div>
            )}
            <button type="submit" disabled={loading} style={{marginTop:2,padding:'11px 0',background:'var(--v1-accent)',color:'var(--v1-bg)',border:'none',fontFamily:'var(--v1-mono)',fontSize:12,letterSpacing:'0.1em',textTransform:'uppercase',cursor:loading?'not-allowed':'pointer',opacity:loading?0.7:1,fontWeight:600,transition:'opacity 100ms'}}>
              {loading?'...':(mode==='signin'?'sign in →':'create account →')}
            </button>
          </form>
        </div>

        <div style={{borderTop:'1px solid var(--v1-rule)',padding:'12px 24px',fontSize:10,color:'var(--v1-fg-muted)',textAlign:'center',letterSpacing:'0.04em'}}>
          {mode==='signin'?<>no account? <button onClick={()=>setMode('signup')} style={{background:'none',border:'none',color:'var(--v1-accent)',fontFamily:'var(--v1-mono)',fontSize:10,cursor:'pointer',padding:0}}>create one</button></>
            :<>already have one? <button onClick={()=>setMode('signin')} style={{background:'none',border:'none',color:'var(--v1-accent)',fontFamily:'var(--v1-mono)',fontSize:10,cursor:'pointer',padding:0}}>sign in</button></>}
        </div>
      </div>

      {/* footer note */}
      <div style={{position:'absolute',bottom:16,fontSize:9,color:'var(--v1-fg-muted)',letterSpacing:'0.12em',textTransform:'uppercase'}}>
        accounts stored locally · no data sent anywhere
      </div>
    </div>
  );
}

/* ── SHELL ── */
const TABS=[
  {id:'dashboard',label:'home',   kbd:'1'},
  {id:'timer',    label:'session',kbd:'2'},
  {id:'calendar', label:'cal',    kbd:'3'},
  {id:'leader',   label:'rank',   kbd:'4'},
  {id:'heatmap',  label:'hours',  kbd:'5'},
  {id:'subjects', label:'subj',   kbd:'6'},
  {id:'log',      label:'log',    kbd:'7'},
  {id:'friend',   label:'net',    kbd:'8'},
];

const DEFAULT_SESSION={active:false,subject:'',startedAt:0,elapsed:0,paused:false,breakSecs:0,pausedAt:null};
const PRESET_SUBJECTS=D.subjects.map(s=>s.name);

function SubjectPicker({onStart,onClose}){
  const[custom,setCustom]=useState('');
  const[picked,setPicked]=useState(null);
  const choose=subj=>{if(subj)onStart(subj);};
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:300,background:'rgba(5,6,8,0.80)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div onClick={e=>e.stopPropagation()} style={{width:420,background:'var(--v1-bg-elev)',border:'1px solid var(--v1-rule-strong)',boxShadow:'0 24px 60px rgba(0,0,0,0.7)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev-2)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>
          <span style={{color:'var(--v1-accent)'}}>◆</span>
          <span style={{color:'var(--v1-fg-2)'}}>begin session · pick subject</span>
          <span style={{flex:1}}/>
          <button onClick={onClose} style={{background:'transparent',border:'none',color:'var(--v1-fg-3)',cursor:'pointer',fontFamily:'var(--v1-mono)',fontSize:12}}>✕ esc</button>
        </div>
        <div style={{padding:18,display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {PRESET_SUBJECTS.map(s=>{const subj=D.subjects.find(x=>x.name===s);const color=subj?subj.color:'var(--v1-accent)';const a=picked===s;return(
              <button key={s} onClick={()=>setPicked(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:a?'rgba(79,123,255,0.10)':'var(--v1-bg)',border:`1px solid ${a?color:'var(--v1-rule-strong)'}`,color:a?'var(--v1-fg)':'var(--v1-fg-2)',fontFamily:'var(--v1-mono)',fontSize:12,cursor:'pointer',letterSpacing:'0.04em',textAlign:'left'}}>
                <span style={{width:8,height:8,background:color,flexShrink:0}}/>
                {s}
              </button>
            );})}
          </div>
          <div style={{borderTop:'1px solid var(--v1-rule)',paddingTop:12}}>
            <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:6,fontFamily:'var(--v1-mono)'}}>or type custom subject</div>
            <Input value={custom} onChange={v=>{setCustom(v);setPicked(null);}} placeholder="e.g. chemistry, language..." autoFocus={false}
              onKeyDown={e=>{if(e.key==='Enter'&&custom.trim()){choose(custom.trim());}}}/>
          </div>
          <button
            disabled={!picked&&!custom.trim()}
            onClick={()=>choose(picked||custom.trim())}
            style={{...Btn.md,background:(picked||custom.trim())?'var(--v1-accent)':'transparent',color:(picked||custom.trim())?'var(--v1-bg)':'var(--v1-fg-muted)',borderColor:(picked||custom.trim())?'var(--v1-accent)':'var(--v1-rule)',opacity:(picked||custom.trim())?1:0.5,width:'100%',justifyContent:'center',display:'flex',alignItems:'center',gap:8}}>
            ▸ begin session{(picked||custom.trim())?` · ${picked||custom.trim()}`:''}
          </button>
        </div>
      </div>
    </div>
  );
}

function Shell({user,onLogout}){
  const[screen,setScreen]=useState('dashboard');
  const[weeklyTarget,setWeeklyTarget]=useState(20); // hours
  const[sessions,setSessions]=useState([]);
  const[sessionState,setSessionState]=useState(DEFAULT_SESSION);
  const[showPicker,setShowPicker]=useState(false);
  const[showFilter,setShowFilter]=useState(false);
  const[filterSubjects,setFilterSubjects]=useState([]);
  const[filterMinProd,setFilterMinProd]=useState(0);
  const tick=useTick(1000);

  // ⌘K shortcut
  useEffect(()=>{
    const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setShowFilter(f=>!f);}};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);
  const now=new Date();
  const clockStr=now.toUTCString().split(' ')[4];

  useEffect(()=>{
    const onKey=e=>{
      if(e.key==='Escape'&&showPicker){setShowPicker(false);return;}
      const t=TABS.find(t=>t.kbd===e.key);if(t)setScreen(t.id);
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[showPicker]);

  const handleBegin=()=>{
    if(sessionState.active){setScreen('timer');return;}
    setShowPicker(true);
  };

  const handleStartSession=subj=>{
    setShowPicker(false);
    setSessionState({active:true,subject:subj,startedAt:Date.now(),elapsed:0,paused:false,breakSecs:0,pausedAt:null});
    setScreen('timer');
  };

  const handlePause=()=>{
    setSessionState(s=>{
      if(!s.active)return s;
      if(s.paused){
        // resume — accumulate break time
        const brk=s.pausedAt?Math.floor((Date.now()-s.pausedAt)/1000):0;
        return{...s,paused:false,startedAt:Date.now(),breakSecs:(s.breakSecs||0)+brk,pausedAt:null};
      }else{
        // pause — freeze elapsed, record pause start
        const now2=Date.now();
        return{...s,paused:true,elapsed:s.elapsed+Math.floor((now2-s.startedAt)/1000),pausedAt:now2};
      }
    });
  };

  const handleCommit=(rating,elapsed,breakSecs)=>{
    const now2=new Date();
    const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
    const MONTHS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const dayName=DAYS[now2.getDay()];
    const dayNum=now2.getDate();
    const monName=MONTHS[now2.getMonth()];
    const dayStr=`${dayName} ${dayNum}`;
    const hh=String(now2.getHours()).padStart(2,'0');
    const mm=String(now2.getMinutes()).padStart(2,'0');
    const timeStr=`${hh}:${mm}`;
    const hrs=Math.floor(elapsed/3600);
    const mins=Math.floor((elapsed%3600)/60);
    const durStr=`${hrs}h ${String(mins).padStart(2,'0')}m`;
    const subj=D.subjects.find(s=>s.name===sessionState.subject);
    const color=subj?subj.color:'#5C6776';
    const brk=breakSecs||0;
    const eff=brk>0?Math.round(elapsed/(elapsed+brk)*100):null;
    const newEntry={day:dayStr,time:timeStr,subject:sessionState.subject,color,duration:durStr,productivity:rating,note:'',breakSecs:brk,efficiency:eff};
    setSessions(prev=>[newEntry,...prev]);
    setSessionState(DEFAULT_SESSION);
    setScreen('dashboard');
  };

  const handleDiscard=()=>{
    setSessionState(DEFAULT_SESSION);
    setScreen('dashboard');
  };

  const handleLogManual=({subject,secs,rating,note})=>{
    const now2=new Date();
    const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
    const dayStr=`${DAYS[now2.getDay()]} ${now2.getDate()}`;
    const hh=String(now2.getHours()).padStart(2,'0');
    const mm=String(now2.getMinutes()).padStart(2,'0');
    const hrs=Math.floor(secs/3600);
    const mins=Math.floor((secs%3600)/60);
    const durStr=`${hrs}h ${String(mins).padStart(2,'0')}m`;
    const subj=D.subjects.find(s=>s.name===subject);
    const color=subj?subj.color:'#5C6776';
    setSessions(prev=>[{day:dayStr,time:`${hh}:${mm}`,subject,color,duration:durStr,productivity:rating,note:note||''},...prev]);
    setScreen('log');
  };

  const curTab=TABS.find(t=>t.id===screen);
  const wkHours=sessions.reduce((acc,s)=>{
    if(s.secs!=null)return acc+(s.secs/3600);
    const m=s.duration?.match(/(\d+)h\s+(\d+)m/);
    return acc+(m?parseInt(m[1])+parseInt(m[2])/60:0);
  },0);
  const paceVal=Math.round((wkHours/weeklyTarget)*100);
  const paceTone=paceVal>=100?'up':paceVal>=75?'flat':'down';

  return(
    <div className="v1" style={{background:'var(--v1-bg)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',width:'100%',height:'100%',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      {showPicker&&<SubjectPicker onStart={handleStartSession} onClose={()=>setShowPicker(false)}/>}
      {showFilter&&<CommandPalette sessions={sessions} onClose={()=>setShowFilter(false)} onNav={setScreen} onStartSession={()=>setShowPicker(true)}/>}

      {/* TOP RAIL */}
      <header style={{display:'grid',gridTemplateColumns:'auto 1fr auto auto auto',alignItems:'center',gap:16,padding:'0 16px',height:40,flexShrink:0,background:'var(--v1-bg)',borderBottom:'1px solid var(--v1-rule)'}}>
        <div style={{display:'flex',alignItems:'center',gap:0,fontSize:12,fontFamily:'var(--v1-mono)'}}>
          <span style={{color:'var(--v1-accent)',fontWeight:600}}>[</span>
          <span style={{fontWeight:600,letterSpacing:'0.02em'}}>Andreev</span>
          <span style={{color:'var(--v1-fg-3)'}}>.net</span>
          <Cursor size="0.55em" color="var(--v1-accent)"/>
          <span style={{color:'var(--v1-accent)',fontWeight:600}}>]</span>
        </div>
        <nav style={{display:'flex',gap:2,alignItems:'center',overflow:'hidden'}}>
          {TABS.map(t=>{const a=screen===t.id;return(
            <button key={t.id} onClick={()=>setScreen(t.id)} style={{fontFamily:'var(--v1-mono)',fontSize:11,background:a?'var(--v1-bg-elev)':'transparent',color:a?'var(--v1-fg)':'var(--v1-fg-3)',border:'none',borderBottom:a?'1px solid var(--v1-accent)':'1px solid transparent',padding:'11px 12px',cursor:'pointer',whiteSpace:'nowrap',letterSpacing:'0.04em',position:'relative',top:1}}>
              <span style={{color:'var(--v1-fg-muted)',marginRight:6}}>{t.kbd}</span>{t.label}
            </button>
          );})}
        </nav>
        <span style={{fontSize:11,color:'var(--v1-fg-3)',fontVariantNumeric:'tabular-nums',letterSpacing:'0.02em'}}>{clockStr} <span style={{color:'var(--v1-fg-muted)'}}>UTC</span></span>
        <button onClick={onLogout} title={user?.email} style={{background:'transparent',border:'1px solid var(--v1-rule)',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:10,padding:'3px 8px',cursor:'pointer',letterSpacing:'0.08em'}}>↩ out</button>
        <button onClick={()=>setShowFilter(f=>!f)} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 8px',border:'1px solid var(--v1-rule)',fontSize:11,color:'var(--v1-fg-3)',background:'transparent',cursor:'pointer',fontFamily:'var(--v1-mono)',transition:'border-color 80ms'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--v1-accent)';e.currentTarget.style.color='var(--v1-fg)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--v1-rule)';e.currentTarget.style.color='var(--v1-fg-3)';}}>
          <span>⌕</span><span>search</span><span style={{marginLeft:4,color:'var(--v1-fg-muted)',fontSize:10}}>⌘K</span>
        </button>
        <button onClick={handleBegin} style={{fontFamily:'var(--v1-mono)',fontSize:11,background:sessionState.active?'var(--v1-up)':'var(--v1-accent)',color:'var(--v1-bg)',border:'none',padding:'6px 14px',cursor:'pointer',fontWeight:600,letterSpacing:'0.04em'}}>{sessionState.active?'● session →':'begin →'}</button>
      </header>

      {/* STATUS STRIP — each cell navigates to its related tab */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',borderBottom:'1px solid var(--v1-rule)',flexShrink:0,background:'var(--v1-bg-elev)'}}>
        {[
          {k:'today',  v:fmtHM(wkHours/7),           d:'hours today',                    up:wkHours>0, nav:'dashboard'},
          {k:'streak', v:`${sessions.length>0?1:0}d`, d:sessions.length>0?'keep going':'start studying', up:false, nav:'dashboard'},
          {k:'wk',     v:fmtHM(wkHours),              d:`of ${weeklyTarget}h target`,     up:wkHours>0, nav:'heatmap'},
          {k:'rank',   v:'—',                          d:'invite friends to rank',         up:false, nav:'leader'},
          {k:'peak',   v:'—',                          d:'no data yet',                    up:false, nav:'heatmap'},
          {k:'pace',   v:`${paceVal}%`,                d:`of ${weeklyTarget}h target`,     up:paceVal>=75, nav:'heatmap'},
        ].map((c,i)=>(
          <div key={c.k} onClick={()=>setScreen(c.nav)} style={{padding:'9px 14px',borderRight:i<5?'1px solid var(--v1-rule)':'none',display:'flex',flexDirection:'column',gap:3,cursor:'pointer',transition:'background 80ms'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(79,123,255,0.06)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <span style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>{c.k}</span>
            <span style={{fontSize:17,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.02em',color:'var(--v1-fg)'}}>{c.v}</span>
            <span style={{fontSize:10,color:c.up?'var(--v1-up)':'var(--v1-fg-3)',fontVariantNumeric:'tabular-nums'}}>{c.up&&'▲ '}{c.d}</span>
          </div>
        ))}
      </div>

      {/* MAIN */}
      <main style={{flex:1,overflow:'hidden',padding:0,position:'relative',display:'flex',flexDirection:'column'}}>
        {screen==='dashboard'&&<Dashboard onNav={setScreen} sessions={sessions} sessionState={sessionState}/>}
        {screen==='timer'&&<div style={{overflowY:'auto',flex:1,display:'flex',flexDirection:'column'}}><Timer sessionState={sessionState} onPause={handlePause} onCommit={handleCommit} onDiscard={handleDiscard} onStart={handleStartSession} onLogManual={handleLogManual}/></div>}
        {screen==='calendar'&&<Calendar/>}
        {screen==='leader'&&<div style={{overflowY:'auto',flex:1}}><Leader/></div>}
        {screen==='heatmap'&&<div style={{overflowY:'auto',flex:1}}><Heatmap weeklyTarget={weeklyTarget} setWeeklyTarget={setWeeklyTarget}/></div>}
        {screen==='subjects'&&<div style={{overflowY:'auto',flex:1}}><Subjects sessions={sessions} user={user}/></div>}
        {screen==='log'&&<div style={{overflowY:'auto',flex:1}}><Log sessions={sessions} filterSubjects={filterSubjects} filterMinProd={filterMinProd}/></div>}
        {screen==='friend'&&<div style={{overflowY:'auto',flex:1}}><Friend user={user}/></div>}
      </main>

      {/* FOOTER */}
      <footer style={{height:24,flexShrink:0,borderTop:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev)',display:'flex',alignItems:'center',gap:14,padding:'0 14px',fontSize:10,color:'var(--v1-fg-3)',letterSpacing:'0.06em'}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:5}}><span style={{width:6,height:6,background:'var(--v1-up)',borderRadius:'50%'}} className="v1-pulse"/>SYNC OK</span>
        <span>USR <span style={{color:'var(--v1-fg-2)'}}>{user?.name||'you'}</span></span>
        <span>NET <span style={{color:'var(--v1-fg-2)'}}>1/1</span></span>
        <span>~/{curTab?.label}</span>
        <span style={{flex:1}}/>
        <span style={{color:'var(--v1-fg-muted)'}}>──── press [1—8] to navigate ────</span>
        <span style={{flex:1}}/>
        <span>SESSIONS <span style={{color:'var(--v1-fg-2)'}}>{sessions.length}</span></span>
      </footer>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(()=>localAuth.getSession());
  const handleLogout=()=>{
    localAuth.clearSession();
    if(window.netlifyIdentity){try{window.netlifyIdentity.logout();}catch(e){}}
    setUser(null);
  };
  if(!user) return <AuthScreen onAuth={setUser}/>;
  return <Shell user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
