/* ══════════════════════════════════════════════════════════════
   SUPABASE — https://zvcueclanmudepqofvql.supabase.co
   SQL to run once in Supabase SQL editor (Settings → SQL Editor):

   create table profiles (id uuid references auth.users primary key, name text not null, created_at timestamptz default now());
   alter table profiles enable row level security;
   create policy "read all" on profiles for select using (true);
   create policy "own insert" on profiles for insert with check (auth.uid()=id);
   create policy "own update" on profiles for update using (auth.uid()=id);

   create table sessions (id bigserial primary key, user_id uuid references profiles(id) on delete cascade, subject text, duration text, secs int, productivity int, note text, day text, "time" text, color text, created_at timestamptz default now());
   alter table sessions enable row level security;
   create policy "own" on sessions for all using (auth.uid()=user_id);

   create table subjects (id bigserial primary key, user_id uuid references profiles(id) on delete cascade, name text, color text);
   alter table subjects enable row level security;
   create policy "own" on subjects for all using (auth.uid()=user_id);

   create table friend_requests (id bigserial primary key, from_id uuid references profiles(id) on delete cascade, to_id uuid references profiles(id) on delete cascade, status text default 'pending', created_at timestamptz default now(), unique(from_id,to_id));
   alter table friend_requests enable row level security;
   create policy "see own" on friend_requests for select using (auth.uid()=from_id or auth.uid()=to_id);
   create policy "send" on friend_requests for insert with check (auth.uid()=from_id);
   create policy "accept" on friend_requests for update using (auth.uid()=to_id);
   create policy "remove" on friend_requests for delete using (auth.uid()=from_id or auth.uid()=to_id);

   create table if not exists user_stats (
     user_id uuid references profiles(id) on delete cascade primary key,
     weekly_secs int default 0, total_secs int default 0, streak int default 0,
     updated_at timestamptz default now()
   );
   alter table user_stats enable row level security;
   create policy "read all" on user_stats for select using (true);
   create policy "own write" on user_stats for all using (auth.uid()=user_id);
   ══════════════════════════════════════════════════════════════ */
const _sb=(typeof supabase!=='undefined')
  ?supabase.createClient('https://zvcueclanmudepqofvql.supabase.co','sb_publishable_vzhAv6yDZgnDXTrG7XzFsw_jyY1VrRw')
  :null;

const sbAPI={
  async signUp(email,password,name){
    const{data,error}=await _sb.auth.signUp({email,password,options:{data:{name}}});
    if(error)return{error:error.message};
    // if session is null, email confirmation is required
    if(!data.session)return{ok:true,needsVerification:true};
    // auto-confirmed (e.g. dev mode) — create profile and return user
    const u=data.user;
    await _sb.from('profiles').insert({id:u.id,name:name||u.email.split('@')[0]});
    return{ok:true,needsVerification:false,user:{id:u.id,email:u.email,name:name||u.email.split('@')[0]}};
  },
  async verifyEmail(email,token){
    const{data,error}=await _sb.auth.verifyOtp({email,token,type:'signup'});
    if(error)return{error:error.message};
    const u=data.user;
    const nm=u.user_metadata?.name||u.email.split('@')[0];
    const{data:ex}=await _sb.from('profiles').select('name').eq('id',u.id).single();
    if(!ex)await _sb.from('profiles').insert({id:u.id,name:nm});
    return{user:{id:u.id,email:u.email,name:ex?.name||nm}};
  },
  async signIn(email,password){
    const{data,error}=await _sb.auth.signInWithPassword({email,password});
    if(error)return{error:error.message};
    const u=data.user;
    const{data:p}=await _sb.from('profiles').select('name').eq('id',u.id).single();
    return{user:{id:u.id,email:u.email,name:p?.name||u.email.split('@')[0]}};
  },
  async getSession(){
    const{data}=await _sb.auth.getSession();
    if(!data?.session)return null;
    const u=data.session.user;
    const{data:p}=await _sb.from('profiles').select('name').eq('id',u.id).single();
    return{id:u.id,email:u.email,name:p?.name||u.email.split('@')[0]};
  },
  async signOut(){await _sb.auth.signOut();},
  async loadSessions(uid){const{data}=await _sb.from('sessions').select('*').eq('user_id',uid).order('created_at',{ascending:false});return data||[];},
  async addSession(uid,s){await _sb.from('sessions').insert({user_id:uid,...s});},
  async loadSubjects(uid){const{data}=await _sb.from('subjects').select('*').eq('user_id',uid);return data||[];},
  async addSubject(uid,s){const{data}=await _sb.from('subjects').insert({user_id:uid,name:s.name,color:s.color}).select().single();return data;},
  async deleteSubject(id){await _sb.from('subjects').delete().eq('id',id);},
  async searchProfiles(q,myId){const{data}=await _sb.from('profiles').select('id,name').ilike('name',`%${q}%`).neq('id',myId).limit(8);return data||[];},
  async sendFriendRequest(fromId,toId){const{error}=await _sb.from('friend_requests').insert({from_id:fromId,to_id:toId});return error?{error:error.message}:{ok:true};},
  async getPendingRequests(uid){
    const{data}=await _sb.from('friend_requests').select('id,from_id').eq('to_id',uid).eq('status','pending');
    if(!data?.length)return[];
    const{data:pr}=await _sb.from('profiles').select('id,name').in('id',data.map(r=>r.from_id));
    const pm=Object.fromEntries((pr||[]).map(p=>[p.id,p]));
    return data.map(r=>({id:r.id,from:r.from_id,fromName:pm[r.from_id]?.name||'unknown'}));
  },
  async acceptRequest(reqId){await _sb.from('friend_requests').update({status:'accepted'}).eq('id',reqId);},
  async declineRequest(reqId){await _sb.from('friend_requests').update({status:'declined'}).eq('id',reqId);},
  async getFriends(uid){
    const{data}=await _sb.from('friend_requests').select('from_id,to_id').or(`from_id.eq.${uid},to_id.eq.${uid}`).eq('status','accepted');
    if(!data?.length)return[];
    const ids=data.map(r=>r.from_id===uid?r.to_id:r.from_id);
    const{data:pr}=await _sb.from('profiles').select('id,name').in('id',ids);
    return pr||[];
  },
  async upsertStats(uid,stats){
    await _sb.from('user_stats').upsert({user_id:uid,weekly_secs:Math.round((stats.thisWkH||0)*3600),total_secs:Math.round((stats.totalH||0)*3600),streak:stats.streak||0,updated_at:new Date().toISOString()});
  },
  async getLeaderboard(uid){
    const{data:reqs}=await _sb.from('friend_requests').select('from_id,to_id').or(`from_id.eq.${uid},to_id.eq.${uid}`).eq('status','accepted');
    const friendIds=[...new Set((reqs||[]).map(r=>r.from_id===uid?r.to_id:r.from_id))];
    const allIds=[uid,...friendIds];
    const[{data:stats},{data:profs}]=await Promise.all([
      _sb.from('user_stats').select('*').in('user_id',allIds),
      _sb.from('profiles').select('id,name').in('id',allIds),
    ]);
    const nameMap=Object.fromEntries((profs||[]).map(p=>[p.id,p.name]));
    const seen=new Set();
    return(stats||[]).filter(s=>{if(seen.has(s.user_id))return false;seen.add(s.user_id);return true;}).map(s=>({id:s.user_id,name:nameMap[s.user_id]||'unknown',isYou:s.user_id===uid,weekly_secs:s.weekly_secs||0,total_secs:s.total_secs||0,streak:s.streak||0,updated_at:s.updated_at||null}));
  },
  async removeFriend(uid,friendId){
    await _sb.from('friend_requests').delete().or(`and(from_id.eq.${uid},to_id.eq.${friendId}),and(from_id.eq.${friendId},to_id.eq.${uid})`);
  }
};

/* ══════════════════════════════════════════════════════════════
   AUTH MODULE — localStorage-backed fallback (used when Supabase not available)
   ══════════════════════════════════════════════════════════════ */
const auth={
  _key:'andreev_users',
  _sessionKey:'andreev_session',
  _users(){try{return JSON.parse(localStorage.getItem(this._key)||'[]');}catch{return[];}},
  _save(users){localStorage.setItem(this._key,JSON.stringify(users));},
  getUser(){try{return JSON.parse(localStorage.getItem(this._sessionKey)||'null');}catch{return null;}},
  signUp(name,email,password){
    const users=this._users();
    if(users.find(u=>u.email.toLowerCase()===email.toLowerCase()))
      return{error:'an account with this email already exists'};
    if(password.length<6) return{error:'password must be at least 6 characters'};
    const user={id:Date.now().toString(),name:name.trim(),email:email.trim().toLowerCase(),password,createdAt:new Date().toISOString()};
    this._save([...users,user]);
    const session={id:user.id,name:user.name,email:user.email};
    localStorage.setItem(this._sessionKey,JSON.stringify(session));
    return{user:session};
  },
  signIn(email,password){
    const user=this._users().find(u=>u.email.toLowerCase()===email.trim().toLowerCase());
    if(!user) return{error:'no account found with that email'};
    if(user.password!==password) return{error:'incorrect password'};
    const session={id:user.id,name:user.name,email:user.email};
    localStorage.setItem(this._sessionKey,JSON.stringify(session));
    return{user:session};
  },
  signOut(){localStorage.removeItem(this._sessionKey);},
  signInWithGoogle(googleData){
    /* googleData: {id, name, email} — extracted from GSI JWT */
    const users=this._users();
    let user=users.find(u=>u.email.toLowerCase()===googleData.email.toLowerCase());
    if(!user){
      user={id:googleData.id||Date.now().toString(),name:googleData.name,email:googleData.email.toLowerCase(),provider:'google',createdAt:new Date().toISOString()};
      this._save([...users,user]);
    }
    const session={id:user.id,name:user.name,email:user.email};
    localStorage.setItem(this._sessionKey,JSON.stringify(session));
    return{user:session};
  },
};

/* ── SCOPE SYSTEM ── */
const SCOPES=[
  {id:'1d', label:'1D', n:24,days:1,  x:i=>String(i).padStart(2,'0'),      unit:'hour'},
  {id:'7d', label:'7D', n:7, days:7,  x:i=>['mon','tue','wed','thu','fri','sat','sun'][i],unit:'day'},
  {id:'30d',label:'30D',n:30,days:30, x:i=>`${i+1}`,                       unit:'day'},
  {id:'90d',label:'90D',n:13,days:90, x:i=>`w${i+1}`,                      unit:'week'},
  {id:'all',label:'ALL',n:12,days:365,x:i=>['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][i],unit:'month'},
];
const SCOPE_BASE={'1d':0.18,'7d':3.0,'30d':2.6,'90d':18,'all':76};
const SUBJ_COLORS=['#4F7BFF','#5B9DAB','#C89B5C','#8B7DB8','#C77B7B','#6FA88A'];
function seed(s,i){return(Math.sin(s*12.9898+i*78.233)*43758.5453)%1;}
function genSeries(scope,s,scale=1){const c=SCOPES.find(x=>x.id===scope),base=SCOPE_BASE[scope]*scale;return Array.from({length:c.n},(_,i)=>{const w=Math.sin(i*0.7+s)*0.35+Math.cos(i*0.4+s*1.7)*0.22+Math.sin(i*0.21+s*0.5)*0.18,n=Math.abs(seed(s,i))*0.25,v=base*(1+w+n);return Math.max(0,v);});}
function fmtHM(h){const H=Math.floor(h),M=Math.round((h-H)*60);return`${H}h ${String(M).padStart(2,'0')}m`;}
function scopeLabel(s){return({'1d':'today','7d':'this week','30d':'last 30 days','90d':'last 90 days','all':'all time'})[s];}
function userSeries(i,scope){return genSeries(scope,3+i*1.7,1-i*0.06);}
function subjSeries(i,scope){return genSeries(scope,11+i*2.3,0.5-i*0.07);}
function sumH(v){return v.reduce((a,x)=>a+x,0);}
function sessH(s){if(s.secs!=null)return s.secs/3600;const m=s.duration?.match(/(\d+)h\s+(\d+)m/);return m?parseInt(m[1])+parseInt(m[2])/60:0;}
function computeStats(sessions){
  const n=new Date(),dow=(n.getDay()+6)%7;
  const wkMon=new Date(n);wkMon.setDate(n.getDate()-dow);wkMon.setHours(0,0,0,0);
  const thisWkH=sessions.reduce((a,s)=>s.created_at&&new Date(s.created_at)>=wkMon?a+sessH(s):a,0);
  const totalH=sessions.reduce((a,s)=>a+sessH(s),0);
  const keys=new Set(sessions.filter(s=>s.created_at).map(s=>{const d=new Date(s.created_at);return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}));
  let streak=0;for(let i=0;i<365;i++){const d=new Date(n);d.setDate(n.getDate()-i);if(keys.has(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`)){streak++;}else if(i===0){break;}else{break;}}
  return{thisWkH,totalH,streak};
}
function computeUserSeries(sessions,scope){
  const sc=SCOPES.find(s=>s.id===scope);
  const now=Date.now();
  const arr=Array(sc.n).fill(0);
  sessions.forEach(s=>{
    const h=sessH(s);
    const ts=new Date(s.created_at||0).getTime();
    const diffMs=now-ts;
    let bucket;
    if(scope==='1d'){const d=Math.floor(diffMs/3600000);if(d<24)bucket=23-d;}
    else if(scope==='7d'){const d=Math.floor(diffMs/86400000);if(d<7)bucket=6-d;}
    else if(scope==='30d'){const d=Math.floor(diffMs/86400000);if(d<30)bucket=29-d;}
    else if(scope==='90d'){const d=Math.floor(diffMs/(7*86400000));if(d<13)bucket=12-d;}
    else{const dt=new Date(ts);if(dt.getFullYear()===new Date().getFullYear())bucket=dt.getMonth();}
    if(bucket!=null&&bucket>=0&&bucket<arr.length)arr[bucket]+=h;
  });
  return arr;
}
function computeSubjectSeries(sessions,subjectName,scope){
  const sc=SCOPES.find(s=>s.id===scope);
  const now=Date.now();
  const arr=Array(sc.n).fill(0);
  sessions.filter(s=>s.subject===subjectName).forEach(s=>{
    const h=(s.secs??0)/3600;
    const ts=new Date(s.created_at||0).getTime();
    const diffMs=now-ts;
    let bucket;
    if(scope==='1d'){const d=Math.floor(diffMs/3600000);if(d<24)bucket=23-d;}
    else if(scope==='7d'){const d=Math.floor(diffMs/86400000);if(d<7)bucket=6-d;}
    else if(scope==='30d'){const d=Math.floor(diffMs/86400000);if(d<30)bucket=29-d;}
    else if(scope==='90d'){const d=Math.floor(diffMs/(7*86400000));if(d<13)bucket=12-d;}
    else{const dt=new Date(ts);if(dt.getFullYear()===new Date().getFullYear())bucket=dt.getMonth();}
    if(bucket!=null&&bucket>=0&&bucket<arr.length)arr[bucket]+=h;
  });
  return arr;
}

/* ── ATOMS ── */
function useTick(ms=1000){const[t,setT]=useState(0);useEffect(()=>{const id=setInterval(()=>setT(x=>x+1),ms);return()=>clearInterval(id);},[ms]);return t;}
function fmtClock(s){const h=Math.floor(s/3600).toString().padStart(2,'0'),m=Math.floor((s%3600)/60).toString().padStart(2,'0'),sec=(s%60).toString().padStart(2,'0');return`${h}:${m}:${sec}`;}
function LiveClock({start=4462,size=14}){const t=useTick(1000);return<span style={{fontFamily:'var(--v1-mono)',fontSize:size,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.01em'}}>{fmtClock(start+t)}</span>;}
function Cursor({size='0.85em',color}){return<span style={{display:'inline-block',width:size,height:size,background:color||'currentColor',verticalAlign:'-0.08em',animation:'pblink 1.06s steps(2,jump-none) infinite',marginLeft:'0.15em'}}/>;}
function Spark({data,w=120,h=28,color='currentColor',fill=false,sw=1.25}){
  if(!data||data.length<2)return null;
  const mx=Math.max(...data,1),mn=Math.min(...data,0),rng=mx-mn||1,step=w/(data.length-1);
  const pts=data.map((v,i)=>[i*step,h-((v-mn)/rng)*h]);
  const lp=pts.map(([x,y])=>`${x},${y}`).join(' ');
  const ap=`M0,${h} L${pts.map(([x,y])=>`${x},${y}`).join(' L')} L${w},${h} Z`;
  return<svg width={w} height={h} style={{display:'block',overflow:'visible'}}>{fill&&<path d={ap} fill={color} opacity="0.12"/>}<polyline points={lp} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"/><circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r={1.6} fill={color}/></svg>;
}

function SparkWide({data,h=48,color='currentColor',fill=false,sw=1.25}){
  const ref=useRef(null);
  const[w,setW]=useState(600);
  useEffect(()=>{
    if(!ref.current)return;
    const ro=new ResizeObserver(e=>{const v=e[0].contentRect.width;if(v>0)setW(Math.floor(v));});
    ro.observe(ref.current);
    return()=>ro.disconnect();
  },[]);
  return<div ref={ref} style={{width:'100%'}}><Spark data={data} w={w} h={h} color={color} fill={fill} sw={sw}/></div>;
}

function BigChart({series,scope,height=240,yLabel='h',kind='line',fillFirst=false}){
  const wrap=useRef(null);
  const[hov,setHov]=useState(null);
  const[W,setW]=useState(800);
  useEffect(()=>{if(!wrap.current)return;const ro=new ResizeObserver(e=>{const w=e[0].contentRect.width;if(w>0)setW(Math.floor(w));});ro.observe(wrap.current);return()=>ro.disconnect();},[]);
  const conf=SCOPES.find(s=>s.id===scope),n=series[0]?.values.length||1;
  const pL=44,pR=16,pT=12,pB=28,H=height,iW=W-pL-pR,iH=H-pT-pB;
  const all=series.flatMap(s=>s.values),mx=Math.max(...all,0.1),yM=mx*1.12;
  const step=iW/Math.max(1,n-1),xA=i=>pL+i*step,yA=v=>pT+iH-(v/yM)*iH;
  const onMove=e=>{const r=e.currentTarget.getBoundingClientRect(),px=e.clientX-r.left,x=px-pL,i=Math.max(0,Math.min(n-1,Math.round(x/step)));setHov({i,px:xA(i)});};
  const yTks=[0,0.25,0.5,0.75,1].map(p=>({y:pT+iH-p*iH,v:yM*p}));
  const xStr=Math.max(1,Math.ceil(n/7)),xTks=Array.from({length:n},(_,i)=>i).filter(i=>i%xStr===0||i===n-1);
  return(
    <div ref={wrap} style={{position:'relative',width:'100%'}}>
      <svg width={W} height={H} onMouseMove={onMove} onMouseLeave={()=>setHov(null)} style={{display:'block',cursor:'crosshair'}}>
        {yTks.map((t,i)=><g key={i}><line x1={pL} x2={W-pR} y1={t.y} y2={t.y} stroke="var(--v1-rule)" strokeWidth="1"/><text x={pL-6} y={t.y+3} fontSize="9" textAnchor="end" fill="var(--v1-fg-muted)" fontFamily="var(--v1-mono)">{t.v<10?t.v.toFixed(1):Math.round(t.v)}{yLabel}</text></g>)}
        {xTks.map(i=><g key={i}><line x1={xA(i)} x2={xA(i)} y1={pT+iH} y2={pT+iH+4} stroke="var(--v1-rule-strong)" strokeWidth="1"/><text x={xA(i)} y={H-8} fontSize="9" textAnchor="middle" fill="var(--v1-fg-muted)" fontFamily="var(--v1-mono)">{conf.x(i)}</text></g>)}
        <line x1={pL} x2={W-pR} y1={pT+iH} y2={pT+iH} stroke="var(--v1-rule-strong)" strokeWidth="1"/>
        {series.map((s,idx)=>{const pts=s.values.map((v,i)=>`${xA(i)},${yA(v)}`).join(' '),ad=`M${xA(0)},${pT+iH} L${s.values.map((v,i)=>`${xA(i)},${yA(v)}`).join(' L')} L${xA(n-1)},${pT+iH} Z`,filled=kind==='area'||(fillFirst&&idx===0);return<g key={idx} opacity={s.dim?0.4:1}>{filled&&<path d={ad} fill={s.color} opacity="0.10"/>}<polyline points={pts} fill="none" stroke={s.color} strokeWidth={s.dim?1:1.5} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={s.dashed?'3 3':'none'}/></g>;})}
        {hov&&<g><line x1={hov.px} x2={hov.px} y1={pT} y2={pT+iH} stroke="var(--v1-fg-muted)" strokeWidth="1" strokeDasharray="2 3"/>{series.map((s,idx)=><circle key={idx} cx={hov.px} cy={yA(s.values[hov.i])} r="3" fill={s.color} stroke="var(--v1-bg)" strokeWidth="1"/>)}</g>}
      </svg>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'6px 16px 0',flexWrap:'wrap',fontSize:10,color:'var(--v1-fg-3)',letterSpacing:'0.06em',fontFamily:'var(--v1-mono)'}}>
        {series.map((s,i)=><span key={i} style={{display:'inline-flex',alignItems:'center',gap:5,opacity:s.dim?0.6:1}}><span style={{width:8,height:2,background:s.color}}/><span style={{color:'var(--v1-fg-2)'}}>{s.name}</span>{hov&&<span style={{color:'var(--v1-fg-muted)',fontVariantNumeric:'tabular-nums'}}>· <span style={{color:s.color}}>{s.values[hov.i].toFixed(1)}{yLabel}</span></span>}</span>)}
        <span style={{flex:1}}/>{hov&&<span style={{color:'var(--v1-fg-muted)'}}>{conf.unit} <span style={{color:'var(--v1-fg-2)'}}>{conf.x(hov.i)}</span></span>}
      </div>
    </div>
  );
}

/* ── DASHBOARD SESSION BLOCK ── */
function DashSessionBlock({sessionState,onNav,subjects=[]}){
  const tick=useTick(1000);
  const elapsed=sessionState&&sessionState.active
    ?(sessionState.paused
      ?sessionState.elapsed
      :sessionState.elapsed+Math.floor((Date.now()-sessionState.startedAt)/1000))
    :0;

  if(!sessionState||!sessionState.active){
    return(
      <Block label="session.active" meta="no session running">
        <div style={{padding:'10px 0',display:'flex',flexDirection:'column',gap:8}}>
          <div style={{fontSize:12,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>no active session</div>

  const subjData=subjects.find(s=>s.name===sessionState.subject);
  const color=subjData?subjData.color:'var(--v1-accent)';
  return(
    <Block label="session.active" meta={`${sessionState.subject} · ${sessionState.paused?'paused':'live'}`}>

        <span style={{flex:1}}/>
        <span style={{fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>{sessionState.subject}</span>

/* ── DASHBOARD ── */
function DashAgenda({onNav,events=[],todos=[],todoStates={},setTodoStates}){
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const evts=events.filter(e=>e.day===todayStr).sort((a,b)=>a.time.localeCompare(b.time));
  const todayTodos=todos.filter(t=>t.day===todayStr);
  const done=todayTodos.filter(t=>todoStates[t.id]).length;
  const pct=todayTodos.length?(done/todayTodos.length)*100:0;
  const nowStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const next=evts.find(e=>e.time>nowStr)||evts[evts.length-1];
  const ts=todoStates;
  const setTs=id=>setTodoStates(s=>({...s,[id]:!s[id]}));
  const todos_=todayTodos;
  if(evts.length===0&&todos_.length===0){
    return(
      <EmptyState icon="◈" title="no events or tasks today"
        hint="add events and todos to the calendar to see your day here"
        action={<button onClick={()=>onNav('calendar')} style={{fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.12em',background:'transparent',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-accent)',padding:'5px 14px',cursor:'pointer'}}>open calendar →</button>}
      />
    );
  }
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',border:'1px solid var(--v1-rule)'}}>
        <MiniStat k="events" v={evts.length} sub={`next ${next?next.time:'—'}`}/>
        <MiniStat k="to-dos" v={`${done}/${todos_.length}`} sub={`${pct.toFixed(0)}% done`} tone={pct===100?'up':'flat'}/>
        <MiniStat k="focus_due" v={todos_.filter(t=>!ts[t.id]&&t.priority==='high').length} sub="high priority" tone={todos_.filter(t=>!ts[t.id]&&t.priority==='high').length>0?'down':'flat'}/>
      </div>
      {todos_.length>0&&<div style={{display:'flex',gap:3,marginTop:10,height:4}}>{todos_.map(t=><div key={t.id} style={{flex:1,background:ts[t.id]?'var(--v1-up)':'var(--v1-bg-elev-2)',transition:'background 120ms'}}/>)}</div>}
      {evts.length>0&&<div style={{marginTop:12}}>
        <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:6,fontFamily:'var(--v1-mono)'}}>▸ events</div>
        <div style={{border:'1px solid var(--v1-rule)'}}>
          {evts.map((e,i)=>{
            const isNext=next&&e.time===next.time&&!evts.slice(0,i).some(x=>x.time===next.time);
            return<div key={i} style={{display:'grid',gridTemplateColumns:'4px 52px 1fr auto',alignItems:'center',gap:10,padding:'7px 10px',borderBottom:i<evts.length-1?'1px solid var(--v1-rule)':'none',background:isNext?'rgba(79,123,255,0.06)':'transparent'}}>
              <span style={{width:4,height:16,background:e.color||'var(--v1-fg-muted)',flexShrink:0}}/>
              <span style={{fontFamily:'var(--v1-mono)',fontSize:11,color:isNext?'var(--v1-accent)':'var(--v1-fg-2)',fontVariantNumeric:'tabular-nums'}}>{e.time}</span>
              <span style={{fontFamily:'var(--v1-sans)',fontSize:12,color:'var(--v1-fg)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.title}</span>
              <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)',whiteSpace:'nowrap'}}>{e.subject||'—'}</span>
            </div>;
          })}
        </div>
      </div>}
      {todos_.length>0&&<div style={{marginTop:12}}>
        <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:6,display:'flex',alignItems:'center',gap:8,fontFamily:'var(--v1-mono)'}}>
          <span>▸ to-dos</span><span style={{flex:1}}/><span style={{color:'var(--v1-fg-3)'}}>{done}/{todos_.length}</span>
        </div>
        <div style={{border:'1px solid var(--v1-rule)'}}>
          {todos_.map((t,i)=>{const isDone=!!ts[t.id];return(

              onClick={()=>setTs(t.id)}

              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>

              <span style={{fontFamily:'var(--v1-sans)',fontSize:12,color:'var(--v1-fg)',textDecoration:isDone?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span>
              <span style={{fontFamily:'var(--v1-mono)',fontSize:9,padding:'1px 5px',color:t.priority==='high'?'var(--v1-down)':t.priority==='med'?'#F2C14E':'var(--v1-fg-muted)',border:'1px solid currentColor',letterSpacing:'0.1em',textTransform:'uppercase',whiteSpace:'nowrap'}}>{t.priority?.[0]||'·'}</span>
              <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)',minWidth:40,textAlign:'right'}}>{t.subject||'—'}</span>
            </div>
          );})}
        </div>
      </div>}
    </div>
  );
}

function DashAgendaCompact({onNav,events=[],todos=[],todoStates={},setTodoStates}){
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const evts=events.filter(e=>e.day===todayStr).sort((a,b)=>a.time.localeCompare(b.time));
  const todos_=todos.filter(t=>t.day===todayStr);
  const ts=todoStates;
  const setTs=id=>setTodoStates(s=>({...s,[id]:!s[id]}));
  const done=todos_.filter(t=>ts[t.id]).length;
  const highPri=todos_.filter(t=>!ts[t.id]&&t.priority==='high');
  const nowStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const next=evts.find(e=>e.time>nowStr)||evts[evts.length-1];
  if(evts.length===0&&todos_.length===0){
    return(
      <EmptyState icon="◈" title="no events or tasks today"
        hint="add events and todos to the calendar to see your day here"
        action={<button onClick={()=>onNav('calendar')} style={{fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.12em',background:'transparent',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-accent)',padding:'5px 14px',cursor:'pointer'}}>open calendar →</button>}
      />
    );
  }
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* 3-stat strip */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',border:'1px solid var(--v1-rule)'}}>
        <MiniStat k="events" v={evts.length} sub={`next ${next?next.time:'—'}`}/>
        <MiniStat k="to-dos" v={`${done}/${todos_.length}`} sub={`${todos_.length?(done/todos_.length*100).toFixed(0):0}% done`} tone={done===todos_.length&&todos_.length>0?'up':'flat'}/>
        <MiniStat k="urgent" v={highPri.length} sub="high priority" tone={highPri.length>0?'down':'flat'}/>
      </div>
      {/* events — compact */}
      {evts.length>0&&<div style={{border:'1px solid var(--v1-rule)'}}>
        {evts.map((e,i)=>{
          const isNext=next&&e.time===next.time&&!evts.slice(0,i).some(x=>x.time===next.time);
          return<div key={i} style={{display:'grid',gridTemplateColumns:'3px 48px 1fr auto',alignItems:'center',gap:8,padding:'6px 10px',borderBottom:i<evts.length-1?'1px solid var(--v1-rule)':'none',background:isNext?'rgba(79,123,255,0.06)':'transparent'}}>
            <span style={{width:3,height:14,background:e.color||'var(--v1-fg-muted)',flexShrink:0}}/>
            <span style={{fontFamily:'var(--v1-mono)',fontSize:11,color:isNext?'var(--v1-accent)':'var(--v1-fg-2)',fontVariantNumeric:'tabular-nums'}}>{e.time}</span>
            <span style={{fontFamily:'var(--v1-sans)',fontSize:11,color:'var(--v1-fg)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.title}</span>
            <span style={{fontFamily:'var(--v1-mono)',fontSize:9,color:'var(--v1-fg-muted)',whiteSpace:'nowrap'}}>{e.subject||''}</span>
          </div>;
        })}
      </div>}
      {/* high-priority todos only */}
      {highPri.length>0&&<div>
        <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:5,fontFamily:'var(--v1-mono)'}}>▸ urgent</div>
        <div style={{border:'1px solid var(--v1-rule)'}}>
          {highPri.map((t,i)=>{const isDone=!!ts[t.id];return(
            <div key={t.id} style={{display:'grid',gridTemplateColumns:'3px 14px 1fr auto',alignItems:'center',gap:8,padding:'6px 10px',borderBottom:i<highPri.length-1?'1px solid var(--v1-rule)':'none',cursor:'pointer',opacity:isDone?0.5:1}}
              onClick={()=>setTs(t.id)}>
              <span style={{width:3,height:14,background:t.color,flexShrink:0}}/>
              <span style={{width:11,height:11,border:`1px solid ${isDone?'var(--v1-up)':'var(--v1-down)'}`,background:isDone?'var(--v1-up)':'transparent',display:'inline-flex',alignItems:'center',justifyContent:'center',color:'var(--v1-bg)',fontSize:8,flexShrink:0}}>{isDone?'✓':''}</span>
              <span style={{fontFamily:'var(--v1-sans)',fontSize:11,color:'var(--v1-fg)',textDecoration:isDone?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span>
              <span style={{fontFamily:'var(--v1-mono)',fontSize:9,color:'var(--v1-fg-muted)'}}>{t.subject||''}</span>
            </div>
          );})}
        </div>
      </div>}
    </div>
  );
}

function Dashboard({onNav,sessions,sessionState,subjects=[],weekBars=[],thisWkH=0,leaderboard=[],events=[],todos=[],todoStates={},setTodoStates}){

        {sessionState&&sessionState.active
          ? <DashSessionHero sessionState={sessionState} onNav={onNav} subjects={subjects}/>
          : <Block label="this_week.hours" meta="current week">
              {thisWkH===0?(
                <EmptyState icon="▷" title="no study hours yet this week"
                  hint="start your first session to begin tracking"
                  action={<button onClick={()=>onNav('timer')} style={{fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.12em',background:'var(--v1-accent)',border:'none',color:'var(--v1-bg)',padding:'6px 16px',cursor:'pointer',fontWeight:600}}>begin session →</button>}
                />
              ):(
                <div>
                  <div style={{display:'flex',alignItems:'baseline',gap:3,marginBottom:12}}>
                    <div style={{fontSize:80,lineHeight:0.85,letterSpacing:'-0.05em',fontWeight:500,color:'var(--v1-fg)',fontVariantNumeric:'tabular-nums',fontFamily:'var(--v1-mono)',display:'flex',alignItems:'baseline',gap:3}}>
                      {wkH}<span style={{color:'var(--v1-fg-muted)'}}>h</span>{String(wkM).padStart(2,'0')}<span style={{color:'var(--v1-fg-muted)'}}>m</span><Cursor size="0.35em" color="var(--v1-accent)"/>
                    </div>
                  </div>
                  <SparkWide data={weekBars.map(b=>b.hours)} h={72} color="var(--v1-accent)" fill sw={1.5}/>
                </div>
              )}
            </Block>
        }
        <Block label="last_7_days.histogram" meta="hours per day · target 3h">
          <WeekBars bars={weekBars}/>
        </Block>
        <Block label="leaderboard.week" meta="ranked by hours" action={<Lnk onClick={()=>onNav('leader')}>full →</Lnk>} noBorder>
          {(()=>{
            const ranked=[...leaderboard].sort((a,b)=>b.weekly_secs-a.weekly_secs).map((u,i)=>({...u,rank:i+1,wkH:u.weekly_secs/3600}));
            if(ranked.length===0)return(
              <EmptyState icon="◉" title="you're the only one here"
                hint="invite friends to study together and compete on the leaderboard"
              />
            );
            const me=ranked.find(u=>u.isYou);
            const myIdx=ranked.findIndex(u=>u.isYou);
            const total=ranked.length;
            let indices;
            if(myIdx<=0)indices=[0,1,2];
            else if(myIdx>=total-1)indices=[Math.max(0,total-3),total-2<0?0:total-2,total-1];
            else indices=[myIdx-1,myIdx,myIdx+1];
            const rows=indices.filter(i=>i>=0&&i<total).map(i=>ranked[i]);
            return(
              <Tbl cols={['#','who','wk hrs']} widths={['28px','auto','80px']}>
                {rows.map((u,i)=>(
                  <Row key={u.id} hi={u.isYou}>
                    <Cell mono dim>#{String(u.rank).padStart(2,'0')}</Cell>
                    <Cell><span style={{display:'inline-flex',alignItems:'center',gap:7}}><span style={{width:6,height:6,background:u.isYou?'var(--v1-accent)':FRIEND_COLORS[u.rank%FRIEND_COLORS.length],borderRadius:1,flexShrink:0}}/>{u.isYou?<span style={{color:'var(--v1-accent)'}}>you</span>:u.name}{!u.isYou&&u.updated_at&&(Date.now()-new Date(u.updated_at))<5*60*1000&&<span style={{width:6,height:6,borderRadius:'50%',background:'#6BD89A',flexShrink:0,marginLeft:2}}/>}</span></Cell>
                    <Cell mono right>{fmtHM(u.wkH)}</Cell>
                  </Row>
                ))}
              </Tbl>
            );
          })()}
        </Block>
      </section>

      {/* COL RIGHT — compact agenda */}
      <section style={{overflowY:'auto',display:'flex',flexDirection:'column'}}>
        <Block label="agenda.today" meta={_now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toLowerCase()} action={<Lnk onClick={()=>onNav('calendar')}>cal →</Lnk>} noBorder>
          <DashAgenda onNav={onNav} events={events} todos={todos} todoStates={todoStates} setTodoStates={setTodoStates}/>
        </Block>
      </section>
    </div>
  );
}

/* ── TIMER ── */
function Timer({sessionState,onPause,onCommit,onDiscard,onStart,onLogManual,subjects=[]}){
  const tick=useTick(1000);
  const elapsed=sessionState.active
    ?(sessionState.paused
      ?sessionState.elapsed
      :sessionState.elapsed+Math.floor((Date.now()-sessionState.startedAt)/1000))
    :0;
  const[rating,setRating]=useState(null);
  const[awaitRating,setAwaitRating]=useState(false);
  const[timerPicked,setTimerPicked]=useState(null);
  const[timerCustom,setTimerCustom]=useState('');
  // no-session mode
  const[mode,setMode]=useState('timer'); // 'timer'|'log'
  // manual log state
  const[logSubject,setLogSubject]=useState(null);
  const[logCustom,setLogCustom]=useState('');
  const[logHours,setLogHours]=useState('');
  const[logMins,setLogMins]=useState('');
  const[logNote,setLogNote]=useState('');
  const[logRating,setLogRating]=useState(null);
  const[logTime,setLogTime]=useState(()=>{const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;});
  const[logDateOffset,setLogDateOffset]=useState(0); // 0=today, 1=yesterday, 2=custom
  // pomodoro state
  const[pomOn,setPomOn]=useState(false);
  const[pomWork,setPomWork]=useState(25);
  const[pomBreak,setPomBreak]=useState(5);
  const[pomPhase,setPomPhase]=useState('work');
  const[pomPhaseStart,setPomPhaseStart]=useState(null);
  const[editingPom,setEditingPom]=useState(false);
  const[pomWorkDraft,setPomWorkDraft]=useState('25');
  const[pomBreakDraft,setPomBreakDraft]=useState('5');

  // auto phase-switch
  useEffect(()=>{
    if(!pomOn||!pomPhaseStart||sessionState.paused)return;
    const phaseLen=(pomPhase==='work'?pomWork:pomBreak)*60;
    const spent=Math.floor((Date.now()-pomPhaseStart)/1000);
    if(spent>=phaseLen){setPomPhase(p=>p==='work'?'break':'work');setPomPhaseStart(Date.now());}
  },[tick]);

  const togglePom=()=>{
    if(!pomOn){setPomPhase('work');setPomPhaseStart(Date.now());}
    setPomOn(p=>!p);
  };
  const applyPomSettings=()=>{
    const w=parseInt(pomWorkDraft);const b=parseInt(pomBreakDraft);
    if(w>0&&b>0){setPomWork(w);setPomBreak(b);setPomPhase('work');setPomPhaseStart(Date.now());}
    setEditingPom(false);
  };

  let pomRemaining=null,pomPhaseSecs=null;
  if(pomOn&&pomPhaseStart){
    pomPhaseSecs=(pomPhase==='work'?pomWork:pomBreak)*60;
    if(!sessionState.paused){
      pomRemaining=Math.max(0,pomPhaseSecs-Math.floor((Date.now()-pomPhaseStart)/1000));
    } else {
      pomRemaining=pomPhaseSecs;
    }
  }

  const handleCommitClick=()=>{
    if(!awaitRating){setAwaitRating(true);return;}
    onCommit(rating,elapsed,sessionState.breakSecs||0);
    setAwaitRating(false);setRating(null);setPomOn(false);setPomPhaseStart(null);
  };

  const handleLogSubmit=()=>{
    const h=parseInt(logHours)||0;const m=parseInt(logMins)||0;
    const secs=(h*3600)+(m*60);
    const subj=logSubject||logCustom.trim();
    if(!secs||!subj)return;
    const d=new Date();d.setDate(d.getDate()-logDateOffset);
    const[th,tm]=(logTime||'00:00').split(':').map(Number);
    d.setHours(th,tm,0,0);
    onLogManual&&onLogManual({subject:subj,secs,rating:logRating,note:logNote,at:d});
    setLogSubject(null);setLogCustom('');setLogHours('');setLogMins('');setLogNote('');setLogRating(null);
    setLogTime(()=>{const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;});
    setLogDateOffset(0);
    setMode('timer');
  };

  const startTime=sessionState.active?new Date(sessionState.startedAt):null;
  const startedStr=startTime?`${String(startTime.getHours()).padStart(2,'0')}:${String(startTime.getMinutes()).padStart(2,'0')}`:'—';
  const progressPct=Math.min(100,Math.round((elapsed/(2*3600))*100));
  const PRESETS=subjects.length>0?subjects.map(s=>s.name):['math','cs','history','physics'];
  const inpStyle={background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'8px 10px',outline:'none',width:'100%',boxSizing:'border-box'};

  if(!sessionState.active){
    /* ── MODE TOGGLE ── */
    const ModeBtn=({id,label})=>(
      <button onClick={()=>setMode(id)} style={{flex:1,padding:'8px 0',background:mode===id?'var(--v1-bg-elev-2)':'transparent',border:'none',borderBottom:mode===id?'1px solid var(--v1-accent)':'1px solid var(--v1-rule)',color:mode===id?'var(--v1-fg)':'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',cursor:'pointer'}}>{label}</button>
    );
    return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:1,padding:'48px 40px',gap:24}}>
        <div style={{width:'100%',maxWidth:480}}>
          {/* mode tabs */}
          <div style={{display:'flex',marginBottom:24}}>
            <ModeBtn id="timer" label="▷ start timer"/>
            <ModeBtn id="log" label="✎ log manually"/>
          </div>

          {mode==='timer'&&(
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {PRESETS.map(s=>{
                  const subj=subjects.find(x=>x.name===s);
                  const color=subj?subj.color:'var(--v1-accent)';
                  const picked=timerPicked===s;
                  return(
                    <button key={s} onClick={()=>setTimerPicked(s)} style={{display:'flex',alignItems:'center',gap:10,padding:'14px 18px',background:picked?'rgba(79,123,255,0.10)':'var(--v1-bg-elev)',border:`1px solid ${picked?color:'var(--v1-rule-strong)'}`,color:picked?'var(--v1-fg)':'var(--v1-fg-2)',fontFamily:'var(--v1-mono)',fontSize:13,cursor:'pointer',letterSpacing:'0.04em',textAlign:'left',transition:'border-color 80ms'}}>
                      <span style={{width:8,height:8,background:color,flexShrink:0}}/>{s}
                    </button>
                  );
                })}
              </div>
              <div style={{borderTop:'1px solid var(--v1-rule)',paddingTop:12}}>
                <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:6,fontFamily:'var(--v1-mono)'}}>or type custom subject</div>
                <Input value={timerCustom} onChange={v=>{setTimerCustom(v);setTimerPicked(null);}} placeholder="e.g. chemistry, language..."
                  onKeyDown={e=>{if(e.key==='Enter'&&timerCustom.trim()&&onStart)onStart(timerCustom.trim());}}/>
              </div>
              <div style={{borderTop:'1px solid var(--v1-rule)',paddingTop:12}}>
                <button onClick={()=>setPomOn(p=>!p)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:pomOn?'rgba(79,123,255,0.10)':'var(--v1-bg-elev)',border:`1px solid ${pomOn?'var(--v1-accent)':'var(--v1-rule-strong)'}`,cursor:'pointer',transition:'all 100ms',marginBottom:pomOn?10:0}}>
                  <span style={{fontFamily:'var(--v1-mono)',fontSize:13,lineHeight:1,color:pomOn?'var(--v1-accent)':'var(--v1-fg-muted)'}}>◷</span>
                  <div style={{textAlign:'left',flex:1}}>
                    <div style={{fontFamily:'var(--v1-mono)',fontSize:11,color:pomOn?'var(--v1-accent)':'var(--v1-fg)',letterSpacing:'0.08em',fontWeight:pomOn?600:400}}>POMODORO</div>
                    <div style={{fontFamily:'var(--v1-mono)',fontSize:9,color:'var(--v1-fg-muted)',marginTop:2}}>{pomOn?`${pomWorkDraft}min work · ${pomBreakDraft}min break`:'timed intervals with breaks'}</div>
                  </div>
                  <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:pomOn?'var(--v1-accent)':'var(--v1-fg-muted)',padding:'3px 8px',border:`1px solid ${pomOn?'var(--v1-accent)':'var(--v1-rule)'}`,background:pomOn?'rgba(79,123,255,0.15)':'transparent'}}>{pomOn?'ON':'OFF'}</span>
                </button>
                {pomOn&&(
                  <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',padding:'8px 14px',background:'var(--v1-bg-elev)',border:'1px solid var(--v1-accent)',borderTop:'none'}}>
                    <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',letterSpacing:'0.12em',textTransform:'uppercase'}}>work</span>
                    <input value={pomWorkDraft} onChange={e=>setPomWorkDraft(e.target.value.replace(/\D/,''))} style={{width:44,background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'4px 6px',textAlign:'center',outline:'none'}}/>

                    <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',letterSpacing:'0.12em',textTransform:'uppercase',marginLeft:4}}>break</span>
                    <input value={pomBreakDraft} onChange={e=>setPomBreakDraft(e.target.value.replace(/\D/,''))} style={{width:44,background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'4px 6px',textAlign:'center',outline:'none'}}/>

                      ))}
                    </div>
                  </div>
                )}
              </div>
              <button
                disabled={!timerPicked&&!timerCustom.trim()}
                onClick={()=>{if(pomOn){const w=parseInt(pomWorkDraft);const b=parseInt(pomBreakDraft);if(w>0&&b>0){setPomWork(w);setPomBreak(b);}setPomPhase('work');setPomPhaseStart(Date.now());}onStart&&onStart(timerPicked||timerCustom.trim());}}
                style={{...Btn.md,width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:(timerPicked||timerCustom.trim())?'var(--v1-accent)':'transparent',color:(timerPicked||timerCustom.trim())?'var(--v1-bg)':'var(--v1-fg-muted)',borderColor:(timerPicked||timerCustom.trim())?'var(--v1-accent)':'var(--v1-rule)',opacity:(timerPicked||timerCustom.trim())?1:0.5}}>

          {mode==='log'&&(

/* ── LOG ── */
function Log({sessions,filterSubjects,filterMinProd}){
  const all=sessions||[];
  const list=all.filter(s=>{
    if(filterSubjects&&filterSubjects.length>0&&!filterSubjects.includes(s.subject))return false;
    if(filterMinProd&&filterMinProd>0&&(s.productivity==null||s.productivity<filterMinProd))return false;
    return true;
  });
  if(list.length===0&&sessions.length===0){
    return(
      <Block label="sessions.log" meta="0 entries">
        <EmptyState icon="◇" title="no sessions logged yet"
          hint="complete a timer session or log time manually in the session tab"
          action={null}
        />
      </Block>
    );
  }
  const hasEff=list.some(s=>s.efficiency!=null);
  return(
    <Block label="sessions.log" meta={`${list.length}${all.length!==list.length?` / ${all.length}`:''} entries`}>
      <Tbl cols={['','date','time','subject','dur','prod',...(hasEff?['eff','break']:[]),'note']} widths={['4px','64px','52px','100px','72px','40px',...(hasEff?['44px','68px']:[]),'1fr']}>
        {list.map((s,i)=>(
          <Row key={i}>
            <span style={{width:4,height:18,background:s.color,display:'block'}}/>
            <Cell mono>{s.day}</Cell>
            <Cell mono dim>{s.time||'—'}</Cell>
            <Cell>{s.subject}</Cell>
            <Cell mono right>{s.duration}</Cell>
            <Cell mono right tone={s.productivity!=null&&s.productivity>=4?'up':'flat'}>{s.productivity!=null?s.productivity.toFixed(1):'—'}</Cell>
            {hasEff&&<Cell mono right tone={s.efficiency!=null?(s.efficiency>=80?'up':s.efficiency>=60?'flat':'down'):'flat'}>{s.efficiency!=null?`${s.efficiency}%`:'—'}</Cell>}
            {hasEff&&<Cell mono dim>{s.breakSecs>0?fmtClock(s.breakSecs):'—'}</Cell>}
            <Cell dim sm>{s.note||'—'}</Cell>
          </Row>
        ))}
      </Tbl>
    </Block>
  );
}

/* ── CALENDAR ── */
function addMins(time,mins){
  const[h,m]=time.split(':').map(Number);
  const total=h*60+m+mins;
  return`${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}
function fmtDurLabel(mins){if(mins<60)return`${mins}m`;if(mins%60===0)return`${mins/60}h`;return`${Math.floor(mins/60)}h${String(mins%60).padStart(2,'0')}m`;}

          </div>

        </div>

        {/* Body */}
        <div style={{overflowY:'auto',flex:1}}>
          {tab==='events'&&(
            <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
              {selEvts.length===0&&<div style={{fontSize:11,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',padding:'8px 0'}}>no events scheduled — add one below</div>}
              {selEvts.map((e)=>{
                const endTime=e.durMins?addMins(e.time,e.durMins):null;
                const isEditing=editingId===e.id;
                return(
                  <div key={e.id}>
                    <div style={{display:'grid',gridTemplateColumns:'4px 1fr auto',gap:0,border:`1px solid ${isEditing?'var(--v1-accent)':'var(--v1-rule)'}`,background:'var(--v1-bg)',transition:'border-color 80ms'}}>
                      <span style={{background:e.color||'var(--v1-accent)'}}/>
                      <div style={{padding:'10px 12px'}}>
                        <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:e.note||e.location?4:0}}>
                          <span style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg-2)',fontVariantNumeric:'tabular-nums',flexShrink:0}}>{e.time}{endTime&&<span style={{color:'var(--v1-fg-muted)'}}> → {endTime}</span>}</span>
                          <span style={{fontFamily:'var(--v1-sans)',fontSize:13,color:'var(--v1-fg)',flex:1}}>{e.title}</span>
                          {e.durMins&&<span style={{fontFamily:'var(--v1-mono)',fontSize:9,color:'var(--v1-fg-muted)',padding:'1px 5px',border:'1px solid var(--v1-rule)',flexShrink:0}}>{fmtDurLabel(e.durMins)}</span>}
                        </div>
                        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                          {e.subject&&<span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)'}}>{e.subject}</span>}
                          {e.location&&<span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)'}}>@ {e.location}</span>}
                        </div>
                        {e.note&&<div style={{fontFamily:'var(--v1-sans)',fontSize:11,color:'var(--v1-fg-3)',marginTop:4,fontStyle:'italic'}}>{e.note}</div>}
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:0,borderLeft:'1px solid var(--v1-rule)'}}>
                        <button onClick={()=>setEditingId(isEditing?null:e.id)} style={{...Btn.sm,border:'none',borderBottom:'1px solid var(--v1-rule)',borderRadius:0,padding:'8px 10px',fontSize:9,color:isEditing?'var(--v1-accent)':'var(--v1-fg-muted)',background:'transparent',flex:1}}>✎</button>
                        <button onClick={()=>removeEvent(e.id)} style={{...Btn.sm,border:'none',borderRadius:0,padding:'8px 10px',fontSize:9,color:'var(--v1-fg-muted)',background:'transparent',flex:1}}
                          onMouseEnter={ev=>ev.currentTarget.style.color='var(--v1-down)'}
                          onMouseLeave={ev=>ev.currentTarget.style.color='var(--v1-fg-muted)'}>✕</button>
                      </div>
                    </div>
                    {isEditing&&(
                      <div style={{border:'1px solid var(--v1-accent)',borderTop:'none',background:'var(--v1-bg-elev-2)',padding:12,display:'flex',flexDirection:'column',gap:8}}>
                        <div style={{display:'flex',gap:8}}>
                          <input defaultValue={e.title} onBlur={ev=>updateEvent(e.id,{title:ev.target.value.trim()||e.title})}
                            style={{...inpS,flex:1}} placeholder="title"/>
                          <input type="time" defaultValue={e.time} onBlur={ev=>updateEvent(e.id,{time:ev.target.value})}
                            style={{...inpS,width:90}}/>
                        </div>
                        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                          <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',letterSpacing:'0.12em',textTransform:'uppercase'}}>duration</span>
                          {DUR_PRESETS.map(([m,lbl])=>(
                            <button key={m} onClick={()=>updateEvent(e.id,{durMins:m})} style={{...Btn.sm,fontSize:9,padding:'2px 7px',background:e.durMins===m?'rgba(79,123,255,0.15)':'transparent',borderColor:e.durMins===m?'var(--v1-accent)':'var(--v1-rule-strong)',color:e.durMins===m?'var(--v1-accent)':'var(--v1-fg-2)'}}>{lbl}</button>
                          ))}
                        </div>
                        <input defaultValue={e.location||''} onBlur={ev=>updateEvent(e.id,{location:ev.target.value.trim()||null})}
                          style={{...inpS}} placeholder="location (optional)"/>
                        <input defaultValue={e.note||''} onBlur={ev=>updateEvent(e.id,{note:ev.target.value.trim()||null})}
                          style={{...inpS}} placeholder="notes (optional)"/>
                        <button onClick={()=>setEditingId(null)} style={{...Btn.sm,alignSelf:'flex-end',background:'var(--v1-accent)',color:'var(--v1-bg)',borderColor:'var(--v1-accent)',fontSize:9,padding:'3px 12px'}}>done</button>
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Add event form */}
              <div style={{border:'1px dashed var(--v1-rule-strong)',background:'var(--v1-bg-elev-2)',padding:12,display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
                <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>add event</div>
                <div style={{display:'flex',gap:8}}>
                  <input value={newEvtTitle} onChange={e=>setNewEvtTitle(e.target.value)} placeholder="event title" onKeyDown={e=>{if(e.key==='Enter')addEvent();}}
                    style={{...inpS,flex:1}}
                    onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
                  <input type="time" value={newEvtTime} onChange={e=>setNewEvtTime(e.target.value)}
                    style={{...inpS,width:90}}
                    onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
                </div>
                {/* Duration */}
                <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',letterSpacing:'0.12em',textTransform:'uppercase',flexShrink:0}}>duration</span>
                  {DUR_PRESETS.map(([m,lbl])=>(
                    <button key={m} onClick={()=>setNewEvtDurMins(m)} style={{...Btn.sm,fontSize:9,padding:'2px 7px',background:newEvtDurMins===m?'rgba(79,123,255,0.15)':'transparent',borderColor:newEvtDurMins===m?'var(--v1-accent)':'var(--v1-rule-strong)',color:newEvtDurMins===m?'var(--v1-accent)':'var(--v1-fg-2)'}}>{lbl}</button>
                  ))}
                  <span style={{fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>→ {addMins(newEvtTime,newEvtDurMins)}</span>
                </div>
                {/* Location */}
                <input value={newEvtLocation} onChange={e=>setNewEvtLocation(e.target.value)} placeholder="location (optional)"
                  style={{...inpS}}
                  onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
                {/* Notes */}
                <input value={newEvtNote} onChange={e=>setNewEvtNote(e.target.value)} placeholder="notes (optional)"
                  style={{...inpS}}
                  onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
                {/* Subject + add */}
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <div style={{fontSize:9,letterSpacing:'0.12em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)',flexShrink:0}}>subject</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5,flex:1}}>
                    <button onClick={()=>setNewEvtSubj(null)} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 9px',fontSize:10,fontFamily:'var(--v1-mono)',background:!newEvtSubj?'rgba(79,123,255,0.12)':'transparent',border:`1px solid ${!newEvtSubj?'var(--v1-accent)':'var(--v1-rule-strong)'}`,color:!newEvtSubj?'var(--v1-accent)':'var(--v1-fg-2)',cursor:'pointer'}}>none</button>
                    {subjects.map(s=>{const on=newEvtSubj===s.name;return(
                      <button key={s.name} onClick={()=>setNewEvtSubj(on?null:s.name)} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 9px',fontSize:10,fontFamily:'var(--v1-mono)',background:on?'rgba(79,123,255,0.12)':'transparent',border:`1px solid ${on?s.color:'var(--v1-rule-strong)'}`,color:on?'var(--v1-fg)':'var(--v1-fg-2)',cursor:'pointer'}}>
                        <span style={{width:6,height:6,background:s.color,flexShrink:0,borderRadius:1}}/>{s.name}
                      </button>
                    );})}
                  </div>
                  <button onClick={addEvent} disabled={!newEvtTitle.trim()} style={{...Btn.sm,background:newEvtTitle.trim()?'var(--v1-accent)':'transparent',color:newEvtTitle.trim()?'var(--v1-bg)':'var(--v1-fg-muted)',borderColor:newEvtTitle.trim()?'var(--v1-accent)':'var(--v1-rule)',flexShrink:0}}>add ↵</button>
                </div>
              </div>
            </div>
          )}
          {tab==='to-dos'&&(
            <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
              {selTodos.length===0&&<div style={{fontSize:11,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',padding:'8px 0'}}>no to-dos for this day — add one below</div>}
              {selTodos.map((t)=>{const isDone=!!todoStates[t.id];return(
                <div key={t.id} style={{border:`1px solid ${isDone?'var(--v1-rule)':'var(--v1-rule)'}`,background:'var(--v1-bg)',opacity:isDone?0.6:1}}>
                  <div style={{display:'grid',gridTemplateColumns:'4px 20px 1fr auto auto auto',alignItems:'center',gap:10,padding:'10px 12px',cursor:'pointer'}}
                    onClick={()=>setTodoStates(s=>({...s,[t.id]:!s[t.id]}))}>
                    <span style={{width:4,height:'100%',minHeight:20,background:t.color||'#5C6776'}}/>
                    <span style={{width:15,height:15,border:`1px solid ${isDone?'var(--v1-up)':'var(--v1-rule-strong)'}`,background:isDone?'var(--v1-up)':'transparent',display:'inline-flex',alignItems:'center',justifyContent:'center',color:'var(--v1-bg)',fontSize:9,fontWeight:700,flexShrink:0}}>{isDone?'✓':''}</span>
                    <div>
                      <div style={{fontFamily:'var(--v1-sans)',fontSize:12,color:'var(--v1-fg)',textDecoration:isDone?'line-through':'none'}}>{t.title}</div>
                      {t.note&&<div style={{fontFamily:'var(--v1-sans)',fontSize:11,color:'var(--v1-fg-3)',fontStyle:'italic',marginTop:2}}>{t.note}</div>}
                    </div>
                    <span style={{fontFamily:'var(--v1-mono)',fontSize:9,padding:'2px 6px',color:t.priority==='high'?'var(--v1-down)':t.priority==='med'?'#F2C14E':'var(--v1-fg-muted)',border:'1px solid currentColor',letterSpacing:'0.1em',textTransform:'uppercase',flexShrink:0}}>{t.priority||'low'}</span>
                    {t.subject&&<span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)',flexShrink:0}}>{t.subject}</span>}
                    <button onClick={e=>{e.stopPropagation();removeTodo(t.id);}} style={{...Btn.sm,padding:'2px 7px',fontSize:9,color:'var(--v1-fg-muted)',flexShrink:0}}
                      onMouseEnter={ev=>{ev.currentTarget.style.color='var(--v1-down)';ev.currentTarget.style.borderColor='var(--v1-down)';}}
                      onMouseLeave={ev=>{ev.currentTarget.style.color='var(--v1-fg-muted)';ev.currentTarget.style.borderColor='var(--v1-rule-strong)';}}>✕</button>
                  </div>
                </div>
              );})}
              {/* Add todo form */}
              <div style={{border:'1px dashed var(--v1-rule-strong)',background:'var(--v1-bg-elev-2)',padding:12,display:'flex',flexDirection:'column',gap:8}}>
                <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>add todo</div>
                <Input value={newTodoTitle} onChange={setNewTodoTitle} placeholder="todo description" onKeyDown={e=>{if(e.key==='Enter')addTodo();}}/>
                <input value={newTodoNote} onChange={e=>setNewTodoNote(e.target.value)} placeholder="notes (optional)"
                  style={{...inpS}} onFocus={e=>e.target.style.borderColor='var(--v1-accent)'} onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}/>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <div style={{display:'inline-flex',border:'1px solid var(--v1-rule)'}}>
                    {['low','med','high'].map(p=>{const a=newTodoPrio===p;return<button key={p} onClick={()=>setNewTodoPrio(p)} style={{fontFamily:'var(--v1-mono)',fontSize:9,background:a?'var(--v1-bg-hover)':'transparent',color:a?'var(--v1-fg)':'var(--v1-fg-3)',border:'none',borderRight:'1px solid var(--v1-rule)',padding:'4px 10px',cursor:'pointer',letterSpacing:'0.1em',textTransform:'uppercase'}}>{p}</button>;})}
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4,flex:1}}>
                    <button onClick={()=>setNewTodoSubj(null)} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',fontSize:10,fontFamily:'var(--v1-mono)',background:!newTodoSubj?'rgba(79,123,255,0.12)':'transparent',border:`1px solid ${!newTodoSubj?'var(--v1-accent)':'var(--v1-rule-strong)'}`,color:!newTodoSubj?'var(--v1-accent)':'var(--v1-fg-2)',cursor:'pointer'}}>none</button>
                    {subjects.map(s=>{const on=newTodoSubj===s.name;return(
                      <button key={s.name} onClick={()=>setNewTodoSubj(on?null:s.name)} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',fontSize:10,fontFamily:'var(--v1-mono)',background:on?'rgba(79,123,255,0.12)':'transparent',border:`1px solid ${on?s.color:'var(--v1-rule-strong)'}`,color:on?'var(--v1-fg)':'var(--v1-fg-2)',cursor:'pointer'}}>
                        <span style={{width:5,height:5,background:s.color,flexShrink:0,borderRadius:1}}/>{s.name}
                      </button>
                    );})}
                  </div>
                  <button onClick={addTodo} disabled={!newTodoTitle.trim()} style={{...Btn.sm,background:newTodoTitle.trim()?'var(--v1-accent)':'transparent',color:newTodoTitle.trim()?'var(--v1-bg)':'var(--v1-fg-muted)',borderColor:newTodoTitle.trim()?'var(--v1-accent)':'var(--v1-rule)',flexShrink:0}}>add ↵</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Calendar({subjects=[],events=[],setEvents,todos=[],setTodos,todoStates={},setTodoStates}){
  const _calNow=new Date();
  const TODAY_MONTH={year:_calNow.getFullYear(),month:_calNow.getMonth()};
  const today=_calNow.getDate();
  const[sel,setSel]=useState(null);
  const[calMonth,setCalMonth]=useState(TODAY_MONTH);

  const evtsByDay=useMemo(()=>{
    const m={};
    events.forEach(e=>{(m[e.day]=m[e.day]||[]).push(e);});
    return m;
  },[events]);
  const todosByDay=useMemo(()=>{
    const m={};
    todos.forEach(t=>{(m[t.day]=m[t.day]||[]).push(t);});
    return m;
  },[todos]);

  // Compute dynamic month info from calMonth state
  const daysInMonth=new Date(calMonth.year,calMonth.month+1,0).getDate();
  // JS Date: 0=Sun,1=Mon,...6=Sat; we want 0=Mon
  const rawDow=new Date(calMonth.year,calMonth.month,1).getDay();
  const firstDow=(rawDow+6)%7; // convert to Mon=0
  const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthName=`${MONTH_NAMES[calMonth.month]} ${calMonth.year}`;
  const isCurrentMonth=calMonth.year===TODAY_MONTH.year&&calMonth.month===TODAY_MONTH.month;

  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  const DOWS=['mon','tue','wed','thu','fri','sat','sun'];

  // Week summary — compute current Mon–Sun dynamically
  const todayDow=(_now.getDay()+6)%7; // 0=Mon
  const wkMonDate=_now.getDate()-todayDow;
  const wkDays=Array.from({length:7},(_,i)=>wkMonDate+i).filter(d=>d>=1&&d<=daysInMonth);
  const wkDayStrs=wkDays.map(d=>`${calMonth.year}-${String(calMonth.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  const wkEvts=wkDayStrs.flatMap(d=>evtsByDay[d]||[]);
  const wkTodos=wkDayStrs.flatMap(d=>todosByDay[d]||[]);
  const wkDone=wkTodos.filter(t=>todoStates[t.id]).length;
  const wkHigh=wkTodos.filter(t=>t.priority==='high'&&!todoStates[t.id]).length;
  const wkMonStr=`mon ${Math.max(1,wkMonDate)}`;
  const wkSunStr=`sun ${Math.min(daysInMonth,wkMonDate+6)}`;
  const wkMeta=`this week · ${wkMonStr} — ${wkSunStr} ${_now.toLocaleDateString('en-GB',{month:'short'}).toLowerCase()}`;

  const prevMonth=()=>setCalMonth(cm=>{const m=cm.month-1;return m<0?{year:cm.year-1,month:11}:{year:cm.year,month:m};});
  const nextMonth=()=>setCalMonth(cm=>{const m=cm.month+1;return m>11?{year:cm.year+1,month:0}:{year:cm.year,month:m};});

  const activeEvtsByDay=evtsByDay;
  const activeTodosByDay=todosByDay;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Week summary */}
      <div style={{flexShrink:0}}>
        <Block label="week.summary" meta={wkMeta}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
            <KPI k="events" v={wkEvts.length} sub="this week" tone="flat"/>
            <KPI k="to-dos_open" v={wkTodos.length-wkDone} sub={`${wkDone}/${wkTodos.length} done`}/>
            <KPI k="high_priority" v={wkHigh} sub="due this week" tone={wkHigh>0?'down':'up'}/>
            <KPI k="flagged" v={wkEvts.filter(e=>e.flagged).length} sub="exams / deadlines" tone={wkEvts.filter(e=>e.flagged).length>0?'down':'flat'}/>
          </div>
        </Block>
      </div>

      {/* Full-width month grid */}
      <div style={{flex:1,minHeight:0,overflowY:'auto'}}>
        <header style={{display:'flex',alignItems:'center',gap:12,padding:'10px 18px',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',position:'sticky',top:0,zIndex:10}}>
          
          <span style={{color:'var(--v1-fg-2)'}}>{monthName.toLowerCase()}</span>
          <span style={{flex:1}}/>
          <button onClick={prevMonth} style={Btn.sm}>‹</button>
          <button onClick={()=>{setCalMonth(TODAY_MONTH);setSel(today);}} style={{...Btn.sm,borderColor:'var(--v1-accent)',color:'var(--v1-accent)'}}>today</button>
          <button onClick={nextMonth} style={Btn.sm}>›</button>
        </header>
        {/* Single unified grid: DOW labels + day cells as direct children → perfect column alignment */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
          {DOWS.map((d,i)=>(
            <div key={`h${i}`} style={{padding:'6px 0',fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',borderRight:i<6?'1px solid var(--v1-rule)':'none',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev-2)',fontFamily:'var(--v1-mono)',textAlign:'center',position:'sticky',top:41,zIndex:9}}>
              {d}
            </div>
          ))}
          {cells.map((d,ci)=>{
            const col=ci%7;
            if(d===null)return(
              <div key={`e${ci}`} style={{height:90,borderRight:col<6?'1px solid var(--v1-rule)':'none',borderBottom:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev-2)',opacity:0.35}}/>
            );
            const dateStr=`${calMonth.year}-${String(calMonth.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const evts=activeEvtsByDay[dateStr]||[],todos=activeTodosByDay[dateStr]||[];
            const open=todos.filter(t=>!todoStates[t.id]).length;
            const done=todos.filter(t=>todoStates[t.id]).length;
            const isTdy=isCurrentMonth&&d===today,isSel=sel===d,hasFlag=evts.some(e=>e.flagged);
            const maxEvts=3;
            return(
              <button key={`d${ci}`} onClick={()=>setSel(d)} style={{minHeight:100,background:isSel?'rgba(79,123,255,0.10)':isTdy?'rgba(79,123,255,0.04)':'transparent',border:'none',borderRight:col<6?'1px solid var(--v1-rule)':'none',borderBottom:'1px solid var(--v1-rule)',borderTop:isTdy?'2px solid var(--v1-accent)':'2px solid transparent',padding:'5px 7px',cursor:'pointer',fontFamily:'var(--v1-mono)',textAlign:'left',display:'flex',flexDirection:'column',gap:2,color:'var(--v1-fg)',position:'relative',transition:'background 80ms',overflow:'hidden'}}
                onMouseEnter={e=>{if(!isSel&&!isTdy)e.currentTarget.style.background='rgba(79,123,255,0.05)';}}
                onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=isTdy?'rgba(79,123,255,0.04)':'transparent';}}>
                {/* Date row */}
                <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:2,flexShrink:0}}>
                  <span style={{fontSize:11,fontVariantNumeric:'tabular-nums',color:isTdy?'var(--v1-accent)':isSel?'var(--v1-fg)':'var(--v1-fg-2)',fontWeight:isTdy?700:400}}>{String(d).padStart(2,'0')}</span>
                  {isTdy&&<span style={{fontSize:7,letterSpacing:'0.12em',color:'var(--v1-accent)',fontWeight:600,textTransform:'uppercase'}}>today</span>}

/* ── RANK ── */
function Leader({sessions=[],user,streak=0,subjects=[],leaderboard=[]}){
  const[scope,setScope]=useState('7d');
  const sc=SCOPES.find(s=>s.id===scope);
  const mySeries=computeUserSeries(sessions,scope);
  const myTotal=sumH(mySeries);
  const trend=mySeries.length>=2?(mySeries[mySeries.length-1]/Math.max(0.01,mySeries[0])*100-100):0;

  // Build ranked list from leaderboard (includes you + friends with real stats)
  const ranked=[...leaderboard].sort((a,b)=>b.weekly_secs-a.weekly_secs).map((u,i)=>({...u,rank:i+1,wkH:u.weekly_secs/3600}));
  const me=ranked.find(u=>u.isYou)||{id:user?.id,name:'you',isYou:true,wkH:myTotal,weekly_secs:myTotal*3600,streak,rank:1};
  const myRank=ranked.findIndex(u=>u.isYou)+1||1;

  // Build chart series: real series for you, approximated for friends
  const myWkSum=mySeries.reduce((a,v)=>a+v,0)||0.001;
  const chartSeries=[
    {name:'you',color:'var(--v1-accent)',values:mySeries,fillFirst:true},
    ...ranked.filter(u=>!u.isYou).map((u,i)=>{
      const friendWk=u.weekly_secs/3600;
      const ratio=friendWk/myWkSum;
      return{name:u.name,color:FRIEND_COLORS[i%FRIEND_COLORS.length],values:mySeries.map(v=>v*ratio),dim:true};
    }),
  ];

  return(
    <div>
      <Block label={`rank.summary · ${scopeLabel(scope)}`} meta="ranked by weekly hours" action={<ScopePicker scope={scope} onScope={setScope}/>}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
          <KPI k="your_rank" v={ranked.length>1?`#${myRank}`:'solo'} sub={ranked.length>1?`of ${ranked.length}`:'add friends to rank'} tone={myRank===1&&ranked.length>1?'up':'flat'}/>
          <KPI k="this_week" v={fmtHM(myTotal)} sub={`${(myTotal/sc.n).toFixed(2)}h / ${sc.unit}`} tone={myTotal>0?'up':'flat'}/>
          <KPI k="streak" v={`${streak}d`} sub={streak>0?'keep it up':'start today'} tone={streak>0?'up':'flat'}/>
          <KPI k="trend" v={`${trend>=0?'+':''}${trend.toFixed(0)}%`} sub="end vs start" tone={trend>=0?'up':'down'}/>
        </div>
      </Block>
      <Block label="rank.chart" meta={`your hours · ${sc.unit} basis`}>
        <BigChart series={chartSeries} scope={scope} height={240} fillFirst yLabel="h"/>
      </Block>
      <Block label="rank.leaderboard" meta={`${Math.max(1,ranked.length)} member${ranked.length!==1?'s':''} · ranked by this week`} noBorder>
        {ranked.length===0?(
          <EmptyState icon="◉" title="invite friends to compete"
            hint="share andreev.net with study partners — once they join, they appear here ranked by hours"
          />
        ):(
          <Tbl cols={['#','who','wk hrs','streak','all time']} widths={['32px','auto','90px','70px','90px']}>
            {ranked.map((u,i)=>(
              <Row key={u.id} hi={u.isYou}>
                <Cell mono dim>#{String(u.rank).padStart(2,'0')}</Cell>
                <Cell>
                  <span style={{display:'inline-flex',alignItems:'center',gap:8}}>
                    <span style={{width:7,height:7,background:u.isYou?'var(--v1-accent)':FRIEND_COLORS[i%FRIEND_COLORS.length],borderRadius:1,flexShrink:0}}/>
                    <span style={{color:u.isYou?'var(--v1-accent)':'var(--v1-fg)'}}>{u.isYou?'you':u.name}</span>
                    {!u.isYou&&u.updated_at&&(Date.now()-new Date(u.updated_at))<5*60*1000&&<span style={{width:7,height:7,borderRadius:'50%',background:'#6BD89A',flexShrink:0}}/>}
                  </span>
                </Cell>
                <Cell mono right tone={u.isYou&&myRank===1&&ranked.length>1?'up':'flat'}>{fmtHM(u.wkH)}</Cell>
                <Cell mono dim>{u.streak}d</Cell>
                <Cell mono right dim>{fmtHM(u.total_secs/3600)}</Cell>
              </Row>
            ))}
          </Tbl>
        )}
        {ranked.length>0&&ranked.length<5&&(
          <div style={{padding:'10px 0 2px',fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',textAlign:'center'}}>share andreev.net to add more study partners</div>
        )}
      </Block>
    </div>
  );
}

/* ── HOURS / HEATMAP ── */
function DailyHeatmap({sessions}){
  const[hov,setHov]=useState(null);
  const DAYS=['mon','tue','wed','thu','fri','sat','sun'];
  const MONTHS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];

  const dayMap={};
  sessions.filter(s=>s.created_at).forEach(s=>{
    const d=new Date(s.created_at);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    dayMap[k]=(dayMap[k]||0)+sessH(s);
  });

  const today=new Date();today.setHours(0,0,0,0);
  const todayDow=(today.getDay()+6)%7;
  // find monday of today's week
  const thisMonday=new Date(today);thisMonday.setDate(today.getDate()-todayDow);
  // find monday of the week containing the earliest session
  const dated=sessions.filter(s=>s.created_at).map(s=>{const d=new Date(s.created_at);d.setHours(0,0,0,0);return d;});
  const firstDay=dated.length?new Date(Math.min(...dated.map(d=>d.getTime()))):thisMonday;
  const firstDow=(firstDay.getDay()+6)%7;
  const firstMonday=new Date(firstDay);firstMonday.setDate(firstDay.getDate()-firstDow);
  const weeksFromFirst=Math.round((thisMonday-firstMonday)/(7*24*3600*1000))+1;
  const WEEKS=Math.min(24,Math.max(1,weeksFromFirst));
  const gridStart=new Date(thisMonday);gridStart.setDate(thisMonday.getDate()-(WEEKS-1)*7);

  // cells[week][day]
  const cells=Array.from({length:WEEKS},(_,w)=>Array.from({length:7},(_,d)=>{
    const date=new Date(gridStart);
    date.setDate(gridStart.getDate()+w*7+d);
    const isFuture=date>today;
    const k=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    return{date:new Date(date),hours:isFuture?0:(dayMap[k]||0),isFuture,k};
  }));

  const cellColor=({hours,isFuture})=>{
    if(isFuture)return'var(--v1-bg-elev)';
    if(hours===0)return'var(--v1-bg-elev-2)';
    const t=Math.min(1,hours/3);
    return`rgba(79,123,255,${(0.25+t*0.75).toFixed(2)})`;
  };

  const colLabel=w=>{
    const d=new Date(gridStart);d.setDate(gridStart.getDate()+w*7);
    const prev=new Date(gridStart);prev.setDate(gridStart.getDate()+(w-1)*7);
    if(w===0||d.getMonth()!==prev.getMonth())return MONTHS[d.getMonth()];
    return'';
  };

  return(
    <div style={{position:'relative',userSelect:'none'}}>
      <div style={{display:'grid',gridTemplateColumns:`40px repeat(${WEEKS},1fr)`,gap:1}}>
        <div/>
        {Array.from({length:WEEKS},(_,w)=>(
          <div key={w} style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',overflow:'visible',whiteSpace:'nowrap'}}>{colLabel(w)}</div>
        ))}
        {DAYS.map((lbl,d)=>(
          <React.Fragment key={d}>
            <div style={{fontSize:10,color:'var(--v1-fg-3)',display:'flex',alignItems:'center',fontFamily:'var(--v1-mono)'}}>{lbl}</div>
            {Array.from({length:WEEKS},(_,w)=>{
              const cell=cells[w][d];
              return(
                <div key={w}
                  style={{height:36,background:cellColor(cell),cursor:cell.isFuture?'default':'crosshair',transition:'opacity 80ms',opacity:hov&&hov.k===cell.k?0.65:1}}
                  onMouseEnter={e=>{if(!cell.isFuture)setHov({...cell,cx:e.clientX,cy:e.clientY});}}
                  onMouseMove={e=>{if(!cell.isFuture)setHov(h=>h?{...h,cx:e.clientX,cy:e.clientY}:null);}}
                  onMouseLeave={()=>setHov(null)}
                />
              );
            })}
          </React.Fragment>
        ))}
      </div>
      <div style={{marginTop:12,display:'flex',gap:5,alignItems:'center',fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>
        <span>0h</span>{[[0.25,'1h'],[0.5,'2h'],[0.75,'3h'],[1.0,'4h+']].map(([v,lbl])=>(
          <React.Fragment key={lbl}>
            <div style={{width:14,height:8,background:`rgba(79,123,255,${v})`}}/>
            <span>{lbl}</span>
          </React.Fragment>
        ))}
      </div>
      {hov&&(
        <div style={{position:'fixed',left:hov.cx+14,top:hov.cy-60,pointerEvents:'none',zIndex:600,background:'var(--v1-bg-elev-2)',border:'1px solid var(--v1-rule-strong)',padding:'7px 11px',fontFamily:'var(--v1-mono)',boxShadow:'0 4px 20px rgba(0,0,0,0.5)',minWidth:140}}>
          <div style={{fontSize:9,letterSpacing:'0.12em',color:'var(--v1-fg-3)',textTransform:'uppercase',marginBottom:4}}>
            {hov.date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toLowerCase()}
          </div>
          <div style={{fontSize:18,fontVariantNumeric:'tabular-nums',color:hov.hours>0?'var(--v1-accent)':'var(--v1-fg-muted)',fontWeight:600,letterSpacing:'-0.02em'}}>
            {hov.hours>0?fmtHM(hov.hours):'no sessions'}
          </div>
        </div>
      )}
    </div>
  );
}
