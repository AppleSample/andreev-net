      );})}
    </div>
  );

  return(
    <div>
      <Block label={`rank.summary · ${scopeLabel(scope)}`} meta={`your hours · ${sc.unit} basis`} action={<ScopePicker scope={scope} onScope={setScope}/>}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
          <KPI k={rankKpiK} v={ranked.length>1?`#${myRank}`:'solo'} sub={rankKpiSub} tone={rankKpiTone}/>
          <KPI k={scopeLabel(scope)} v={fmtHM(scope==='7d'?_lbStats.thisWkH:myTotal)} sub={scope==='7d'?`mon–sun · ${_lbStats.thisWkH.toFixed(2)}h`:`${(myTotal/sc.n).toFixed(2)}h / ${sc.unit}`} tone={(scope==='7d'?_lbStats.thisWkH:myTotal)>0?'up':'flat'}/>
          <KPI k="streak" v={`${streak}d`} sub={streak>0?'keep it up':'start today'} tone={streak>0?'up':'flat'}/>
          <KPI k="trend" v={`${trend>=0?'+':''}${trend.toFixed(0)}%`} sub="end vs start" tone={trend>=0?'up':'down'}/>
        </div>
      </Block>
      <Block label="rank.chart" meta={`your hours · ${sc.unit} basis`}>
        <BigChart series={chartSeries} scope={scope} height={240} fillFirst yLabel="h"/>
      </Block>
      <Block label="rank.leaderboard" meta={`${Math.max(1,ranked.length)} member${ranked.length!==1?'s':''} · ${lbColLabel}`} noBorder action={lbToggle}>
        {ranked.length===0?(
          <EmptyState icon="◉" title="invite friends to compete"
            hint="share andreev.net with study partners — once they join, they appear here ranked by hours"
          />
        ):(
          <Tbl cols={['#','who',lbColLabel,'streak']} widths={['32px','auto','90px','70px']}>
            {ranked.map((u,i)=>(
              <Row key={u.id} hi={u.isYou}>
                <Cell mono dim>
                  <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                    <span>#{String(u.rank).padStart(2,'0')}</span>
                    {u.rankDelta!==null&&u.rankDelta!==0&&(
                      <span style={{fontSize:8,letterSpacing:'0.06em',color:u.rankDelta>0?'var(--v1-up)':'var(--v1-down)',fontWeight:700}}>
                        {u.rankDelta>0?`▲${u.rankDelta}`:`▼${Math.abs(u.rankDelta)}`}
                      </span>
                    )}
                  </span>
                </Cell>
                <Cell>
                  <span style={{display:'inline-flex',alignItems:'center',gap:8}}>
                    <span style={{width:7,height:7,background:u.isYou?'var(--v1-accent)':friendColor(u.id),borderRadius:1,flexShrink:0}}/>
                    <span style={{color:u.isYou?'var(--v1-accent)':'var(--v1-fg)'}}>{u.isYou?'you':u.name}</span>
                    {!u.isYou&&u.updated_at&&(Date.now()-new Date(u.updated_at))<5*60*1000&&<span style={{width:7,height:7,borderRadius:'50%',background:'#6BD89A',flexShrink:0}}/>}
                  </span>
                </Cell>
                <Cell mono right tone={u.isYou&&myRank===1&&ranked.length>1?'up':'flat'}>{fmtHM(u.wkH)}</Cell>
                <Cell mono dim>{u.streak}d</Cell>
              </Row>
            ))}
          </Tbl>
        )}
        {ranked.length>0&&ranked.length<5&&(
          <div style={{padding:'10px 0 2px',fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',textAlign:'center'}}>share andreev.net to add more study partners</div>
        )}
      </Block>
      {(()=>{
        const subjMap={};
        sessions.forEach(s=>{
          if(!s.subject)return;
          const k=s.subject;
          if(!subjMap[k])subjMap[k]={name:k,totalH:0,sessions:0,prodSum:0,prodCount:0};
          subjMap[k].totalH+=sessH(s);
          subjMap[k].sessions+=1;
          if(s.productivity){subjMap[k].prodSum+=s.productivity;subjMap[k].prodCount+=1;}
        });
        const subjs=Object.values(subjMap).sort((a,b)=>b.totalH-a.totalH);
        if(subjs.length<2)return null;
        const maxH=subjs[0].totalH;
        const bestProd=[...subjs].filter(s=>s.prodCount>0).sort((a,b)=>(b.prodSum/b.prodCount)-(a.prodSum/a.prodCount))[0];
        return(
          <Block label="subject.benchmarks" meta="your performance by subject">
            <div style={{display:'flex',flexDirection:'column',gap:0,border:'1px solid var(--v1-rule)'}}>
              {subjs.map((s,i)=>{
                const avg=s.prodCount>0?s.prodSum/s.prodCount:null;
                const isMostH=i===0;
                const isBestProd=bestProd&&s.name===bestProd.name;
                const subj=subjects.find(x=>x.name===s.name);
                const color=subj?.color||'var(--v1-accent)';
                return(
                  <div key={s.name} style={{display:'grid',gridTemplateColumns:'8px 1fr 80px 60px 40px',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:i<subjs.length-1?'1px solid var(--v1-rule)':'none',background:isBestProd?'rgba(79,195,127,0.04)':'transparent'}}>
                    <span style={{width:4,height:28,background:color,borderRadius:1}}/>
                    <div style={{minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontFamily:'var(--v1-mono)',fontSize:12,color:'var(--v1-fg)'}}>{s.name}</span>
                        {isMostH&&<span style={{fontSize:7,letterSpacing:'0.14em',color:'var(--v1-accent)',fontFamily:'var(--v1-mono)'}}>MOST TIME</span>}
                        {isBestProd&&!isMostH&&<span style={{fontSize:7,letterSpacing:'0.14em',color:'var(--v1-up)',fontFamily:'var(--v1-mono)'}}>BEST PROD</span>}
                      </div>
                      <div style={{marginTop:4,height:3,background:'var(--v1-bg-elev-2)',position:'relative',width:'100%'}}>
                        <div style={{position:'absolute',inset:0,width:`${(s.totalH/maxH)*100}%`,background:color,opacity:0.7}}/>
                      </div>
                    </div>
                    <span style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg)',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{fmtHM(s.totalH)}</span>
                    <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:avg>=4?'var(--v1-up)':avg>=3?'var(--v1-fg-2)':'var(--v1-fg-3)',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{avg?`${avg.toFixed(1)}/5`:'—'}</span>
                    <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)',textAlign:'right'}}>{s.sessions}s</span>
                  </div>
                );
              })}
            </div>
          </Block>
        );
      })()}
    </div>
  );
}

/* ── HOURS / HEATMAP ── */
function DailyHeatmap({sessions}){
  const[hov,setHov]=useState(null);
  const DAYS=['mon','tue','wed','thu','fri','sat','sun'];
  const MONTHS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];

  const dayMap={};
  sessions.filter(s=>s.created_at).forEach(s=>{
    const d=new Date(s.created_at);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    dayMap[k]=(dayMap[k]||0)+sessH(s);
  });

  const today=new Date();today.setHours(0,0,0,0);
  const todayDow=(today.getDay()+6)%7;
  // find monday of today's week
  const thisMonday=new Date(today);thisMonday.setDate(today.getDate()-todayDow);
  // find monday of the week containing the earliest session
  const dated=sessions.filter(s=>s.created_at).map(s=>{const d=new Date(s.created_at);d.setHours(0,0,0,0);return d;});
  const firstDay=dated.length?new Date(Math.min(...dated.map(d=>d.getTime()))):thisMonday;
  const firstDow=(firstDay.getDay()+6)%7;
  const firstMonday=new Date(firstDay);firstMonday.setDate(firstDay.getDate()-firstDow);
  const weeksFromFirst=Math.round((thisMonday-firstMonday)/(7*24*3600*1000))+1;
  const WEEKS=Math.min(24,Math.max(1,weeksFromFirst));
  const gridStart=new Date(thisMonday);gridStart.setDate(thisMonday.getDate()-(WEEKS-1)*7);

  // cells[week][day]
  const cells=Array.from({length:WEEKS},(_,w)=>Array.from({length:7},(_,d)=>{
    const date=new Date(gridStart);
    date.setDate(gridStart.getDate()+w*7+d);
    const isFuture=date>today;
    const k=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    return{date:new Date(date),hours:isFuture?0:(dayMap[k]||0),isFuture,k};
  }));

  const cellColor=({hours,isFuture})=>{
    if(isFuture)return'var(--v1-bg-elev)';
    if(hours===0)return'var(--v1-bg-elev-2)';
    const t=Math.min(1,hours/3);
    return`rgba(79,123,255,${(0.25+t*0.75).toFixed(2)})`;
  };

  const colLabel=w=>{
    const d=new Date(gridStart);d.setDate(gridStart.getDate()+w*7);
    const prev=new Date(gridStart);prev.setDate(gridStart.getDate()+(w-1)*7);
    if(w===0||d.getMonth()!==prev.getMonth())return MONTHS[d.getMonth()];
    return'';
  };

  return(
    <div style={{position:'relative',userSelect:'none'}}>
      <div style={{display:'grid',gridTemplateColumns:`40px repeat(${WEEKS},1fr)`,gap:1}}>
        <div/>
        {Array.from({length:WEEKS},(_,w)=>(
          <div key={w} style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',overflow:'visible',whiteSpace:'nowrap'}}>{colLabel(w)}</div>
        ))}
        {DAYS.map((lbl,d)=>(
          <React.Fragment key={d}>
            <div style={{fontSize:10,color:'var(--v1-fg-3)',display:'flex',alignItems:'center',fontFamily:'var(--v1-mono)'}}>{lbl}</div>
            {Array.from({length:WEEKS},(_,w)=>{
              const cell=cells[w][d];
              return(
                <div key={w}
                  style={{height:36,background:cellColor(cell),cursor:cell.isFuture?'default':'crosshair',transition:'opacity 80ms',opacity:hov&&hov.k===cell.k?0.65:1}}
                  onMouseEnter={e=>{if(!cell.isFuture)setHov({...cell,cx:e.clientX,cy:e.clientY});}}
                  onMouseMove={e=>{if(!cell.isFuture)setHov(h=>h?{...h,cx:e.clientX,cy:e.clientY}:null);}}
                  onMouseLeave={()=>setHov(null)}
                />
              );
            })}
          </React.Fragment>
        ))}
      </div>
      <div style={{marginTop:12,display:'flex',gap:5,alignItems:'center',fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>
        <span>0h</span>{[[0.25,'1h'],[0.5,'2h'],[0.75,'3h'],[1.0,'4h+']].map(([v,lbl])=>(
          <React.Fragment key={lbl}>
            <div style={{width:14,height:8,background:`rgba(79,123,255,${v})`}}/>
            <span>{lbl}</span>
          </React.Fragment>
        ))}
      </div>
      {hov&&(
        <div style={{position:'fixed',left:hov.cx+14,top:hov.cy-60,pointerEvents:'none',zIndex:600,background:'var(--v1-bg-elev-2)',border:'1px solid var(--v1-rule-strong)',padding:'7px 11px',fontFamily:'var(--v1-mono)',boxShadow:'0 4px 20px rgba(0,0,0,0.5)',minWidth:140}}>
          <div style={{fontSize:9,letterSpacing:'0.12em',color:'var(--v1-fg-3)',textTransform:'uppercase',marginBottom:4}}>
            {hov.date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toLowerCase()}
          </div>
          <div style={{fontSize:18,fontVariantNumeric:'tabular-nums',color:hov.hours>0?'var(--v1-accent)':'var(--v1-fg-muted)',fontWeight:600,letterSpacing:'-0.02em'}}>
            {hov.hours>0?fmtHM(hov.hours):'no sessions'}
          </div>
        </div>
      )}
    </div>
  );
}

function FocusGrid({heatmap}){
  const days=['mon','tue','wed','thu','fri','sat','sun'];
  const grid=heatmap&&heatmap.length===7?heatmap:Array.from({length:7},()=>Array(24).fill(0));
  const hasData=grid.some(row=>row.some(v=>v>0));
  if(!hasData) return(
    <EmptyState icon="◰" title="no focus data yet"
      hint="study sessions will build your hourly heatmap over time"
    />
  );
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'40px repeat(24,1fr)',gap:1}}>
        <div/>
        {Array.from({length:24},(_,h)=><div key={h} style={{fontSize:9,color:'var(--v1-fg-muted)',textAlign:'center',fontFamily:'var(--v1-mono)',fontVariantNumeric:'tabular-nums'}}>{h%3===0?String(h).padStart(2,'0'):''}</div>)}
        {grid.map((row,d)=>(
          <React.Fragment key={d}>
            <div style={{fontSize:10,color:'var(--v1-fg-3)',display:'flex',alignItems:'center',fontFamily:'var(--v1-mono)'}}>{days[d]}</div>
            {row.map((v,h)=><div key={h} title={`${days[d]} ${String(h).padStart(2,'0')}:00`} style={{height:36,background:v>0.05?`rgba(79,123,255,${v.toFixed(2)})`:'var(--v1-bg-elev-2)',cursor:'default'}}/>)}
          </React.Fragment>
        ))}
      </div>
      <div style={{marginTop:12,display:'flex',gap:5,alignItems:'center',fontSize:10,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>
        <span>less</span>{[0.1,0.3,0.6,1].map(v=><div key={v} style={{width:14,height:8,background:`rgba(79,123,255,${v})`}}/>)}<span>more</span>
      </div>
    </div>
  );
}

function Heatmap({weeklyTarget,setWeeklyTarget,sessions=[],heatmap,peakHour,peakDay,activeDays30=0,thisWkH=0}){
  const[mode,setMode]=useState('focus');
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(String(weeklyTarget));
  const pace=Math.round((thisWkH/weeklyTarget)*100);
  const paceColor=pace>=100?'var(--v1-up)':pace>=75?'var(--v1-fg-2)':'var(--v1-down)';
  const commitTarget=()=>{const n=parseFloat(draft);if(!isNaN(n)&&n>0){setWeeklyTarget(Math.round(n));setEditing(false);}};
  const DAYNAMES=['mon','tue','wed','thu','fri','sat','sun'];
  const HOURNAMES=Array.from({length:24},(_,h)=>`${String(h).padStart(2,'0')}:00`);
  return(
    <div>
      <Block label="hours.summary" meta="all time">
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
          <KPI k="best_hour" v={peakHour!=null?`${String(peakHour).padStart(2,'0')}:00`:'—'} sub={peakHour!=null?'peak focus hour':'no data yet'} tone={peakHour!=null?'up':'flat'}/>
          <KPI k="best_day"  v={peakDay!=null?DAYNAMES[peakDay]:'—'} sub={peakDay!=null?'most productive day':'no data yet'} tone={peakDay!=null?'up':'flat'}/>
          <KPI k="sessions"  v={String(sessions.length)} sub={`${activeDays30} active days / 30`}/>
          <KPI k="active_days" v={`${activeDays30} / 30`} sub={`streak data in status bar`}/>
        </div>
      </Block>
      <Block label="weekly_target.pace" meta="set your weekly hour goal">
        <div style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:12,border:'1px solid var(--v1-rule)'}}>
          <span style={{fontSize:9,letterSpacing:'0.14em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)',flexShrink:0}}>target</span>
          <button onClick={()=>{const n=weeklyTarget-1;if(n>0){setWeeklyTarget(n);setDraft(String(n));}}} style={{...Btn.sm,padding:'2px 8px',fontSize:12,lineHeight:1,flexShrink:0}}>−</button>
          {editing?(
            <input value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commitTarget}
              onKeyDown={e=>{if(e.key==='Enter')commitTarget();if(e.key==='Escape')setEditing(false);}} autoFocus
              style={{width:44,fontFamily:'var(--v1-mono)',fontSize:18,fontVariantNumeric:'tabular-nums',background:'transparent',border:'none',borderBottom:'1px solid var(--v1-accent)',color:'var(--v1-fg)',outline:'none',textAlign:'center'}}/>
          ):(
            <span onClick={()=>{setDraft(String(weeklyTarget));setEditing(true);}} style={{fontSize:18,fontVariantNumeric:'tabular-nums',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',cursor:'text',flexShrink:0}}>{weeklyTarget}<span style={{fontSize:11,color:'var(--v1-fg-muted)',marginLeft:2}}>h</span></span>
          )}
          <button onClick={()=>{const n=weeklyTarget+1;setWeeklyTarget(n);setDraft(String(n));}} style={{...Btn.sm,padding:'2px 8px',fontSize:12,lineHeight:1,flexShrink:0}}>+</button>
          <div style={{flex:1,height:4,background:'var(--v1-bg-elev-2)',position:'relative',minWidth:60}}>
            <div style={{position:'absolute',inset:0,width:`${Math.min(100,pace)}%`,background:paceColor,transition:'width 300ms'}}/>
          </div>
          <span style={{fontFamily:'var(--v1-mono)',fontSize:18,fontVariantNumeric:'tabular-nums',color:paceColor,fontWeight:600,flexShrink:0}}>{pace}%</span>
          <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)',flexShrink:0}}>{thisWkH.toFixed(1)}h/{weeklyTarget}h</span>
          <span style={{fontFamily:'var(--v1-mono)',fontSize:9,color:paceColor==='var(--v1-down)'?'var(--v1-down)':'var(--v1-fg-3)',flexShrink:0}}>{pace>=100?'✓ met':pace>=75?`${(weeklyTarget-thisWkH).toFixed(1)}h to go`:`${(weeklyTarget-thisWkH).toFixed(1)}h behind`}</span>
        </div>
      </Block>
      <Block label={mode==='focus'?'hourly_focus.grid':'daily_totals.grid'} meta={mode==='focus'?'focus quality · last 7 days':'hours studied · last 18 weeks'}
        action={<ModePicker mode={mode} onMode={setMode} modes={[{id:'focus',label:'FOCUS QUALITY',icon:'◰'},{id:'daily',label:'HOURS / DAY',icon:'▦'}]}/>}>
        {mode==='focus'?<FocusGrid heatmap={heatmap}/>:<DailyHeatmap sessions={sessions}/>}
      </Block>
      <Block label="productivity_by_duration" meta="avg rating by session length · rated sessions only">
        {(()=>{
          const prod=computeProdByDuration(sessions);
          if(!prod||prod.length<2)return(
            <EmptyState icon="◷" title="not enough rated sessions yet" hint="rate sessions when committing to unlock this insight"/>
          );
          const best=prod.reduce((a,b)=>b.avgProd>a.avgProd?b:a);
          return(
            <div style={{display:'flex',gap:0,border:'1px solid var(--v1-rule)',overflow:'hidden'}}>
              {prod.map((b,i)=>{
                const isBest=b===best;
                const color=isBest?'var(--v1-up)':b.avgProd>=3.5?'var(--v1-accent)':'var(--v1-down)';
                return(
                  <div key={b.label} style={{flex:1,display:'flex',flexDirection:'column',borderRight:i<prod.length-1?'1px solid var(--v1-rule)':'none',padding:'12px 14px',gap:6,background:isBest?'rgba(79,195,127,0.06)':'transparent'}}>
                    <div style={{fontSize:7,letterSpacing:'0.18em',color:isBest?'var(--v1-up)':'transparent',textTransform:'uppercase',fontFamily:'var(--v1-mono)',fontWeight:600}}>★ BEST</div>
                    <div style={{fontSize:20,color,fontFamily:'var(--v1-mono)',fontVariantNumeric:'tabular-nums',letterSpacing:'-0.02em'}}>{b.avgProd.toFixed(1)}<span style={{fontSize:9,color:'var(--v1-fg-muted)',marginLeft:2}}>/5</span></div>
                    <div style={{height:3,background:'var(--v1-bg-elev-2)',position:'relative'}}>
                      <div style={{position:'absolute',inset:0,width:`${(b.avgProd/5)*100}%`,background:color,transition:'width 600ms'}}/>
                    </div>
                    <div style={{fontSize:9,color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',letterSpacing:'0.06em'}}>{b.label}</div>
                    <div style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)'}}>{b.count} session{b.count!==1?'s':''}</div>
                  </div>
                );
              })}
            </div>
          );
        })()}
      </Block>
    </div>
  );
}

/* ── SUBJECTS ── */
function SubjectsDonut({scoped,total}){
  const SIZE=280,STROKE=38,R=(SIZE-STROKE)/2,C=2*Math.PI*R;
  let acc=0;
  const segs=scoped.map(s=>{const pct=s.total/total,seg={...s,pct,len:pct*C,offset:acc};acc+=pct;return seg;});
  const[hov,setHov]=useState(null);
  const focus=hov?segs.find(s=>s.name===hov):[...segs].sort((a,b)=>b.pct-a.pct)[0];
  return(
    <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:24,alignItems:'center'}}>
      <div style={{display:'flex',flexDirection:'column',gap:3}}>
        <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',padding:'4px 8px 6px',borderBottom:'1px solid var(--v1-rule)',marginBottom:4,fontFamily:'var(--v1-mono)'}}>▸ allocation</div>
        {[...segs].sort((a,b)=>b.pct-a.pct).map(s=>(
          <div key={s.name} onMouseEnter={()=>setHov(s.name)} onMouseLeave={()=>setHov(null)} style={{display:'grid',gridTemplateColumns:'10px 1fr 72px 38px',alignItems:'center',gap:10,padding:'5px 8px',cursor:'pointer',background:hov===s.name?'rgba(79,123,255,0.06)':'transparent',borderLeft:hov===s.name?'2px solid var(--v1-accent)':'2px solid transparent',transition:'background 60ms'}}>
            <span style={{width:9,height:9,background:s.color}}/>
            <span style={{fontSize:12,color:'var(--v1-fg-2)',fontFamily:'var(--v1-sans)'}}>{s.name}</span>
            <span style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg)',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{fmtHM(s.total)}</span>
            <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{Math.round(s.pct*100)}%</span>
          </div>
        ))}
      </div>
      <div style={{position:'relative',width:SIZE,height:SIZE}}>
        <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`} style={{transform:'rotate(-90deg)'}}>
          <circle cx={SIZE/2} cy={SIZE/2} r={R} fill="none" stroke="var(--v1-bg-elev-2)" strokeWidth={STROKE}/>
          {segs.map(s=><circle key={s.name} cx={SIZE/2} cy={SIZE/2} r={R} fill="none" stroke={s.color} strokeWidth={STROKE} strokeDasharray={`${s.len} ${C-s.len}`} strokeDashoffset={-s.offset*C} onMouseEnter={()=>setHov(s.name)} onMouseLeave={()=>setHov(null)} style={{cursor:'pointer',transition:'opacity 80ms',opacity:hov&&hov!==s.name?0.4:1}}/>)}
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
          <div style={{fontSize:9,color:'var(--v1-fg-muted)',letterSpacing:'0.16em',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>{hov||'total'}</div>
          <div style={{fontSize:28,color:'var(--v1-fg)',fontVariantNumeric:'tabular-nums',letterSpacing:'-0.03em',marginTop:4,fontFamily:'var(--v1-mono)'}}>{fmtHM(hov?(segs.find(s=>s.name===hov)?.total||0):total)}</div>
          <div style={{fontSize:10,color:'var(--v1-fg-muted)',marginTop:2,fontFamily:'var(--v1-mono)'}}>{hov?`${Math.round((segs.find(s=>s.name===hov)?.pct||0)*100)}%`:`${scoped.length} subjects`}</div>
        </div>
      </div>
      <div>
        <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',padding:'4px 0 6px',borderBottom:'1px solid var(--v1-rule)',marginBottom:10,fontFamily:'var(--v1-mono)'}}>▸ {hov?'hovered':'top subject'}</div>
        {focus&&<div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}><span style={{width:12,height:24,background:focus.color}}/><div><div style={{fontSize:16,color:'var(--v1-fg)',fontFamily:'var(--v1-sans)'}}>{focus.name}</div><div style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)'}}>{Math.round(focus.pct*100)}% of total</div></div></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
            {[['hours',fmtHM(focus.total)],['sessions',focus.sessions||0],['prod',focus.productivity?(focus.productivity.toFixed(1)+'/5'):'—'],['last',focus.lastStudied||'—']].map(([k,v])=>(
              <div key={k} style={{padding:'8px 10px',border:'1px solid var(--v1-rule)'}}>
                <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',fontFamily:'var(--v1-mono)'}}>{k}</div>
                <div style={{fontFamily:'var(--v1-mono)',fontSize:14,fontVariantNumeric:'tabular-nums',color:'var(--v1-fg)',marginTop:2}}>{v}</div>
              </div>
            ))}
          </div>
        </div>}
      </div>
    </div>
  );
}

function Subjects({user,subjects=[],setSubjects,sessions=[]}){
  const[scope,setScope]=useState('7d');
  const[mode,setMode]=useState('donut');
  const[trendSubj,setTrendSubj]=useState(null);
  const[manageOpen,setManageOpen]=useState(false);
  // Use shared subjects from Shell
  const subjs=subjects.map(s=>({...s,_idx:s.id??s._idx??s.name}));

  const scoped=subjs.map(s=>{
    const series=computeSubjectSeries(sessions,s.name,scope);
    const total=sumH(series);
    const ss=sessions.filter(x=>x.subject===s.name);
    const prods=ss.filter(x=>x.productivity!=null);
    const productivity=prods.length>0?prods.reduce((a,x)=>a+x.productivity,0)/prods.length:null;
    const lastStudied=ss.length>0?(ss[0].day||'—'):'—';
    return{...s,series,total,sessions:ss.length,productivity,lastStudied};
  });
  const grand=scoped.reduce((a,s)=>a+s.total,0);
  const sc=SCOPES.find(s=>s.id===scope);
  const[name,setName]=useState('');const[col,setCol]=useState(SUBJ_COLORS[4]);
  return(
    <div>
      {scoped.length===0?(
        <Block label="subjects.summary" meta="no subjects yet" action={<button onClick={()=>setManageOpen(true)} style={Btn.sm}>+ add subject</button>}>
          <EmptyState icon="◇" title="no subjects tracked yet"
            hint="add subjects you study, then log sessions to see your time breakdown"
            action={<button onClick={()=>setManageOpen(true)} style={{fontFamily:'var(--v1-mono)',fontSize:10,letterSpacing:'0.12em',background:'var(--v1-accent)',border:'none',color:'var(--v1-bg)',padding:'6px 16px',cursor:'pointer',fontWeight:600}}>+ add your first subject</button>}
          />
        </Block>
      ):(
        <div>
          <Block label="subjects.summary" meta={`${scoped.length} subjects · ${fmtHM(grand)} · ${scopeLabel(scope)}`}
            action={<span style={{display:'inline-flex',gap:8,alignItems:'center'}}><ScopePicker scope={scope} onScope={setScope}/><button onClick={()=>setManageOpen(true)} style={Btn.sm}>+ manage</button></span>}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',border:'1px solid var(--v1-rule)'}}>
              <KPI k="total" v={fmtHM(grand)} sub={`${sc.label} window`}/>
              <KPI k="top_subject" v={[...scoped].sort((a,b)=>b.total-a.total)[0].name} sub={fmtHM([...scoped].sort((a,b)=>b.total-a.total)[0].total)} tone="up"/>
              <KPI k="avg_per_subject" v={fmtHM(grand/Math.max(1,scoped.length))} sub={`${scoped.length} tracked`}/>
              <KPI k="balance" v={`${Math.round([...scoped].sort((a,b)=>b.total-a.total)[0].total/grand*100)}%`} sub="top subject share"/>
            </div>
          </Block>
          <Block label="subjects.viz" meta={`mode: ${mode}`}
            action={<ModePicker mode={mode} onMode={m=>{setMode(m);if(m==='trend'&&!trendSubj&&scoped.length>0)setTrendSubj(scoped[0].name);}} modes={[{id:'donut',label:'DONUT',icon:'◯'},{id:'bars',label:'BARS',icon:'▤'},{id:'area',label:'OVER TIME',icon:'▲'},{id:'trend',label:'TREND',icon:'◈'}]}/>}>
            {mode==='donut'&&<SubjectsDonut scoped={scoped} total={grand}/>}
            {mode==='bars'&&<div style={{display:'flex',flexDirection:'column',gap:16}}>{[...scoped].sort((a,b)=>b.total-a.total).map(s=>{const pct=s.total/Math.max(...scoped.map(x=>x.total))*100;return<div key={s.name} style={{display:'grid',gridTemplateColumns:'110px 1fr 110px',alignItems:'center',gap:16}}><span style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:12,color:'var(--v1-fg)',fontFamily:'var(--v1-sans)'}}><span style={{width:9,height:9,background:s.color}}/>{s.name}</span><div style={{height:20,background:'var(--v1-bg-elev-2)',position:'relative'}}><div style={{position:'absolute',inset:0,width:`${pct}%`,background:s.color}}/></div><span style={{fontFamily:'var(--v1-mono)',fontSize:12,color:'var(--v1-fg)',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{fmtHM(s.total)} <span style={{color:'var(--v1-fg-muted)',fontSize:10}}>{Math.round(s.total/grand*100)}%</span></span></div>;})}
            </div>}
            {mode==='area'&&<BigChart series={scoped.map(s=>({name:s.name,color:s.color,values:s.series}))} scope={scope} height={240} yLabel="h" kind="area"/>}
            {mode==='trend'&&(()=>{
              const active=trendSubj||(scoped[0]?.name);
              const sel=scoped.find(s=>s.name===active)||scoped[0];
              const trendSeries=sel?computeSubjectSeries(sessions,sel.name,scope):[];
              const trendTotal=trendSeries.reduce((a,v)=>a+v,0);
              const trendPeak=Math.max(...trendSeries);
              const trendAvg=trendSeries.filter(v=>v>0).length>0?trendSeries.reduce((a,v)=>a+v,0)/trendSeries.filter(v=>v>0).length:0;
              return(
                <div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:12,paddingBottom:12,borderBottom:'1px solid var(--v1-rule)'}}>
                    {scoped.map(s=>{
                      const isActive=s.name===(active);
                      return(
                        <button key={s.name} onClick={()=>setTrendSubj(s.name)} style={{fontFamily:'var(--v1-mono)',fontSize:9,letterSpacing:'0.14em',background:isActive?s.color:'transparent',color:isActive?'var(--v1-bg)':'var(--v1-fg-3)',border:`1px solid ${isActive?s.color:'var(--v1-rule)'}`,padding:'4px 10px',cursor:'pointer',fontWeight:isActive?700:500,textTransform:'uppercase',transition:'all 0.12s'}}>
                          <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                            {!isActive&&<span style={{width:6,height:6,background:s.color,borderRadius:1,display:'inline-block'}}/>}
                            {s.name}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                  {sel&&(
                    <div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',border:'1px solid var(--v1-rule)',marginBottom:12}}>
                        <KPI k="period_total" v={fmtHM(trendTotal)} sub={scopeLabel(scope)} tone={trendTotal>0?'up':'flat'}/>
                        <KPI k="peak_period" v={fmtHM(trendPeak)} sub={`${sc.unit} high`}/>
                        <KPI k="avg_active" v={fmtHM(trendAvg)} sub={`per active ${sc.unit}`}/>
                      </div>
                      <BigChart series={[{name:sel.name,color:sel.color,values:trendSeries,fillFirst:true}]} scope={scope} height={220} yLabel="h"/>
                    </div>
                  )}
                </div>
              );
            })()}
          </Block>
          <Block label="subjects.table" meta={`per-subject · ${scopeLabel(scope)}`}>
            <Tbl cols={['','subject','last','sess','prod','trend',`${sc.label} hrs`,'share']} widths={['4px','auto','60px','40px','40px','200px','90px','1fr']}>
              {scoped.map(s=>{const pct=s.total/grand;return(
                <Row key={s._idx??s.name}>
                  <span style={{width:4,height:18,background:s.color,display:'block'}}/>
                  <Cell>{s.name}</Cell><Cell mono dim sm>{s.lastStudied}</Cell><Cell mono right dim>{s.sessions}</Cell>
                  <Cell mono right tone={s.productivity>=4?'up':'flat'}>{s.productivity?s.productivity.toFixed(1):'—'}</Cell>
                  <Cell><Spark data={s.series} w={188} h={20} color={s.color} sw={1}/></Cell>
                  <Cell mono right>{fmtHM(s.total)}</Cell>
                  <Cell><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{flex:1,height:4,background:'var(--v1-bg-elev-2)',position:'relative'}}><div style={{position:'absolute',inset:0,width:`${pct*100}%`,background:s.color}}/></div><span style={{fontSize:10,color:'var(--v1-fg-muted)',fontVariantNumeric:'tabular-nums',width:30,textAlign:'right'}}>{Math.round(pct*100)}%</span></div></Cell>
                </Row>
              );})}
            </Tbl>
          </Block>
        </div>
      )}
      {manageOpen&&<Modal title="manage_subjects" onClose={()=>setManageOpen(false)} width={520}>
        <div style={{padding:18,borderBottom:'1px solid var(--v1-rule)'}}>
          <div style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',marginBottom:8,fontFamily:'var(--v1-mono)'}}>+ add new subject</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:8,alignItems:'center'}}>
            <Input value={name} onChange={setName} placeholder="e.g. chemistry" autoFocus onKeyDown={async e=>{if(e.key==='Enter'&&name.trim()){const n=name.trim().toLowerCase();setName('');if(user?.id){const d=await sbAPI.addSubject(user.id,{name:n,color:col});if(d)setSubjects(a=>[...a,d]);}else{setSubjects(a=>[...a,{name:n,color:col,_idx:Date.now()}]);}}}}/>
            <div style={{display:'flex',gap:3}}>{SUBJ_COLORS.map(c=><button key={c} onClick={()=>setCol(c)} style={{width:20,height:20,background:c,border:col===c?'2px solid var(--v1-fg)':'1px solid var(--v1-rule)',padding:0,cursor:'pointer'}}/>)}</div>
            <button disabled={!name.trim()} onClick={async()=>{if(name.trim()){const n=name.trim().toLowerCase();setName('');if(user?.id){const d=await sbAPI.addSubject(user.id,{name:n,color:col});if(d)setSubjects(a=>[...a,d]);}else{setSubjects(a=>[...a,{name:n,color:col,_idx:Date.now()}]);}}}  } style={{...Btn.sm,background:name.trim()?'var(--v1-accent)':'transparent',color:name.trim()?'var(--v1-bg)':'var(--v1-fg-muted)',borderColor:name.trim()?'var(--v1-accent)':'var(--v1-rule)',opacity:name.trim()?1:0.5}}>add ↵</button>
          </div>
        </div>
        <div style={{maxHeight:320,overflow:'auto'}}>
          {subjs.map((s,i)=><div key={s._idx??s.name} style={{display:'grid',gridTemplateColumns:'4px auto 1fr auto',gap:12,alignItems:'center',padding:'10px 18px',borderTop:'1px solid var(--v1-rule)'}}>
            <span style={{width:4,height:18,background:s.color}}/><span style={{fontSize:13,color:'var(--v1-fg)',fontFamily:'var(--v1-sans)'}}>{s.name}</span>
            <span style={{fontFamily:'var(--v1-mono)',fontSize:10,color:'var(--v1-fg-muted)'}}>{s.sessions} sessions · {s.lastStudied}</span>
            <button onClick={async()=>{if(s.id&&user?.id)await sbAPI.deleteSubject(s.id);setSubjects(a=>a.filter(x=>(x.id??x._idx??x.name)!==(s.id??s._idx??s.name)));}} style={{...Btn.sm,fontSize:10,padding:'3px 10px'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--v1-down)';e.currentTarget.style.color='var(--v1-down)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--v1-rule-strong)';e.currentTarget.style.color='var(--v1-fg-2)';}}>remove ✕</button>
          </div>)}
        </div>
      </Modal>}
    </div>
  );
}

/* ── NETWORK ── */
const FRIEND_COLORS=['#5B9DAB','#C89B5C','#8B7DB8','#C77B7B','#6FA88A','#A8786F','#7B9BC8','#B8A85C'];
function friendColor(id){let h=0;for(let i=0;i<(id||'').length;i++)h=(h*31+id.charCodeAt(i))>>>0;return FRIEND_COLORS[h%FRIEND_COLORS.length];}
function getFriendData(uid){try{return JSON.parse(localStorage.getItem('andreev_fd_'+uid)||'{"friends":[],"requests":[]}')}catch{return{friends:[],requests:[]};}}
function setFriendData(uid,d){localStorage.setItem('andreev_fd_'+uid,JSON.stringify(d));}

function Friend({user,leaderboard=[]}){
  const uid=user?.id;
  const[friends,setFriends]=useState([]);
  const[requests,setRequests]=useState([]);
  const[query,setQuery]=useState('');
  const[results,setResults]=useState([]);
  const[status,setStatus]=useState(null); // {ok,err}
  const[searching,setSearching]=useState(false);
  const inputRef=useRef(null);

  useEffect(()=>{
    if(!_sb||!uid)return;
    sbAPI.getFriends(uid).then(setFriends).catch(()=>{});
    sbAPI.getPendingRequests(uid).then(setRequests).catch(()=>{});
  },[uid]);

  const doSearch=async()=>{
    const q=query.trim();
    if(!q){setStatus({err:'enter a name to search'});return;}
    setSearching(true);setResults([]);setStatus(null);
    const r=await sbAPI.searchProfiles(q,uid);
    setSearching(false);
    if(!r.length){setStatus({err:`no users found for "${q}" — they need to sign up first`});return;}
    setResults(r);
  };

  const sendReq=async(target)=>{
    const r=await sbAPI.sendFriendRequest(uid,target.id);
    if(r.error){setStatus({err:r.error});return;}
    setResults([]);setQuery('');setStatus({ok:`request sent to ${target.name}`});
  };

  const acceptReq=async(req)=>{
    await sbAPI.acceptRequest(req.id);
    setRequests(r=>r.filter(x=>x.id!==req.id));
    sbAPI.getFriends(uid).then(setFriends);
  };

  const declineReq=async(req)=>{
    await sbAPI.declineRequest(req.id);
    setRequests(r=>r.filter(x=>x.id!==req.id));
  };

  const removeFriend=async(friendId)=>{
    await sbAPI.removeFriend(uid,friendId).catch(()=>{});
    setFriends(f=>f.filter(x=>x.id!==friendId));
  };

  const fieldStyle={flex:1,background:'var(--v1-bg)',border:'1px solid var(--v1-rule-strong)',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:12,padding:'8px 10px',outline:'none'};

  return(
    <div>
      {requests.length>0&&(
        <Block label="network.requests" meta={`${requests.length} pending`}>
          {requests.map((req,i)=>(
            <div key={req.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<requests.length-1?'1px solid var(--v1-rule)':'none'}}>
              <span style={{flex:1,fontSize:12,color:'var(--v1-fg)',fontFamily:'var(--v1-mono)'}}>{req.fromName} wants to connect</span>
              <button onClick={()=>acceptReq(req)} style={{...Btn.sm,background:'var(--v1-up)',color:'var(--v1-bg)',borderColor:'var(--v1-up)',padding:'4px 12px',fontWeight:600}}>accept</button>
              <button onClick={()=>declineReq(req)} style={{...Btn.sm,padding:'4px 10px'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--v1-down)';e.currentTarget.style.color='var(--v1-down)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--v1-rule-strong)';e.currentTarget.style.color='var(--v1-fg-2)';}}>decline</button>
            </div>
          ))}
        </Block>
      )}
      <Block label="network.add" meta="find by name">
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12}}>
          <input ref={inputRef} value={query} onChange={e=>{setQuery(e.target.value);setResults([]);setStatus(null);}}
            placeholder="search by name…" style={fieldStyle}
            onFocus={e=>e.target.style.borderColor='var(--v1-accent)'}
            onBlur={e=>e.target.style.borderColor='var(--v1-rule-strong)'}
            onKeyDown={e=>{if(e.key==='Enter')doSearch();}}/>
          <button onClick={doSearch} disabled={searching}
            style={{...Btn.sm,background:'var(--v1-accent)',color:'var(--v1-bg)',borderColor:'var(--v1-accent)',padding:'8px 16px',flexShrink:0,fontWeight:600,opacity:searching?0.7:1}}>
            {searching?'…':'search →'}
          </button>
        </div>
        {status?.err&&<div style={{fontSize:11,color:'var(--v1-down)',fontFamily:'var(--v1-mono)',marginBottom:8}}>✕ {status.err}</div>}
        {status?.ok&&<div style={{padding:'8px 12px',background:'rgba(107,216,154,0.08)',border:'1px solid var(--v1-up)',fontSize:11,color:'var(--v1-up)',fontFamily:'var(--v1-mono)',marginBottom:8}}>✓ {status.ok}</div>}
        {results.length>0&&<div style={{border:'1px solid var(--v1-rule-strong)'}}>
          {results.map((u,i)=>(
            <div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderBottom:i<results.length-1?'1px solid var(--v1-rule)':'none'}}>
              <span style={{flex:1,fontSize:12,color:'var(--v1-fg)',fontFamily:'var(--v1-mono)'}}>{u.name}</span>
              <button onClick={()=>sendReq(u)} style={{...Btn.sm,background:'var(--v1-accent)',color:'var(--v1-bg)',borderColor:'var(--v1-accent)',fontWeight:600,padding:'4px 12px'}}>add →</button>
            </div>
          ))}
        </div>}
      </Block>
      <Block label="network.members" meta={`${friends.length+1} member${friends.length!==0?'s':''}`}>
        {friends.length===0
          ?<EmptyState title="no friends yet" hint="search by name above to send a friend request"/>
          :<div style={{border:'1px solid var(--v1-rule)'}}>
            <div style={{display:'grid',gridTemplateColumns:'8px 1fr 1fr auto',padding:'0 12px',height:26,alignItems:'center',background:'var(--v1-bg-elev)',borderBottom:'1px solid var(--v1-rule)',fontSize:9,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',gap:8}}>
              <span/><span>who</span><span>studying</span><span/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'8px 1fr 1fr auto',padding:'0 12px',height:32,alignItems:'center',background:'rgba(79,123,255,0.07)',fontFamily:'var(--v1-mono)',gap:8}}>
              <span style={{width:6,height:6,background:'var(--v1-accent)',borderRadius:'50%'}}/>
              <span style={{fontSize:11,color:'var(--v1-accent)'}}>you</span>
              <span style={{fontSize:9,color:'var(--v1-fg-muted)'}}>● online</span>
              <span/>
            </div>
            {friends.map((f,i)=>{
              const lb=leaderboard.find(u=>u.id===f.id);
              const isOnline=lb?.updated_at&&(Date.now()-new Date(lb.updated_at))<5*60*1000;
              const subject=lb?.current_subject||null;
              return(
                <div key={f.id} style={{display:'grid',gridTemplateColumns:'8px 1fr 1fr auto',padding:'0 12px',height:36,alignItems:'center',borderTop:'1px solid var(--v1-rule)',background:i%2===0?'transparent':'rgba(255,255,255,0.012)',fontFamily:'var(--v1-mono)',gap:8}}>
                  <span style={{width:6,height:6,background:isOnline?'#6BD89A':friendColor(f.id),borderRadius:isOnline?'50%':'1px',flexShrink:0,boxShadow:isOnline?'0 0 5px #6BD89A':'none'}}/>
                  <span style={{fontSize:11,color:'var(--v1-fg)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                  <span style={{fontSize:9,color:isOnline?'#6BD89A':subject?'var(--v1-fg-muted)':'var(--v1-fg-3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'0.06em'}}>
                    {isOnline&&subject?subject:isOnline?'● online':subject?`last: ${subject}`:'—'}
                  </span>
                  <button onClick={()=>removeFriend(f.id)}
                    style={{...Btn.sm,fontSize:9,padding:'2px 8px',color:'var(--v1-fg-muted)',borderColor:'var(--v1-rule)'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--v1-down)';e.currentTarget.style.color='var(--v1-down)';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--v1-rule)';e.currentTarget.style.color='var(--v1-fg-muted)';}}>
                    remove
                  </button>
                </div>
              );
            })}
          </div>
        }
      </Block>
    </div>

function FilterPanel({subjects,onClose,filterSubjects,setFilterSubjects,filterMinProd,setFilterMinProd,onNav}){
  const[query,setQuery]=useState('');
  const[sel,setSel]=useState(0);
  const inputRef=useRef(null);

  const q=query.trim().toLowerCase();

  const navItems=CMD_NAV.filter(c=>
    !q||c.label.includes(q)||c.desc.includes(q)||c.id.includes(q)||c.kbd===q
  );

  const sessionMatches=q.length>1?subjects.filter(s=>
    s.subject?.toLowerCase().includes(q)||
    s.note?.toLowerCase().includes(q)||
    s.day?.toLowerCase().includes(q)
  ).slice(0,5):[];

  const allItems=[
    ...navItems.map(c=>({type:'nav',...c})),
    ...sessionMatches.map(s=>({type:'session',...s})),
  ];

  useEffect(()=>{setSel(0);},[query]);
  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),30);},[]);
  useEffect(()=>{
    const h=e=>{
      if(e.key==='Escape'){onClose();return;}
      if(e.key==='ArrowDown'){setSel(s=>Math.min(s+1,allItems.length-1));e.preventDefault();}
      if(e.key==='ArrowUp'){setSel(s=>Math.max(s-1,0));e.preventDefault();}
      if(e.key==='Enter'&&allItems[sel]){runItem(allItems[sel]);e.preventDefault();}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[allItems,sel]);

  const runItem=item=>{
    if(item.type==='nav'){onNav&&onNav(item.id);onClose();}
    else if(item.type==='session'){
      setFilterSubjects(item.subject?[item.subject]:[]);
      setFilterMinProd(0);
      onNav&&onNav('log');
      onClose();
    }
  };

  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,zIndex:400,background:'rgba(5,6,8,0.72)',backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:100}}>
      <div style={{width:520,background:'var(--v1-bg-elev)',border:'1px solid var(--v1-rule-strong)',fontFamily:'var(--v1-mono)',boxShadow:'0 24px 60px rgba(0,0,0,0.7)'}}>
        {/* input */}
        <div style={{display:'flex',alignItems:'center',padding:'0 14px',borderBottom:'1px solid var(--v1-rule)',gap:10}}>
          <span style={{fontSize:14,color:'var(--v1-fg-muted)'}}>⌕</span>
          <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)}
            placeholder="go to... or search sessions"
            style={{flex:1,background:'transparent',border:'none',outline:'none',color:'var(--v1-fg)',fontFamily:'var(--v1-mono)',fontSize:13,padding:'14px 0',letterSpacing:'0.02em'}}/>
          <span style={{fontSize:10,color:'var(--v1-fg-muted)',padding:'3px 7px',border:'1px solid var(--v1-rule)',letterSpacing:'0.08em'}}>esc</span>
        </div>
        {/* results */}
        <div style={{maxHeight:360,overflowY:'auto'}}>
          {allItems.length===0&&q.length>0&&(
            <div style={{padding:'14px',fontSize:11,color:'var(--v1-fg-muted)'}}>no results for "{query}"</div>
          )}
          {navItems.length>0&&(
            <div>
              <div style={{padding:'8px 14px 4px',fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>navigate</div>
              {navItems.map((c,i)=>{const idx=i;const active=sel===idx;return(
                <div key={c.id} onMouseEnter={()=>setSel(idx)} onClick={()=>runItem({type:'nav',...c})}
                  style={{display:'grid',gridTemplateColumns:'36px 1fr auto',alignItems:'center',gap:10,padding:'8px 14px',background:active?'rgba(79,123,255,0.10)':'transparent',cursor:'pointer',borderLeft:`3px solid ${active?'var(--v1-accent)':'transparent'}`}}>
                  <span style={{fontSize:15,textAlign:'center',color:active?'var(--v1-accent)':'var(--v1-fg-muted)'}}>{c.icon}</span>
                  <div>
                    <span style={{fontSize:12,color:active?'var(--v1-fg)':'var(--v1-fg-2)'}}>{c.label}</span>
                    <span style={{fontSize:10,color:'var(--v1-fg-muted)',marginLeft:10}}>{c.desc}</span>
                  </div>
                  <span style={{fontSize:10,color:'var(--v1-fg-muted)',border:'1px solid var(--v1-rule)',padding:'1px 6px',letterSpacing:'0.08em'}}>{c.kbd}</span>
                </div>
              );})}
            </div>
          )}
          {sessionMatches.length>0&&(
            <div>
              <div style={{padding:'8px 14px 4px',fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase',borderTop:'1px solid var(--v1-rule)'}}>sessions</div>
              {sessionMatches.map((s,i)=>{const idx=navItems.length+i;const active=sel===idx;return(
                <div key={i} onMouseEnter={()=>setSel(idx)} onClick={()=>runItem({type:'session',...s})}

                  <span style={{width:4,height:16,background:s.color||'var(--v1-fg-muted)',display:'block'}}/>

function AuthScreen({onAuth}){

  const[error,setError]=useState('');
  const[loading,setLoading]=useState(false);
  const firstRef=useRef(null);

  useEffect(()=>{setTimeout(()=>firstRef.current?.focus(),60);},[mode]);

  const doSignIn=async e=>{
    e.preventDefault();
    if(!username.trim()||!password){setError('username and password are required');return;}
    setLoading(true);setError('');
    const email=toSyntheticEmail(username);
    const res=await sbAPI.signIn(email,password);
    setLoading(false);
    if(res.error){setError('incorrect username or password');return;}
    onAuth(res.user,username.trim(),password);
  };

  const doSignUp=async e=>{
    e.preventDefault();
    const uname=username.trim();
    const dname=(displayName.trim()||uname);
    if(!uname){setError('username is required');return;}
    if(uname.length<3){setError('username must be at least 3 characters');return;}
    if(!/^[a-zA-Z0-9_]+$/.test(uname)){setError('username can only contain letters, numbers and underscores');return;}
    if(password.length<6){setError('password must be at least 6 characters');return;}
    if(password!==confirm){setError('passwords do not match');return;}
    setLoading(true);setError('');
    const email=toSyntheticEmail(uname);
    const res=await sbAPI.signUp(email,password,dname);
    setLoading(false);
    if(res.error){setError(res.error.includes('already')?'that username is taken — try another':res.error);return;}
    if(res.user){onAuth(res.user);}

/* ── SQUAD ──
   SQL to run once in Supabase SQL editor:
   create table study_groups (id bigserial primary key, name text not null, owner_id uuid references profiles(id) on delete cascade, invite_code text unique not null, created_at timestamptz default now());
   create table group_members (group_id bigint references study_groups(id) on delete cascade, user_id uuid references profiles(id) on delete cascade, primary key(group_id,user_id));
   alter table study_groups enable row level security;
   alter table group_members enable row level security;
   create policy "view_groups" on study_groups for select using (exists(select 1 from group_members where group_id=study_groups.id and user_id=auth.uid()));
   create policy "create_groups" on study_groups for insert with check (auth.uid()=owner_id);
   create policy "view_members" on group_members for select using (exists(select 1 from group_members gm where gm.group_id=group_members.group_id and gm.user_id=auth.uid()));
   create policy "join_group" on group_members for insert with check (auth.uid()=user_id);
   create policy "leave_group" on group_members for delete using (auth.uid()=user_id);
*/
function Squad({user}){
  const[groups,setGroups]=useState([]);
  const[loading,setLoading]=useState(true);
  const[newName,setNewName]=useState('');
  const[joinCode,setJoinCode]=useState('');
  const[status,setStatus]=useState(null);
  const[selGroup,setSelGroup]=useState(null);
  const[lbScope,setLbScope]=useState('7d');
  const uid=user?.id;

  const reload=()=>{
    if(!_sb||!uid){setLoading(false);return;}
    sbAPI.getMyGroups(uid).then(gs=>{setGroups(gs);setLoading(false);}).catch(()=>setLoading(false));
  };
  useEffect(reload,[uid]);

  const createGroup=async()=>{
    const n=newName.trim();if(!n)return;
    setStatus(null);
    const r=await sbAPI.createGroup(uid,n);
    if(r.error){setStatus({err:r.error});return;}
    setNewName('');setStatus({ok:`squad "${n}" created`});reload();
  };
  const joinGroup=async()=>{
    const c=joinCode.trim();if(!c)return;
    setStatus(null);
    const r=await sbAPI.joinGroup(uid,c);
    if(r.error){setStatus({err:r.error});return;}
    setJoinCode('');setStatus({ok:`joined "${r.group?.name}"`});reload();
  };
  const leaveGroup=async(gid)=>{
    await sbAPI.leaveGroup(uid,gid);
    setGroups(gs=>gs.filter(g=>g.id!==gid));
    if(selGroup?.id===gid)setSelGroup(null);
  };

  const activeGroup=selGroup?groups.find(g=>g.id===selGroup.id)||selGroup:null;
  const ranked=activeGroup?[...activeGroup.members].sort((a,b)=>(lbScope==='all'?b.total_secs-a.total_secs:b.weekly_secs-a.weekly_secs)).map((u,i)=>({...u,rank:i+1,h:(lbScope==='all'?u.total_secs:u.weekly_secs)/3600})):[];

function Shell({user,onLogout}){
  const[screen,setScreen]=useState('dashboard');
  const[weeklyTarget,setWeeklyTarget]=useState(()=>{const v=parseInt(localStorage.getItem('andreev_weekly_target'));return isNaN(v)||v<=0?20:v;});
  const[sessions,setSessions]=useState([]);
  const sessionsRef=useRef([]);
  const[sessionState,setSessionState]=useState(DEFAULT_SESSION);
  const sessionStateRef=useRef(DEFAULT_SESSION);
  const[showPicker,setShowPicker]=useState(false);
  const[showFilter,setShowFilter]=useState(false);
  const[showShareCard,setShowShareCard]=useState(false);
  const[filterSubjects,setFilterSubjects]=useState([]);
  const[filterMinProd,setFilterMinProd]=useState(0);
  const tick=useTick(1000);

  // Pomodoro state lifted here so it survives tab switches
  const[pomOn,setPomOn]=useState(false);
  const[pomWork,setPomWork]=useState(25);
  const[pomBreak,setPomBreak]=useState(5);
  const[pomPhase,setPomPhase]=useState('work');
  const[pomPhaseStart,setPomPhaseStart]=useState(null);

  const[subjects,setSubjects]=useState([]);
  const[leaderboard,setLeaderboard]=useState([]);
  const[onlineAlert,setOnlineAlert]=useState(null); // {name, subject}
  const prevOnlineRef=useRef(new Set());
  const[friendReqAlert,setFriendReqAlert]=useState(null); // {count, fromName}
  const lastReqCountRef=useRef(null);
  const[rankAlert,setRankAlert]=useState(null); // {from, to, delta}
  const rankAtHideRef=useRef(null);
  const myRankRef=useRef(null); // updated each render after myRank is computed
  const[benchmarkAlert,setBenchmarkAlert]=useState(null); // {icon, label, detail, value}
  const[pbAlert,setPbAlert]=useState(null); // {record, prev, value}
  const[showTour,setShowTour]=useState(false);
  const[tourStep,setTourStep]=useState(0);
  const[events,setEvents]=useState(()=>{try{return JSON.parse(localStorage.getItem('andreev_events')||'[]');}catch{return[];}});
  const[todos,setTodos]=useState(()=>{try{return JSON.parse(localStorage.getItem('andreev_todos')||'[]');}catch{return[];}});
  const[todoStates,setTodoStates]=useState(()=>{try{return JSON.parse(localStorage.getItem('andreev_todo_states')||'{}');}catch{return{};}});

  // Keep ref in sync so heartbeat always sees current sessions
  useEffect(()=>{sessionsRef.current=sessions;},[sessions]);
  useEffect(()=>{sessionStateRef.current=sessionState;},[sessionState]);

  // Load sessions + subjects + leaderboard from Supabase on mount
  useEffect(()=>{
    if(!user?.id)return;
    sbAPI.loadSessions(user.id).then(data=>{
      if(data.length>0){setSessions(data);}
      else if(!localStorage.getItem('seen_tour')){setShowTour(true);}
    });
    sbAPI.loadSubjects(user.id).then(data=>setSubjects(data));
    sbAPI.getLeaderboard(user.id).then(setLeaderboard).catch(()=>{});
  },[user?.id]);

  // Prune past-day events and todos on mount
  useEffect(()=>{
    const todayStr=new Date().toISOString().slice(0,10);
    setEvents(a=>a.filter(e=>e.day>=todayStr));
    setTodos(a=>a.filter(t=>t.day>=todayStr));
  },[]);

  // Persist events/todos/target to localStorage
  useEffect(()=>{localStorage.setItem('andreev_events',JSON.stringify(events));},[events]);
  useEffect(()=>{localStorage.setItem('andreev_todos',JSON.stringify(todos));},[todos]);
  useEffect(()=>{localStorage.setItem('andreev_todo_states',JSON.stringify(todoStates));},[todoStates]);
  useEffect(()=>{localStorage.setItem('andreev_weekly_target',String(weeklyTarget));},[weeklyTarget]);

  // Sync own stats to user_stats and refresh leaderboard whenever sessions change
  useEffect(()=>{
    if(!user?.id||!_sb||sessions.length===0)return;
    const t=setTimeout(()=>{
      const s=computeStats(sessions);
      sbAPI.upsertStats(user.id,s)
        .then(()=>sbAPI.getLeaderboard(user.id).then(setLeaderboard).catch(()=>{}))
        .catch(()=>{});
    },1500);
    return()=>clearTimeout(t);
  },[sessions,user?.id]);

  // Refresh leaderboard immediately when navigating to rank or home tabs
  useEffect(()=>{
    if(!user?.id||!_sb)return;
    if(screen==='leader'||screen==='dashboard'){
      sbAPI.getLeaderboard(user.id).then(setLeaderboard).catch(()=>{});
    }
  },[screen,user?.id]);

  // Heartbeat: keep updated_at fresh so friends see us online; also refresh leaderboard
  useEffect(()=>{
    if(!user?.id||!_sb)return;
    const beat=()=>{
      const ss=sessionStateRef.current;
      sbAPI.heartbeat(user.id,ss.active?ss.subject:null).catch(()=>{});
      sbAPI.getLeaderboard(user.id).then(setLeaderboard).catch(()=>{});
      sbAPI.getPendingRequests(user.id).then(reqs=>{
        if(lastReqCountRef.current!==null&&reqs.length>lastReqCountRef.current){
          const newest=reqs[0];
          setFriendReqAlert({count:reqs.length-lastReqCountRef.current,fromName:newest?.fromName||null});
          const t=setTimeout(()=>setFriendReqAlert(null),7000);
        }
        lastReqCountRef.current=reqs.length;
      }).catch(()=>{});
    };
    // seed the initial count so first poll doesn't false-fire
    sbAPI.getPendingRequests(user.id).then(r=>{lastReqCountRef.current=r.length;}).catch(()=>{});
    const iv=setInterval(beat,120000);
    return()=>clearInterval(iv);
  },[user?.id]);

  // ⌘K shortcut
  useEffect(()=>{
    const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setShowFilter(f=>!f);}};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);
  // Detect friends coming online
  useEffect(()=>{
    const now=Date.now();
    const currentOnline=new Set(
      leaderboard.filter(u=>!u.isYou&&u.updated_at&&(now-new Date(u.updated_at))<5*60*1000).map(u=>u.id)
    );
    const newlyOnline=leaderboard.filter(u=>currentOnline.has(u.id)&&!prevOnlineRef.current.has(u.id));
    if(newlyOnline.length>0&&prevOnlineRef.current.size>0){
      const u=newlyOnline[0];

  })();

  const _rankTone=leaderboard.length<=1?'flat':myRank===1?'up':'down';

      {/* BLOOMBERG NOTIFICATION STACK */}
      {(()=>{
        const toastStyle={position:'fixed',left:'50%',transform:'translateX(-50%)',zIndex:9999,background:'var(--v1-bg-elev-2)',border:'1px solid var(--v1-rule-strong)',padding:'8px 16px',display:'flex',alignItems:'center',gap:12,pointerEvents:'none',boxShadow:'0 4px 24px rgba(0,0,0,0.5)',whiteSpace:'nowrap'};
        const toasts=[];
        if(onlineAlert)toasts.push(
          <div key="online" style={{...toastStyle,top:52}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#6BD89A',flexShrink:0,boxShadow:'0 0 6px #6BD89A'}}/>
            <div style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg)',letterSpacing:'0.06em'}}>
              <span style={{color:'var(--v1-fg-muted)',fontSize:9,letterSpacing:'0.12em',marginRight:8}}>● ONLINE</span>
              <span style={{fontWeight:600}}>{onlineAlert.name.toUpperCase()}</span>
              {onlineAlert.subject&&<span style={{color:'var(--v1-fg-muted)',marginLeft:8,fontSize:9,letterSpacing:'0.08em'}}>{onlineAlert.subject.toUpperCase()}</span>}
            </div>
          </div>
        );
        if(friendReqAlert)toasts.push(
          <div key="freq" style={{...toastStyle,top:52+(onlineAlert?44:0)}}>
            <span style={{fontSize:11,color:'var(--v1-accent)',flexShrink:0}}>◈</span>
            <div style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg)',letterSpacing:'0.06em'}}>
              <span style={{color:'var(--v1-fg-muted)',fontSize:9,letterSpacing:'0.12em',marginRight:8}}>NETWORK REQUEST</span>
              {friendReqAlert.fromName?<span style={{fontWeight:600}}>{friendReqAlert.fromName.toUpperCase()}</span>:<span style={{fontWeight:600}}>{friendReqAlert.count} NEW</span>}
              <span style={{color:'var(--v1-fg-muted)',marginLeft:8,fontSize:9}}> wants to connect · check network tab</span>
            </div>
          </div>
        );
        if(rankAlert)toasts.push(
          <div key="rank" style={{...toastStyle,top:52+(onlineAlert?44:0)+(friendReqAlert?44:0)}}>
            <span style={{fontSize:11,color:rankAlert.delta>0?'var(--v1-up)':'var(--v1-down)',flexShrink:0}}>{rankAlert.delta>0?'▲':'▼'}</span>
            <div style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg)',letterSpacing:'0.06em'}}>
              <span style={{color:'var(--v1-fg-muted)',fontSize:9,letterSpacing:'0.12em',marginRight:8}}>RANK CHANGE</span>
              <span style={{color:rankAlert.delta>0?'var(--v1-up)':'var(--v1-down)',fontWeight:600}}>#{rankAlert.from} → #{rankAlert.to}</span>
              <span style={{color:'var(--v1-fg-muted)',marginLeft:8,fontSize:9}}>{rankAlert.delta>0?`+${rankAlert.delta} positions while away`:`${Math.abs(rankAlert.delta)} positions lost while away`}</span>
            </div>
          </div>
        );
        const nAbove=(onlineAlert?1:0)+(friendReqAlert?1:0)+(rankAlert?1:0);
        if(pbAlert)toasts.push(
          <div key="pb" style={{...toastStyle,top:52+nAbove*44,border:'1px solid #F2C14E',background:'rgba(20,18,10,0.97)'}}>
            <span style={{fontSize:13,color:'#F2C14E',flexShrink:0}}>◉</span>
            <div style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg)',letterSpacing:'0.06em'}}>
              <span style={{color:'#F2C14E',fontSize:9,letterSpacing:'0.14em',marginRight:8,fontWeight:700}}>PERSONAL BEST</span>
              <span style={{fontWeight:600}}>{pbAlert.record}</span>
              <span style={{color:'var(--v1-fg-muted)',marginLeft:8,fontSize:9}}>{pbAlert.value}{pbAlert.prev?` · prev ${pbAlert.prev}`:''}</span>
            </div>
          </div>
        );
        const nAbove2=(onlineAlert?1:0)+(friendReqAlert?1:0)+(rankAlert?1:0)+(pbAlert?1:0);
        if(benchmarkAlert)toasts.push(
          <div key="bench" style={{...toastStyle,top:52+nAbove2*44,border:'1px solid var(--v1-up)',background:'rgba(13,20,14,0.97)'}}>
            <span style={{fontSize:13,color:'var(--v1-up)',flexShrink:0}}>{benchmarkAlert.icon}</span>
            <div style={{fontFamily:'var(--v1-mono)',fontSize:11,color:'var(--v1-fg)',letterSpacing:'0.06em'}}>
              <span style={{color:'var(--v1-up)',fontSize:9,letterSpacing:'0.14em',marginRight:8,fontWeight:700}}>{benchmarkAlert.label}</span>
              <span style={{fontWeight:600}}>{benchmarkAlert.detail}</span>
              <span style={{color:'var(--v1-fg-muted)',marginLeft:8,fontSize:9}}>{benchmarkAlert.value}</span>
            </div>
          </div>
        );
        return toasts;
      })()}

      {/* TOP RAIL */}
      <header style={{display:'flex',alignItems:'center',gap:8,padding:'0 12px',height:40,flexShrink:0,background:'var(--v1-bg)',borderBottom:'1px solid var(--v1-rule)'}}>
        <div style={{display:'flex',alignItems:'center',gap:0,fontSize:12,fontFamily:'var(--v1-mono)'}}>
          <span style={{color:'var(--v1-accent)',fontWeight:600}}>[</span>
          <span style={{color:'var(--v1-fg)',fontWeight:600,letterSpacing:'0.02em'}}>Andreev</span>
          <span style={{color:'var(--v1-fg-3)'}}>.net</span>
          <Cursor size="0.55em" color="var(--v1-accent)"/>
          <span style={{color:'var(--v1-accent)',fontWeight:600}}>]</span>
        </div>
        <nav style={{display:'flex',gap:2,alignItems:'center',overflow:'hidden',flex:1}}>
          {TABS.map(t=>{const a=screen===t.id;return(
            <button key={t.id} onClick={()=>setScreen(t.id)} style={{fontFamily:'var(--v1-mono)',fontSize:11,background:a?'var(--v1-bg-elev)':'transparent',color:a?'var(--v1-fg)':'var(--v1-fg-3)',border:'none',borderBottom:a?'1px solid var(--v1-accent)':'1px solid transparent',padding:'11px 12px',cursor:'pointer',whiteSpace:'nowrap',letterSpacing:'0.04em',position:'relative',top:1}}>
              {t.label}
            </button>
          );})}
        </nav>
        <span style={{fontSize:11,color:'var(--v1-fg-3)',fontVariantNumeric:'tabular-nums',letterSpacing:'0.02em'}}>{clockStr} <span style={{color:'var(--v1-fg-muted)'}}>BCN</span></span>
        <button onClick={()=>setShowShareCard(true)} style={{background:'transparent',border:'1px solid var(--v1-rule)',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:10,padding:'3px 8px',cursor:'pointer',letterSpacing:'0.08em'}}>↗ share</button>
        <button onClick={onLogout} title={user?.email} style={{background:'transparent',border:'1px solid var(--v1-rule)',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:10,padding:'3px 8px',cursor:'pointer',letterSpacing:'0.08em'}}>↩ out</button>
        <button onClick={()=>setShowFilter(f=>!f)} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 8px',border:`1px solid ${(filterSubjects.length>0||filterMinProd>0)?'var(--v1-accent)':'var(--v1-rule)'}`,fontSize:11,color:(filterSubjects.length>0||filterMinProd>0)?'var(--v1-accent)':'var(--v1-fg-3)',background:'transparent',cursor:'pointer',fontFamily:'var(--v1-mono)'}}>
          <span>⌕</span><span>search</span>{(filterSubjects.length>0||filterMinProd>0)&&<span style={{background:'var(--v1-accent)',color:'var(--v1-bg)',borderRadius:2,padding:'0 4px',fontSize:9,fontWeight:700}}>{filterSubjects.length+(filterMinProd>0?1:0)}</span>}<span style={{marginLeft:4,color:'var(--v1-fg-muted)',fontSize:10}}>⌘K</span>
        </button>
        <button onClick={handleBegin} style={{fontFamily:'var(--v1-mono)',fontSize:11,background:sessionState.active?'var(--v1-up)':'var(--v1-accent)',color:'var(--v1-bg)',border:'none',padding:'6px 14px',cursor:'pointer',fontWeight:600,letterSpacing:'0.04em'}}>{sessionState.active?'● session →':'begin →'}</button>
      </header>

      {/* STATUS STRIP — each cell navigates to its related tab */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',borderBottom:'1px solid var(--v1-rule)',flexShrink:0,background:'var(--v1-bg-elev)'}}>
        {[
          {k:'today',  v:fmtHM(todayH),            d:_todaySub,                                    tone:_todayTone, nav:'dashboard'},
          {k:'streak', v:`${streak}d`,               d:streak>0?`${streak} consecutive`:'no streak', tone:streak>0?'up':'flat', nav:'dashboard'},
          {k:'wk',     v:fmtHM(thisWkH),            d:_wkSub,                                       tone:_wkTone,   nav:'heatmap'},
          {k:'rank',   v:myRank?`#${myRank}`:'—',   d:_rankSub,                                     tone:_rankTone, nav:'leader'},
          {k:'peak',   v:peakHour!=null?`${String(peakHour).padStart(2,'0')}h`:'—', d:peakHour!=null?_peakSub:'no data yet', tone:peakHour!=null?'flat':'flat', nav:'heatmap'},
          {k:'pace',   v:`${paceVal}%`,              d:_paceDesc,                                    tone:paceTone,  nav:'heatmap'},
        ].map((c,i)=>{
          const col=c.tone==='up'?'var(--v1-up)':c.tone==='down'?'var(--v1-down)':'var(--v1-fg)';
          const subCol=c.tone==='up'?'var(--v1-up)':c.tone==='down'?'var(--v1-down)':'var(--v1-fg-3)';
          return(
            <div key={c.k} onClick={()=>setScreen(c.nav)} style={{padding:'9px 14px',borderRight:i<5?'1px solid var(--v1-rule)':'none',display:'flex',flexDirection:'column',gap:3,cursor:'pointer',transition:'background 80ms'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(79,123,255,0.06)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{fontSize:9,letterSpacing:'0.16em',color:'var(--v1-fg-muted)',textTransform:'uppercase'}}>{c.k}</span>
              <span style={{fontSize:17,fontVariantNumeric:'tabular-nums',letterSpacing:'-0.02em',color:col}}>{c.v}</span>
              <span style={{fontSize:10,color:subCol,fontVariantNumeric:'tabular-nums',letterSpacing:'0.01em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.d}</span>
            </div>
          );
        })}
      </div>

      {/* STREAK AT RISK */}
      {streakAtRisk&&(
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'5px 16px',background:'rgba(239,68,68,0.07)',borderBottom:'1px solid var(--v1-down)',flexShrink:0}}>
          <span style={{fontSize:9,letterSpacing:'0.2em',color:'var(--v1-down)',fontFamily:'var(--v1-mono)',fontWeight:700}}>▲ STREAK AT RISK</span>
          <span style={{fontSize:9,color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',letterSpacing:'0.08em'}}>{streak}d streak · 0h logged today · {23-_nowH}h remaining</span>
          <button onClick={()=>setScreen('timer')} style={{marginLeft:'auto',...Btn.sm,fontSize:8,padding:'2px 10px',color:'var(--v1-down)',borderColor:'var(--v1-down)'}}>begin session →</button>
        </div>
      )}

      {/* MAIN */}
      <main style={{flex:1,overflow:'hidden',padding:0,position:'relative',display:'flex',flexDirection:'column'}}>
        {screen==='dashboard'&&<Dashboard onNav={setScreen} sessions={sessions} sessionState={sessionState} subjects={subjects} weekBars={weekBars} thisWkH={thisWkH} leaderboard={liveLeaderboard} events={events} todos={todos} todoStates={todoStates} setTodoStates={setTodoStates} weeklyReport={_weeklyReport}/>}
        {screen==='timer'&&<div style={{overflowY:'auto',flex:1,display:'flex',flexDirection:'column'}}><Timer sessionState={sessionState} onPause={handlePause} onCommit={handleCommit} onDiscard={handleDiscard} onStart={handleStartSession} onLogManual={handleLogManual} subjects={subjects} pomOn={pomOn} setPomOn={setPomOn} pomWork={pomWork} setPomWork={setPomWork} pomBreak={pomBreak} setPomBreak={setPomBreak} pomPhase={pomPhase} setPomPhase={setPomPhase} pomPhaseStart={pomPhaseStart} setPomPhaseStart={setPomPhaseStart}/></div>}
        {screen==='calendar'&&<Calendar subjects={subjects} events={events} setEvents={setEvents} todos={todos} setTodos={setTodos} todoStates={todoStates} setTodoStates={setTodoStates}/>}
        {screen==='leader'&&<div style={{overflowY:'auto',flex:1}}><Leader sessions={sessions} user={user} streak={streak} subjects={subjects} leaderboard={liveLeaderboard}/></div>}
        {screen==='heatmap'&&<div style={{overflowY:'auto',flex:1}}><Heatmap weeklyTarget={weeklyTarget} setWeeklyTarget={setWeeklyTarget} sessions={sessions} heatmap={heatmap} peakHour={peakHour} peakDay={peakDay} activeDays30={activeDays30} thisWkH={thisWkH}/></div>}
        {screen==='subjects'&&<div style={{overflowY:'auto',flex:1}}><Subjects user={user} subjects={subjects} setSubjects={setSubjects} sessions={sessions}/></div>}
        {screen==='log'&&<div style={{overflowY:'auto',flex:1}}><Log sessions={sessions} filterSubjects={filterSubjects} filterMinProd={filterMinProd}/></div>}
        {screen==='friend'&&<div style={{overflowY:'auto',flex:1}}><Friend user={user} leaderboard={liveLeaderboard}/></div>}
        {screen==='squad'&&<div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}><Squad user={user}/></div>}
      </main>

      {/* FOOTER */}
      <footer style={{height:24,flexShrink:0,borderTop:'1px solid var(--v1-rule)',background:'var(--v1-bg-elev)',display:'flex',alignItems:'center',gap:14,padding:'0 14px',fontSize:10,color:'var(--v1-fg-3)',letterSpacing:'0.06em'}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:5}}><span style={{width:6,height:6,background:'var(--v1-up)',borderRadius:'50%'}} className="v1-pulse"/>SYNC OK</span>
        <span>USR <span style={{color:'var(--v1-fg-2)'}}>{user?.name||'you'}</span></span>
        <span>NET <span style={{color:'var(--v1-fg-2)'}}>{`${_onlineFriends+1}/${_totalFriends+1}`}</span></span>
        <span>~/{curTab?.label}</span>
        <span style={{flex:1}}/>
        <span/>
        <span style={{flex:1}}/>
        <span>SESSIONS <span style={{color:'var(--v1-fg-2)'}}>{sessions.length}</span></span>
      </footer>
    </div>
  );
}

const IS_LOCAL=typeof window!=='undefined'&&window.location.hostname==='localhost';
const PREVIEW_USER={id:'preview-local',name:'preview',email:'preview@localhost',isPreview:true};

function App(){
  const[user,setUser]=useState(IS_LOCAL?PREVIEW_USER:null);
  const[checking,setChecking]=useState(!IS_LOCAL);

  useEffect(()=>{
    if(IS_LOCAL){return;}
    if(!_sb){setChecking(false);return;}
    const timeout=setTimeout(()=>{setChecking(false);},3000);
    sbAPI.getSession()
      .then(u=>{setUser(u);})
      .catch(()=>{})
      .finally(()=>{clearTimeout(timeout);setChecking(false);});
    return()=>clearTimeout(timeout);
  },[]);

  const handleLogout=async()=>{
    if(!IS_LOCAL)await sbAPI.signOut();
    setUser(IS_LOCAL?PREVIEW_USER:null);
  };

  if(checking)return(
    <div className="v1" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--v1-bg)',color:'var(--v1-fg-muted)',fontFamily:'var(--v1-mono)',fontSize:12,letterSpacing:'0.12em'}}>
      loading...
    </div>
  );
  if(!user) return <AuthScreen onAuth={setUser}/>;
  return <Shell user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
